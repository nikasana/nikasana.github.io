<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1f1c">
<title>სიამოვნების პროგნოზის ფურცელი · Pleasure-Predicting Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif:wght@300;400;500;600&family=Noto+Serif+Georgian:wght@300;400;500;600&family=Noto+Sans:wght@400;500&family=Noto+Sans+Georgian:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161a17;
    --bg-card: #1f2521;
    --bg-elevated: #262d28;
    --ink: #e8e4d8;
    --ink-dim: #9ba197;
    --ink-faint: #5c6259;
    --accent: #c9a96e;
    --accent-soft: #8a7548;
    --pleasure: #e08962;  /* warm coral / terracotta — distinct from mood */
    --mastery: #6db4a3;   /* slightly cooler teal-green */
    --mood: #a78bca;      /* soft lavender — clearly distinct from both */
    --border: #2d342f;
    --danger: #b86a5e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', 'Noto Serif Georgian', Georgia, serif;
    font-optical-sizing: auto;
    overscroll-behavior: none;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* When the document is in Georgian, switch to a Georgian-tuned serif as primary */
  html[lang="ka"] body,
  html[lang="ka"] input[type="text"],
  html[lang="ka"] textarea,
  html[lang="ka"] .time-select,
  html[lang="ka"] button.primary,
  html[lang="ka"] .entry-activity,
  html[lang="ka"] .empty p,
  html[lang="ka"] .insight-text,
  html[lang="ka"] .confirm-message,
  html[lang="ka"] .attribution,
  html[lang="ka"] .date-header-label,
  html[lang="ka"] .pair-title,
  html[lang="ka"] .toast,
  html[lang="ka"] .footer-line {
    font-family: 'Noto Serif Georgian', 'Fraunces', Georgia, serif;
  }

  html[lang="ka"] h1 {
    font-family: 'Noto Serif Georgian', 'Fraunces', Georgia, serif;
  }

  /* Mono / label-style elements use Georgian sans (mono Georgian doesn't really exist) */
  html[lang="ka"] .eyebrow,
  html[lang="ka"] label,
  html[lang="ka"] .tab,
  html[lang="ka"] .scale-sub-label,
  html[lang="ka"] .metric-label,
  html[lang="ka"] .entry-date,
  html[lang="ka"] .stat-label,
  html[lang="ka"] .insight-label,
  html[lang="ka"] .date-chip,
  html[lang="ka"] .date-header-meta,
  html[lang="ka"] .time-preset,
  html[lang="ka"] button.ghost,
  html[lang="ka"] .entry-actions button,
  html[lang="ka"] .confirm-actions button,
  html[lang="ka"] .footer-credit {
    font-family: 'Noto Sans Georgian', 'JetBrains Mono', monospace;
  }


  html[lang="ru"] body,
  html[lang="ru"] input[type="text"],
  html[lang="ru"] textarea,
  html[lang="ru"] .time-select,
  html[lang="ru"] button.primary,
  html[lang="ru"] .entry-activity,
  html[lang="ru"] .empty p,
  html[lang="ru"] .insight-text,
  html[lang="ru"] .confirm-message,
  html[lang="ru"] .attribution,
  html[lang="ru"] .date-header-label,
  html[lang="ru"] .pair-title,
  html[lang="ru"] .toast,
  html[lang="ru"] .footer-line {
    font-family: 'Noto Serif', 'Fraunces', Georgia, serif;
  }

  html[lang="ru"] h1 {
    font-family: 'Noto Serif', 'Fraunces', Georgia, serif;
  }

  html[lang="ru"] .eyebrow,
  html[lang="ru"] label,
  html[lang="ru"] .tab,
  html[lang="ru"] .scale-sub-label,
  html[lang="ru"] .metric-label,
  html[lang="ru"] .entry-date,
  html[lang="ru"] .stat-label,
  html[lang="ru"] .insight-label,
  html[lang="ru"] .date-chip,
  html[lang="ru"] .date-header-meta,
  html[lang="ru"] .time-preset,
  html[lang="ru"] button.ghost,
  html[lang="ru"] .entry-actions button,
  html[lang="ru"] .confirm-actions button,
  html[lang="ru"] .footer-credit,
  html[lang="ru"] .dashboard-sort-label,
  html[lang="ru"] .dashboard-sort-select,
  html[lang="ru"] .chart-filter-label,
  html[lang="ru"] .chart-filter-select {
    font-family: 'Noto Sans', 'JetBrains Mono', monospace;
  }

  body {
    padding: 0 0 80px 0;
    background-image:
      radial-gradient(at 20% 0%, rgba(201, 169, 110, 0.06) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(125, 169, 154, 0.04) 0px, transparent 50%);
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* The rate view lives outside .container so we mirror its sizing here */
  #view-rate {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  header {
    margin-bottom: 28px;
    padding-top: 8px;
    position: relative;
  }

  .lang-switcher {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    gap: 2px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
  }

  .lang-btn {
    background: transparent;
    border: none;
    color: var(--ink-faint);
    padding: 5px 9px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 36px;
  }

  .lang-btn.active {
    background: var(--bg-elevated);
    color: var(--accent);
  }

  .lang-btn:not(.active):active {
    transform: scale(0.95);
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 30px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    font-style: italic;
  }

  h1 .accent { font-style: normal; font-weight: 500; }

  .subtitle {
    font-size: 14px;
    color: var(--ink-dim);
    margin-top: 8px;
    line-height: 1.5;
  }

  .attribution {
    font-size: 11px;
    line-height: 1.55;
    color: var(--ink-faint);
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-style: italic;
  }

  .attribution em {
    color: var(--ink-dim);
    font-style: italic;
  }

  .footer-credit {
    text-align: center;
    padding: 32px 20px 12px;
    font-size: 10px;
    line-height: 1.6;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
    font-family: 'JetBrains Mono', monospace;
  }

  .footer-credit a {
    color: var(--accent-soft);
    text-decoration: none;
  }

  .footer-credit .footer-line {
    font-family: 'Fraunces', serif;
    font-style: italic;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0;
  }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--bg-elevated);
    color: var(--accent);
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* Form */
  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-soft);
  }

  .time-select {
    flex: 1;
    min-width: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%239ba197' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
    cursor: pointer;
  }

  .time-select:focus {
    outline: none;
    border-color: var(--accent-soft);
  }

  .time-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .time-presets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .time-preset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 9px 4px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .time-preset:active { transform: scale(0.96); }

  .time-preset.active {
    background: var(--bg-elevated);
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  textarea { resize: none; min-height: 70px; line-height: 1.5; }

  .scale-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .scale-sub-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }

  .scale-row {
    display: grid;
    gap: 5px;
    margin-top: 2px;
  }

  .scale-row.tens { grid-template-columns: repeat(6, 1fr); }
  .scale-row.ones { grid-template-columns: repeat(10, 1fr); }

  .scale-btn {
    aspect-ratio: 1.1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .scale-row.ones .scale-btn { font-size: 11px; aspect-ratio: 1; }

  .total-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px;
    background: var(--bg-elevated);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .total-num {
    font-size: 22px;
    font-weight: 500;
  }

  .total-num.pleasure { color: var(--pleasure); }
  .total-num.mastery { color: var(--mastery); }
  .total-num.mood { color: var(--mood); }

  .total-num.empty { color: var(--ink-faint); }

  .total-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .scale-btn:active { transform: scale(0.94); }

  .scale-btn.selected.pleasure {
    background: var(--pleasure);
    color: #1a1f1c;
    border-color: var(--pleasure);
    font-weight: 600;
  }

  .scale-btn.selected.mastery {
    background: var(--mastery);
    color: #1a1f1c;
    border-color: var(--mastery);
    font-weight: 600;
  }

  .scale-btn.selected.mood {
    background: var(--mood);
    color: #1a1f1c;
    border-color: var(--mood);
    font-weight: 600;
  }

  .scale-label {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .pair {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
  }

  .pair-title {
    font-style: italic;
    font-size: 17px;
    margin-bottom: 14px;
    color: var(--ink);
  }

  .pair-title .quill {
    color: var(--accent);
    margin-right: 6px;
  }

  button.primary {
    width: 100%;
    background: var(--accent);
    color: #161a17;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s;
  }

  button.primary:active { transform: scale(0.98); }

  button.primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button.ghost {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
  }

  /* Log entries */
  .entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 12px;
    position: relative;
  }

  .entry-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .entry-date .hint {
    color: var(--accent);
    font-style: italic;
  }

  .entry-activity {
    font-size: 18px;
    line-height: 1.3;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .entry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }

  .metric {
    background: var(--bg-elevated);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .metric-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .metric-values {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .pred { color: var(--ink-dim); font-size: 13px; }
  .arrow { color: var(--ink-faint); font-size: 11px; }
  .actual-p { color: var(--pleasure); font-size: 18px; font-weight: 500; }
  .actual-m { color: var(--mastery); font-size: 18px; font-weight: 500; }
  .pending { color: var(--ink-faint); font-style: italic; font-size: 13px; }

  .delta {
    font-size: 11px;
    margin-left: 4px;
    color: var(--ink-faint);
  }
  .delta.positive { color: #8db692; }
  .delta.negative { color: var(--danger); }

  .entry-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .entry-actions button {
    flex: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 9px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .entry-actions button.complete { color: var(--accent); border-color: var(--accent-soft); }
  .entry-actions button.delete { color: var(--danger); }

  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-faint);
  }

  .empty-mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 56px;
    color: var(--accent-soft);
    opacity: 0.4;
    margin-bottom: 16px;
    line-height: 1;
  }

  .empty p {
    font-style: italic;
    font-size: 15px;
    line-height: 1.5;
    max-width: 280px;
    margin: 0 auto;
  }

  /* Insights */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-num.pleasure { color: var(--pleasure); }
  .stat-num.mastery { color: var(--mastery); }
  .stat-num.accent { color: var(--accent); }


  .streak-fire {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 6px;
    font-size: 20px;
    transition: opacity 0.2s, filter 0.2s;
  }

  .streak-fire.inactive {
    opacity: 0.28;
    filter: grayscale(1);
  }

  .streak-fire.active {
    opacity: 1;
    filter: drop-shadow(0 0 8px rgba(255,140,60,0.35));
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 6px;
  }

  .insight {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 16px 18px;
    border-radius: 4px 12px 12px 4px;
    margin-bottom: 14px;
  }

  .insight-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .insight-text {
    font-style: italic;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
  }

  /* Ornament */
  .ornament {
    text-align: center;
    color: var(--accent-soft);
    font-size: 14px;
    letter-spacing: 0.5em;
    margin: 20px 0 12px 0;
    opacity: 0.5;
  }

  /* Date strip (horizontal scrollable) */
  .date-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 4px 4px 14px 4px;
    margin: -4px -4px 8px -4px;
    scrollbar-width: none;
    scroll-snap-type: x mandatory;
  }

  .date-strip::-webkit-scrollbar { display: none; }

  .date-chip {
    flex: 0 0 auto;
    scroll-snap-align: start;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 78px;
    text-align: left;
  }

  .date-chip:active { transform: scale(0.97); }

  .date-chip.active {
    background: var(--bg-elevated);
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  .date-chip-label {
    font-size: 12px;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
    font-weight: 500;
  }

  .date-chip-count {
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .date-chip.active .date-chip-count {
    color: var(--ink-dim);
  }

  .pending-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Date group section */
  .date-group {
    margin-bottom: 18px;
    scroll-margin-top: 12px;
  }

  .date-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .date-header-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .date-header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;

    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    align-items: flex-end;
    justify-content: center;
    pointer-events: none;

    font-style: italic;
    letter-spacing: 0.01em;

    visibility: hidden;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateY(20px);
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(201, 169, 110, 0.25);
    max-width: 100%;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);

  /* Confirm modal */
  .confirm-overlay {
    position: fixed;
    inset: 0;

    outline: none;
    border-color: var(--accent-soft);
  }

  .deep-summary {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .deep-summary-head {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 14px;
  }

  .deep-summary-name {
    font-family: 'Fraunces', 'Noto Serif Georgian', Georgia, serif;
    font-size: 17px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 5px;
    overflow-wrap: anywhere;
  }

  .deep-summary-meta {
    font-family: 'JetBrains Mono', 'Noto Sans Georgian', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .deep-metric-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .deep-metric-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 14px;
  }

  .deep-metric-title {
    font-family: 'Fraunces', 'Noto Serif Georgian', Georgia, serif;
    font-style: italic;
    font-size: 16px;
    margin-bottom: 10px;
  }

  .deep-metric-title.mood { color: var(--mood); }
  .deep-metric-title.mastery { color: var(--mastery); }
  .deep-metric-title.pleasure { color: var(--pleasure); }

  .deep-metric-rows {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .deep-metric-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    font-family: 'JetBrains Mono', 'Noto Sans Georgian', monospace;
  }

  .deep-metric-label {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .deep-metric-value {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
  }

  .deep-metric-value.mood { color: var(--mood); }
  .deep-metric-value.mastery { color: var(--mastery); }
  .deep-metric-value.pleasure { color: var(--pleasure); }
  .deep-metric-value.positive { color: #8db692; }
  .deep-metric-value.negative { color: var(--danger); }
  .deep-metric-value.empty { color: var(--ink-faint); font-style: italic; font-size: 12px; font-weight: 400; }

  .deep-all-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .deep-all-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 12px 14px;
  }

  .deep-all-name {
    font-family: 'Fraunces', 'Noto Serif Georgian', Georgia, serif;
    font-size: 15px;
    font-style: italic;
    color: var(--ink);
    overflow-wrap: anywhere;
  }

  .deep-all-metrics {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .deep-all-metric {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-family: 'JetBrains Mono', 'Noto Sans Georgian', monospace;
    font-size: 10px;
    padding-top: 7px;
    border-top: 1px dashed var(--border);
  }

  .deep-all-metric:first-child { border-top: none; padding-top: 0; }

  .deep-all-metric-label {
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .deep-all-metric-values {
    display: inline-flex;
    align-items: baseline;
    gap: 7px;
    white-space: nowrap;
  }

  .deep-all-final,
  .deep-all-diff {
    font-size: 12px;
    font-weight: 500;
  }

  .deep-all-final.mood, .deep-all-diff.mood { color: var(--mood); }
  .deep-all-final.mastery, .deep-all-diff.mastery { color: var(--mastery); }
  .deep-all-final.pleasure, .deep-all-diff.pleasure { color: var(--pleasure); }
  .deep-all-diff.positive { color: #8db692; }
  .deep-all-diff.negative { color: var(--danger); }
  .deep-all-empty { color: var(--ink-faint); font-style: italic; font-size: 11px; }

  @media (min-width: 720px) {
    .deep-metric-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    .deep-all-row {
      grid-template-columns: minmax(150px, 1.1fr) minmax(0, 2.4fr);
      align-items: center;
    }

    .deep-all-metrics {
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .deep-all-metric {
      border-top: none;
      padding-top: 0;
      border-left: 1px dashed var(--border);
      padding-left: 10px;
    }

    .deep-all-metric:first-child {
      border-left: none;
      padding-left: 0;
    }
  }


  /* ===== Data buttons (export/import) ===== */
  .data-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 24px 0 16px;
  }

  .data-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 12px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .data-btn:hover {
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  .data-btn:active { transform: scale(0.97); }

  /* ===== Entry mood display ===== */
  .entry-mood-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  .mood-bubble {
    flex: 1;
    min-width: 0;
    background: var(--bg-elevated);
    border-radius: 8px;
    padding: 7px 10px;
    display: flex;
    flex-wrap: wrap;
    column-gap: 8px;
    row-gap: 2px;
    align-items: baseline;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
  }

  .mood-bubble-label {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
    flex: 1 1 100%;
    line-height: 1.3;
  }

  .mood-bubble-value {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--mood);
  }

  .mood-bubble-value.pending {
    color: var(--ink-faint);
    font-style: italic;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ===== Pencil edit button ===== */
  .edit-pencil {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-faint);
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 6px;
    flex-shrink: 0;
    transition: all 0.15s;
    vertical-align: middle;
  }

  .edit-pencil:active { transform: scale(0.9); }
  .edit-pencil svg { width: 11px; height: 11px; display: block; }

  /* Header-level pencil (next to activity name / time) */
  .edit-pencil.lg {
    width: 26px;
    height: 26px;
  }
  .edit-pencil.lg svg { width: 13px; height: 13px; }

  /* Activity row with pencil */
  .entry-activity-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 14px;
  }

  .entry-activity-row .entry-activity {
    margin-bottom: 0;
    flex: 1;
    min-width: 0;
  }

  /* Pencil placement for metric rows */
  .metric-values {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  /* Pencil placement for mood bubbles */
  .mood-bubble .edit-pencil {
    margin-left: 4px;
    width: 20px;
    height: 20px;
  }
  .mood-bubble .edit-pencil svg { width: 10px; height: 10px; }

  /* Date row with pencil */
  .entry-date {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }
  .entry-date .edit-pencil {
    margin-left: auto;
  }

  /* ===== Edit modal ===== */
  .edit-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 250;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .edit-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .edit-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 22px 18px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .edit-overlay.show .edit-box { transform: scale(1); }

  .edit-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--ink);
    margin-bottom: 18px;
    text-align: center;
  }

  .edit-body { margin-bottom: 18px; }

  .edit-actions {
    display: flex;
    gap: 10px;
  }

  .edit-actions button {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .edit-actions .confirm-yes {
    background: var(--accent);
    border-color: var(--accent);
    color: #161a17;
    font-weight: 500;
  }

  /* Reuse pair/scale-group styles inside the edit modal */
  .edit-body .pair {
    margin-bottom: 0;
    background: var(--bg-elevated);
  }

  .edit-body input[type="text"],
  .edit-body select.time-select {
    width: 100%;
  }

  .edit-body .time-row {
    display: flex;
    gap: 8px;
  }

  .edit-body .time-row select {
    flex: 1;
  }

  /* ===== About / How-to-use view ===== */
  #view-about .about-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 24px;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  .about-section {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px dashed var(--border);
  }

  .about-section:last-of-type {
    border-bottom: none;
  }

  .about-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .about-text {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .about-text:last-child { margin-bottom: 0; }

  .about-text em {
    font-style: italic;
    color: var(--accent);
  }

  .about-text strong {
    font-weight: 600;
    color: var(--ink);
  }

  .about-steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .about-step {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    border-left: 3px solid var(--accent);
  }

  .about-step-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .about-step p {
    font-family: 'Fraunces', serif;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
    margin: 0;
  }

  .about-tips {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .about-tips li {
    font-family: 'Fraunces', serif;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
    padding: 10px 0 10px 22px;
    position: relative;
    border-bottom: 1px dashed var(--border);
  }

  .about-tips li:last-child {
    border-bottom: none;
  }

  .about-tips li::before {
    content: '❦';
    position: absolute;
    left: 0;
    top: 10px;
    color: var(--accent);
    font-size: 13px;
  }

  .about-privacy {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .about-privacy .about-text {
    font-size: 14px;
    color: var(--ink-dim);
  }

  .about-attribution {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-faint);
    text-align: center;
    padding: 0 16px;
    margin-top: 12px;
  }

  .about-attribution em {
    color: var(--ink-dim);
    font-style: italic;
  }

  /* ====================================================================
     DESKTOP RESPONSIVE STYLES
     Mobile-first design above is preserved. These queries adapt for
     larger screens so the app doesn't look like a stretched phone app.
     ==================================================================== */

  /* --- Tablet / small desktop (720px+) --- */
  @media (min-width: 720px) {
    .container,
    #view-rate {
      max-width: 720px;
      padding: 36px 32px;
    }

    body {
      padding-bottom: 60px;
    }

    /* Header proportions for wider viewports */
    header {
      margin-bottom: 36px;
      padding-top: 16px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.05;
    }

    .subtitle {
      font-size: 16px;
      max-width: 580px;
    }

    .attribution {
      font-size: 12px;
      max-width: 600px;
    }

    .eyebrow {
      font-size: 11px;
    }

    /* Tabs: a touch larger and roomier */
    .tabs {
      padding: 6px;
      margin-bottom: 32px;
    }

    .tab {
      padding: 12px 16px;
      font-size: 12px;
    }

    /* Form fields with more breathing room */
    .field {
      margin-bottom: 24px;
    }

    input[type="text"], textarea, .time-select {
      padding: 16px 18px;
      font-size: 17px;
    }

    label {
      font-size: 11px;
    }

    /* Scale pairs: more padding, slightly larger buttons */
    .pair {
      padding: 22px 20px;
      margin-bottom: 20px;
    }

    .pair-title {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .scale-row.tens { grid-template-columns: repeat(11, 1fr); gap: 6px; }
    .scale-row.ones { grid-template-columns: repeat(10, 1fr); gap: 6px; }

    .scale-btn {
      font-size: 14px;
      border-radius: 8px;
    }

    .scale-row.ones .scale-btn { font-size: 13px; }

    .scale-sub-label {
      font-size: 10px;
    }

    .total-display {
      padding: 10px;
      margin-top: 12px;
    }

    .total-num {
      font-size: 24px;
    }

    /* Primary button */
    button.primary {
      padding: 18px;
      font-size: 17px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
      display: block;
    }

    /* Templates */
    .templates-section { padding: 18px 20px; }
    .template-chip { padding: 9px 14px 9px 16px; font-size: 14px; }
    .template-chip .remove { font-size: 16px; padding-left: 10px; }

    /* Log entries: more horizontal breathing room */
    .entry {
      padding: 22px 22px;
      margin-bottom: 14px;
    }

    .entry-activity {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .entry-grid {
      gap: 14px;
    }

    .metric {
      padding: 12px 14px;
    }

    .actual-p, .actual-m {
      font-size: 20px;
    }

    .entry-mood-row {
      gap: 12px;
    }

    .mood-bubble {
      padding: 9px 12px;
    }

    .mood-bubble-value {
      font-size: 18px;
    }

    /* Entry actions: don't stretch to full width on desktop */
    .entry-actions button {
      flex: 0 1 auto;
      min-width: 120px;
      padding: 10px 16px;
    }

    /* Insights stat grid */
    .stat-grid {
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-card {
      padding: 18px;
    }

    .stat-num {
      font-size: 32px;
    }

    /* Chart: more vertical room on wider screens */
    .chart-container {
      padding: 22px 20px 18px;
    }

    .chart-svg {
      max-height: 280px;
    }

    /* Date strip: chips a touch larger */
    .date-chip {
      padding: 12px 18px;
      min-width: 92px;
    }

    .date-chip-label {
      font-size: 13px;
    }

    /* Toast */
    .toast {
      font-size: 16px;
      padding: 16px 32px;
    }
  }

  /* --- Wide desktop (960px+): two-column layouts --- */
  @media (min-width: 960px) {
    .container,
    #view-rate {
      max-width: 980px;
      padding: 48px 40px;
    }

    /* New tab: form on the left, prediction scales on the right.
       Gated on .active so the view still hides when another tab is selected. */
    #view-new.active {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    /* Templates span both columns at the top */
    #view-new .templates-section {
      grid-column: 1 / -1;
    }

    /* Save button + footer text span both columns at the bottom */
    #view-new > .primary,
    #view-new > .ornament,
    #view-new > .subtitle {
      grid-column: 1 / -1;
    }

    /* The save button shouldn't be too wide on desktop */
    #view-new > .primary {
      max-width: 320px;
    }

    /* Rate view: activity + mood scales on left, mastery/pleasure on right.
       Rate view uses inline display:block when shown, so target both states. */
    #view-rate.active,
    #view-rate[style*="display: block"] {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    /* The activity display and the two action buttons span both columns */
    #view-rate > .field:first-child,
    #view-rate > .primary,
    #view-rate > .ghost {
      grid-column: 1 / -1;
    }

    #view-rate > .primary,
    #view-rate > .ghost {
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    /* The log and insights tabs stay single-column but get a wider container */

    /* About view: 2x2 grid for the four steps on wide screens */
    #view-about .about-steps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    #view-about .about-title {
      font-size: 32px;
      margin-bottom: 32px;
    }

    /* Date strip becomes more spacious */
    .date-strip {
      gap: 10px;
    }

    /* Header */
    h1 {
      font-size: 48px;
    }
  }

  /* --- Extra-wide desktop (1200px+) --- */
  @media (min-width: 1200px) {
    .container,
    #view-rate {
      max-width: 1100px;
    }

    /* On very wide screens, allow chart to be even taller */
    .chart-svg {
      max-height: 340px;
    }
  }

  /* Cursor feedback: only on devices with real hover (skip mobile) */
  @media (hover: hover) and (pointer: fine) {
    .scale-btn:hover {
      border-color: var(--accent-soft);
    }

    .tab:not(.active):hover {
      color: var(--ink);
    }

    .entry-actions button:hover {
      border-color: var(--accent-soft);
    }

    button.primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .date-chip:hover {
      border-color: var(--accent-soft);
    }

    .time-preset:hover {
      border-color: var(--accent-soft);
      color: var(--accent);
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="ka">ქარ</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1><span data-i18n="title-pre"></span> <span class="accent" data-i18n="title-accent"></span> <span data-i18n="title-post"></span></h1>
    <p class="subtitle" data-i18n="subtitle"></p>
    <p class="attribution" data-i18n-html="attribution"></p>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="new" data-i18n="tab-new"></button>
    <button class="tab" data-view="log" data-i18n="tab-log"></button>
    <button class="tab" data-view="insights" data-i18n="tab-insights"></button>
    <button class="tab" data-view="about" data-i18n="tab-about"></button>
  </div>

  <!-- NEW ENTRY -->
  <div class="view active" id="view-new">
    <!-- Templates / Quick Add -->
    <div class="templates-section">
      <div class="templates-header">
        <span class="templates-label" data-i18n="label-templates"></span>
      </div>
      <div id="templates-list-container"></div>
    </div>

    <div class="field">
      <label data-i18n="label-activity"></label>
      <input type="text" id="activity" data-i18n-placeholder="ph-activity" autocomplete="off">
      <button type="button" class="save-template-btn" id="save-template-btn" disabled data-i18n="btn-save-template"></button>
    </div>

    <div class="field">

      // === About / How-to-use screen ===
      'tab-about': 'შესახებ',
      'about-title': 'როგორ გამოვიყენო ეს ხელსაწყო',
      'about-intro-title': 'რა არის სიამოვნების პროგნოზის ფურცელი?',
      'about-intro-p1': 'ეს არის ხელსაწყო, რომელიც აღწერილია დევიდ ბერნზის წიგნში <em>The Feeling Good Handbook</em>. იგი ეფუძნება ცნობილ ფსიქოლოგიურ აღმოჩენას: დეპრესიულ ან ჩაკეტილ მდგომარეობაში მყოფი ადამიანების გონება სისტემატურად ცდუნებაში აგდებს მათ, ეუბნება რა, რომ მომავალი აქტივობა არ მოიტანს არც სიამოვნებას, არც წარმატების შეგრძნებას. ეს არის ფსიქოლოგიური ფილტრი, არა რეალობა.',
      'about-intro-p2': 'ფურცელი გვაძლევს მტკიცებულებას. ჯერ თქვი რას მოგცემს აქტივობა (პროგნოზი), შემდეგ გააკეთე და შეაფასე რეალური გამოცდილება. დროთა განმავლობაში დაინახავ, რომ რეალობა შენი მოლოდინისგან განსხვავდება — ხშირად მისგან უკეთესია.',

      'about-method-title': 'რატომ მუშაობს',
      'about-method-p1': 'ეს არის <strong>ქცევითი აქტივაცია (Behavioral Activation)</strong> — CBT-ის ერთ-ერთი ყველაზე ემპირიულად დადასტურებული მეთოდი დეპრესიის სამკურნალოდ. იდეა მარტივია: ნუ დაელოდები ხასიათის გაუმჯობესებას, რომ რამე გააკეთო. გააკეთე, შემდეგ ხასიათი გაუმჯობესდება.',
      'about-method-p2': 'პროგნოზის რეალურთან შედარება გვაჩვენებს, რომ ჩვენი გონების უარყოფითი წინასწარმეტყველებები არ არის სიმართლე — ეს არის შემეცნებითი დამახინჯება (cognitive distortion). უმეტესობა ჩვენგანი დაბლა აფასებს იმას, რასაც სინამდვილეში ვისიამოვნებთ.',

      'about-howto-title': 'როგორ ვისარგებლო',
      'about-step1-title': '1. ახალი',
      'about-step1-p': 'ჩაწერე აქტივობა, რომელსაც აპირებ. დაგეგმე დრო. შემდეგ წინასწარ შეაფასე ოსტატობა (რამდენად კარგად გააკეთებ ან რამდენი მნიშვნელობის შეგრძნებას მოგცემს) და სიამოვნება (რამდენი სიამოვნება გექნება). ორივე — 0-დან 100-მდე.',
      'about-step2-title': '2. გააკეთე',
      'about-step2-p': 'წადი და გააკეთე აქტივობა. არ ცადო ხასიათის ცვლილების მიღწევა წინასწარ — უბრალოდ გააკეთე.',
      'about-step3-title': '3. ისტორია (შეფასება)',
      'about-step3-p': 'დაბრუნდი და დააწექი „რეალურის შეფასება". შეაფასე რა მოხდა სინამდვილეში: რეალური ოსტატობა, რეალური სიამოვნება, ასევე განწყობა მანამდე და შემდეგ. ფანქარის ღილაკით შეგიძლია ნებისმიერი მნიშვნელობის შესწორება.',
      'about-step4-title': '4. ანალიზი',
      'about-step4-p': 'დაინახე კანონზომიერებები: სად ცდუნდება შენი გონება, რომელი აქტივობები აუმჯობესებენ ხასიათს, რა იყო შენი მცდარი მოლოდინი. ეს მონაცემები არის შენი მთავარი ხელსაწყო.',

      'about-features-title': 'ახალი ფუნქციების სრული ახსნა',
      'about-feature1': '<strong>სწრაფი შაბლონები:</strong> თუ ერთი და იგივე აქტივობას ხშირად გეგმავ — მაგალითად სეირნობა, ვარჯიში, სწავლა ან მეგობართან საუბარი — შეინახე შაბლონად. შემდეგ ახალი ჩანაწერის გაკეთებისას შეგიძლია ერთი შეხებით ჩასვა და არ აკრიფო თავიდან.',
      'about-feature2': '<strong>განწყობა მანამდე/შემდეგ:</strong> რეალური შეფასების დროს შეგიძლია ჩაწერო განწყობა აქტივობამდე და აქტივობის შემდეგ. ეს აჩვენებს არა მხოლოდ სიამოვნებასა და ოსტატობას, არამედ იმასაც, მართლა აუმჯობესებს თუ არა აქტივობა შენს ზოგად მდგომარეობას.',
      'about-feature3': '<strong>გრაფიკის ფილტრი:</strong> Insights-ში გრაფიკზე არის არჩევანი: „ყველა“ ნაგულისხმევად აჩვენებს ყველაფერს ერთად, ხოლო „მხოლოდ განწყობა“, „მხოლოდ სიამოვნება“ და „მხოლოდ ოსტატობა“ ტოვებს მხოლოდ არჩეულ კატეგორიას, რომ გრაფიკი უფრო სუფთა და გასაგები იყოს.',
      'about-feature4': '<strong>გრაფიკის წარწერები s/f ფორმატით:</strong> გრაფიკზე კურსორის გადატარებისას ან შეხებისას მნიშვნელობები ჩანს წერტილებთან ახლოს. s50 ნიშნავს საწყის/პროგნოზირებულ მნიშვნელობას 50-ს, ხოლო f49 ნიშნავს საბოლოო/რეალურ მნიშვნელობას 49-ს. იგივე წესია განწყობისთვის, სიამოვნებისთვის და ოსტატობისთვის.',
      'about-feature5': '<strong>არაგადაფარული ყუთები გრაფიკზე:</strong> თუ ერთ დღეში ბევრი წერტილია ახლოს, წარწერების ყუთები ავტომატურად გადანაცვლდება ისე, რომ ერთმანეთს არ გადაეფაროს და ყველა რიცხვი წაკითხვადი დარჩეს.',
      'about-feature6': '<strong>რა მუშაობს ყველაზე კარგად:</strong> ეს დაფა აჩვენებს, რომელი აქტივობები გაძლევს ყველაზე ძლიერ შედეგს განწყობაში, ოსტატობასა და სიამოვნებაში. თითოეულში ჩანს როგორც საბოლოო ქულა, ისე სხვაობა საწყის/პროგნოზირებულ და საბოლოო/რეალურ ქულას შორის.',
      'about-feature7': '<strong>დალაგება სხვაობით ან საბოლოო ქულით:</strong> „სხვაობით დალაგება“ გიჩვენებს, რომელმა აქტივობამ მოგცა ყველაზე დიდი გაუმჯობესება. „საბოლოო ქულით დალაგება“ გიჩვენებს, რომელი აქტივობები სრულდება ყველაზე მაღალი შედეგით, თუნდაც გაუმჯობესება დიდი არ იყოს.',
      'about-feature8': '<strong>შეუზღუდავი აქტივობების სია:</strong> საუკეთესო აქტივობების დაფა აღარ არის შეზღუდული მხოლოდ ტოპ 5-ით. თუ მონაცემი გაქვს, შეგიძლია ნახო ყველა აქტივობა და შეადარო უფრო ფართო სურათი.',
      'about-feature9': '<strong>ღრმა ანალიზი ერთი აქტივობისთვის:</strong> აირჩიე კონკრეტული აქტივობა და ნახე მისი განწყობა, ოსტატობა და სიამოვნება ერთად: რამდენი იყო საბოლოო ქულა, რამდენით შეიცვალა და რამდენ ჩანაწერს ეფუძნება დასკვნა.',

  const LANG_STORAGE_KEY = 'ba_lang_v1';
  let currentLang = 'ka'; // default

  function t(key, params) {
    let str = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    if (params) {
      Object.keys(params).forEach(p => {
        str = str.replace(`{${p}}`, params[p]);
      });
    }
    return str;
  }

  function applyTranslations() {
    document.documentElement.setAttribute('lang', currentLang);
    // Text content nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    // HTML content (for attribution / footer-2 with <em> / <strong>)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      el.innerHTML = t(el.getAttribute('data-i18n-html'));
    });
    // Placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.setAttribute('placeholder', t(el.getAttribute('data-i18n-placeholder')));
    });
    // Confirm modal default message
    const cmsg = document.getElementById('confirm-message');
    if (cmsg) cmsg.textContent = t('confirm-delete');
    // Update lang button highlight
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
    // Re-render dynamic views since their text is built in JS
    if (document.getElementById('view-log').classList.contains('active')) renderLog();
    if (document.getElementById('view-insights').classList.contains('active')) renderInsights();
    // Rebuild day select labels (Today/Tomorrow change with language)
    if (document.getElementById('scheduled-day').options.length > 0) {
      const currentVal = document.getElementById('scheduled-day').value;
      populateDaySelect();
      document.getElementById('scheduled-day').value = currentVal;
    }
    // Re-render templates list and refresh save-template button label
    if (typeof renderTemplates === 'function') renderTemplates();
    if (typeof updateSaveTemplateBtn === 'function') updateSaveTemplateBtn();
  }

  function setLang(lang) {
    currentLang = ['ka', 'en', 'ru'].includes(lang) ? lang : 'ka';
    try { localStorage.setItem(LANG_STORAGE_KEY, currentLang); } catch(e) {}
    applyTranslations();
  }

  // Load saved preference (defaults to Georgian)
  try {
    const saved = localStorage.getItem(LANG_STORAGE_KEY);
    if (['ka', 'en', 'ru'].includes(saved)) currentLang = saved;
  } catch(e) {}

  // ============ STATE ============

    parts: {

      'pred-pleasure': { tens: null, ones: null },
