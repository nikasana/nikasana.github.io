      <div class="chart-container">
        <div class="chart-title">${t('chart-title')}</div>
        <div class="chart-empty">${t('chart-empty')}</div>
      </div>`;

    c.innerHTML = `
      ${chartBlock}

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-num accent">${state.entries.length}</div>
          <div class="stat-label">${t('stat-total')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-num accent">${completed.length}</div>
          <div class="stat-label">${t('stat-rated')}</div>
        </div>
        <div class="stat-card">
          <div class="stat-num accent">${currentStreak}</div>
          <div class="stat-label">${t('stat-current-streak') || 'CURRENT STREAK'} <span class="streak-fire ${todayTracked ? 'active' : 'inactive'}" title="${todayTracked ? 'Today tracked' : 'Today not tracked'}">🔥</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-num accent">${bestStreak}</div>
          <div class="stat-label">${t('stat-best-streak') || 'BEST STREAK'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-num mastery">${avgActM.toFixed(1)}</div>
          <div class="stat-label">${t('stat-mastery')} ${avgPredM.toFixed(1)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-num pleasure">${avgActP.toFixed(1)}</div>
          <div class="stat-label">${t('stat-pleasure')} ${avgPredP.toFixed(1)}</div>
        </div>
      </div>

      ${liftDashboardBlock}

      ${deepAnalysisBlock}

      <div class="insight">
        <div class="insight-label">${t('insight-pattern')}</div>
        <div class="insight-text">"${t(insightKey)}"</div>
      </div>

      <div class="insight">
        <div class="insight-label">${t('insight-gap')}</div>
        <div class="insight-text" style="font-style: normal; font-family: 'JetBrains Mono', 'Noto Sans Georgian', monospace; font-size: 13px;">
          ${t('insight-mastery')}: ${mGap >= 0 ? '+' : ''}${mGap.toFixed(1)}<br>
          ${t('insight-pleasure')}: ${pGap >= 0 ? '+' : ''}${pGap.toFixed(1)}
        </div>
      </div>

      ${dataActionsHtml}

      <div class="ornament">· · ·</div>
      <p class="subtitle" style="text-align: center; font-style: italic;">
        ${t('insight-footer')}
      </p>
    `;
    attachDataActionHandlers();
    attachDashboardSortHandler();
    attachDeepAnalysisHandlers(completed);
    attachChartHover(chartData);
  }

  // Currently-rendered chart data + helpers for the hover handler.
  // Stored at module scope so resize/move handlers can reference it.
  let _chartData = null;

  function attachChartHover(chartData) {
    _chartData = chartData;
    if (!chartData) return;
    const svg = document.querySelector('.chart-container .chart-svg');
    if (!svg) return;

    // Move handler: find the nearest data point and show its values.
    const onMove = (clientX) => {
      const rect = svg.getBoundingClientRect();
      // Convert client x → svg viewBox x using the same ratio
      const ratio = chartData.W / rect.width;
      const svgX = (clientX - rect.left) * ratio;
      // Pick the point with the smallest |x - svgX|
      let best = 0, bestDist = Infinity;
      for (let i = 0; i < chartData.points.length; i++) {
        const d = Math.abs(chartData.points[i].x - svgX);
        if (d < bestDist) { bestDist = d; best = i; }
      }
      updateHoverDisplay(best);
    };

    const onMouseMove = (ev) => onMove(ev.clientX);
    const onTouchMove = (ev) => {
      if (ev.touches && ev.touches[0]) {
        onMove(ev.touches[0].clientX);
        ev.preventDefault();
      }
    };
    const onLeave = () => clearHoverDisplay();

    svg.addEventListener('mousemove', onMouseMove);
    svg.addEventListener('mouseleave', onLeave);
    svg.addEventListener('touchstart', onTouchMove, { passive: false });
    svg.addEventListener('touchmove',  onTouchMove, { passive: false });
    svg.addEventListener('touchend',   onLeave);
  }

  function updateHoverDisplay(index) {
    if (!_chartData) return;
    const point = _chartData.points[index];
    if (!point) return;
    const svg = document.querySelector('.chart-container .chart-svg');
    if (!svg) return;

    const { pad, plotH, W } = _chartData;
    const x = point.x;

    // Move crosshair
    const cross = svg.querySelector('.crosshair');
    if (cross) {
      cross.setAttribute('x1', x);
      cross.setAttribute('x2', x);
    }

    const series = [
      { key: 'predP', value: point.entry.predPleasure, yPos: point.ys.predP },
      { key: 'actP',  value: point.entry.actPleasure,  yPos: point.ys.actP },
      { key: 'predM', value: point.entry.predMastery,  yPos: point.ys.predM },
      { key: 'actM',  value: point.entry.actMastery,   yPos: point.ys.actM },
      { key: 'moodB', value: point.entry.moodBefore,   yPos: point.ys.moodB },
      { key: 'moodA', value: point.entry.moodAfter,    yPos: point.ys.moodA },
    ];

    series.forEach(s => {
      const dot = svg.querySelector(`.dot-${s.key}`);
      const tag = svg.querySelector(`.tag-${s.key}`);
      if (!dot || !tag) return;
      // Hide if no value (e.g. mood not set on this entry)
      if (typeof s.value !== 'number' || s.yPos == null) {
        dot.setAttribute('opacity', '0');
        tag.setAttribute('opacity', '0');
        return;
      }
      dot.setAttribute('opacity', dot.classList.contains('dot-predP') || dot.classList.contains('dot-predM') || dot.classList.contains('dot-moodB') ? '0.85' : '1');
      dot.setAttribute('cx', x);
      dot.setAttribute('cy', s.yPos);

      // Position tag to the side of the dot so it doesn't cover the line.
      // Right of point unless near the right edge, in which case flip left.
      const TAG_W = String(s.value).length >= 3 ? 30 : 24;
      const offset = 8;
      let tagX = x + offset;
      if (tagX + TAG_W > W - 2) tagX = x - offset - TAG_W;
      tag.setAttribute('opacity', '1');
      const rect = tag.querySelector('rect');
      const text = tag.querySelector('text');
      rect.setAttribute('x', tagX);
      rect.setAttribute('y', s.yPos - 7);
      rect.setAttribute('width', TAG_W);
      // Stroke color picks up from the series
      const strokeColor =
        s.key === 'predP' || s.key === 'actP' ? 'var(--pleasure)'
      : s.key === 'predM' || s.key === 'actM' ? 'var(--mastery)'
      : 'var(--mood)';
      rect.setAttribute('stroke', strokeColor);
      text.setAttribute('x', tagX + TAG_W / 2);
      text.setAttribute('y', s.yPos + 0.5);
      text.setAttribute('fill', strokeColor);
      text.textContent = s.value;
    });

    svg.classList.add('has-hover');

    // Update tooltip card below the chart
    const tt = document.getElementById('chart-tooltip');
    if (tt) {
      tt.classList.remove('empty');
      tt.innerHTML = renderTooltipCard(point.entry);
    }
  }

  function clearHoverDisplay() {
    const svg = document.querySelector('.chart-container .chart-svg');
    if (svg) svg.classList.remove('has-hover');
    const tt = document.getElementById('chart-tooltip');
    if (tt) {
      tt.classList.add('empty');
      tt.textContent = t('chart-hover-hint');
    }
  }

  function renderTooltipCard(entry) {
    const ts = entryStartTimestamp(entry);
    const d = new Date(ts);
    const dateStr = d.toLocaleDateString(currentLang === 'ka' ? 'ka-GE' : 'en-US', { month: 'short', day: 'numeric' });
    const h = d.getHours();
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);

    const cellNum = (val, cls) =>
      typeof val === 'number'
        ? `<span class="val ${cls}">${val}</span>`
        : `<span class="val empty">—</span>`;

    return `
      <div class="chart-tooltip-header">
        <div class="chart-tooltip-activity">${escapeHtml(entry.activity)}${entry.company ? ` · ${escapeHtml(entry.company)}` : ''}</div>
        <div class="chart-tooltip-date">${dateStr} · ${h12} ${ampm}</div>
      </div>
      <div class="chart-tooltip-grid">
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-mastery')} (${t('chart-pred-short')})</span>
          ${cellNum(entry.predMastery, 'mastery')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-mastery')} (${t('chart-act-short')})</span>
          ${cellNum(entry.actMastery, 'mastery')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-pleasure')} (${t('chart-pred-short')})</span>
          ${cellNum(entry.predPleasure, 'pleasure')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-pleasure')} (${t('chart-act-short')})</span>
          ${cellNum(entry.actPleasure, 'pleasure')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('label-mood-before')}</span>
          ${cellNum(entry.moodBefore, 'mood')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('label-mood-after')}</span>
          ${cellNum(entry.moodAfter, 'mood')}
        </div>
      </div>`;
  }

  function attachDataActionHandlers() {
    const exp = document.getElementById('export-btn');
    const imp = document.getElementById('import-btn');
    if (exp) exp.addEventListener('click', exportData);
    if (imp) imp.addEventListener('click', triggerImport);
  }

  // ============ EXPORT / IMPORT ============
  function exportData() {
    const payload = {
      app: 'pleasure-predicting-sheet',
      version: 1,
      exportedAt: new Date().toISOString(),
      lang: currentLang,
      entries: state.entries,
      templates: state.templates,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    a.href = url;
    a.download = `pleasure-predicting-sheet-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(t('toast-exported'));
  }

  function triggerImport() {
    document.getElementById('import-file-input').click();
  }

  // Show the import choice modal: returns 'merge' | 'replace' | null (cancel)
  function showImportChoice(message) {
    return new Promise(resolve => {
      const overlay = document.getElementById('import-choice-overlay');
      document.getElementById('import-choice-message').textContent = message;
      overlay.classList.add('show');

      const cancelBtn  = document.getElementById('import-choice-cancel');
      const mergeBtn   = document.getElementById('import-choice-merge');
      const replaceBtn = document.getElementById('import-choice-replace');

      const cleanup = (result) => {
        overlay.classList.remove('show');
        cancelBtn.removeEventListener('click', onCancel);
        mergeBtn.removeEventListener('click', onMerge);
        replaceBtn.removeEventListener('click', onReplace);
        overlay.removeEventListener('click', onBackdrop);
        resolve(result);
      };
      const onCancel  = () => cleanup(null);
      const onMerge   = () => cleanup('merge');
      const onReplace = () => cleanup('replace');
      const onBackdrop = (e) => { if (e.target === overlay) cleanup(null); };

      cancelBtn.addEventListener('click', onCancel);
      mergeBtn.addEventListener('click', onMerge);
      replaceBtn.addEventListener('click', onReplace);
      overlay.addEventListener('click', onBackdrop);
    });
  }

  async function handleImportFile(file) {
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      let imported = [];
      let importedTemplates = [];

      // Accept either { entries: [...] } or a bare array
      if (Array.isArray(data)) {
        imported = data;
      } else if (data && Array.isArray(data.entries)) {
        imported = data.entries;
        if (Array.isArray(data.templates)) importedTemplates = data.templates;
      } else {
        throw new Error('Invalid format');
      }

      // Validate minimum entry shape
      const valid = imported.filter(e =>
        e && typeof e === 'object' &&
        typeof e.activity === 'string' &&
        typeof e.predMastery === 'number' &&
        typeof e.predPleasure === 'number'
      );

      if (valid.length === 0) {
        showToast(t('toast-import-failed'));
        return;
      }

      // Ask the user: merge into existing, replace existing, or cancel
      const choice = await showImportChoice(t('import-choose-msg', { n: valid.length }));
      if (!choice) return;

      // If user chose "replace", require an extra confirmation since it's destructive
      if (choice === 'replace') {
        const confirmReplace = await showConfirm(t('replace-confirm'));
        if (!confirmReplace) return;
        await performImportReplace(valid, importedTemplates);
      } else {
        await performImportMerge(valid, importedTemplates);
      }
    } catch (err) {
      console.error('Import error:', err);
      showToast(t('toast-import-failed'));
    }
  }

  function normalizeImportedEntry(e, takeIdOnlyIfFree, existingIds) {
    // Generate a fresh id whenever the original would collide (or if asked to always re-id)
    const safeId =
      takeIdOnlyIfFree && e.id && !existingIds.has(e.id)
        ? e.id
        : ('e_imp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7));
    return {
      id: safeId,
      activity: e.activity,
      company: e.company || '',
      predMastery: e.predMastery,
      predPleasure: e.predPleasure,
      actMastery: typeof e.actMastery === 'number' ? e.actMastery : null,
      actPleasure: typeof e.actPleasure === 'number' ? e.actPleasure : null,
      moodBefore: typeof e.moodBefore === 'number' ? e.moodBefore : null,
      moodAfter: typeof e.moodAfter === 'number' ? e.moodAfter : null,
      createdAt: e.createdAt || Date.now(),
      scheduledAt: e.scheduledAt || e.createdAt || Date.now(),
      completedAt: e.completedAt || null,
    };
  }

  // Merge: keep existing entries and append imported ones (skip exact id collisions
  // by minting fresh ids for duplicates).
  async function performImportMerge(validEntries, importedTemplates) {
    const existingIds = new Set(state.entries.map(e => e.id));
    let addedCount = 0;
    for (const e of validEntries) {
      const normalized = normalizeImportedEntry(e, true, existingIds);
      state.entries.push(normalized);
      existingIds.add(normalized.id);
      if (useWindowStorage) {
        try { await window.storage.set('entry:' + normalized.id, JSON.stringify(normalized)); } catch(_) {}
      }
      addedCount++;
    }
    // Merge templates (deduplicated by addTemplate)
    for (const tpl of importedTemplates) {
      if (typeof tpl === 'string' && tpl.trim()) addTemplate(tpl);
    }
    sortEntries();
    saveToLocalStorage();
    renderInsights();
    showToast(t('toast-imported-merged', { n: addedCount }));
  }

  // Replace: delete all existing entries (from window.storage if present and
  // localStorage), then load only the imported ones. Templates are also replaced.
  async function performImportReplace(validEntries, importedTemplates) {
    // Delete every existing entry from window.storage
    if (useWindowStorage) {
      for (const e of state.entries) {
        try { await window.storage.delete('entry:' + e.id); } catch(_) {}
      }
    }
    // Clear in-memory state
    state.entries = [];
    state.templates = [];

    // Write the new entries
    const existingIds = new Set();
    for (const e of validEntries) {
      const normalized = normalizeImportedEntry(e, true, existingIds);
      state.entries.push(normalized);
      existingIds.add(normalized.id);
      if (useWindowStorage) {
        try { await window.storage.set('entry:' + normalized.id, JSON.stringify(normalized)); } catch(_) {}
      }
    }
    // Replace templates
    for (const tpl of importedTemplates) {
      if (typeof tpl === 'string' && tpl.trim()) addTemplate(tpl);
    }
    sortEntries();
    saveToLocalStorage();
    saveTemplates();
    renderInsights();
    showToast(t('toast-imported-replaced', { n: validEntries.length }));
  }

  // Wire up file input change
  document.getElementById('import-file-input').addEventListener('change', (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (file) handleImportFile(file);
    // Reset so the same file can be selected again
    ev.target.value = '';
  });

  function avg(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ============ TOAST ============
  let toastTimer;
  function showToast(msg) {
    const toastEl = document.getElementById('toast');
    if (!toastEl) return;
    toastEl.textContent = msg;
    // Force a reflow so reopening immediately re-triggers the animation
    toastEl.classList.remove('show');
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }

  // ============ INIT ============
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  ['pred-mastery', 'pred-pleasure', 'act-mastery', 'act-pleasure', 'mood-before', 'mood-after'].forEach(key => {
    const tensRow = document.querySelector(`.scale-row.tens[data-scale="${key}"]`);
    const onesRow = document.querySelector(`.scale-row.ones[data-scale="${key}"]`);
    if (tensRow) buildScale(tensRow, key, 'tens');
    if (onesRow) buildScale(onesRow, key, 'ones');
  });

  // Set up mood scale-pairs (handled by the standard scale init below)

  // Load and render templates
  loadTemplates();
  renderTemplates();
  updateSaveTemplateBtn();

  // Wire up language switcher buttons (event delegation so it works
  // even if buttons are re-rendered)
  document.addEventListener('click', (ev) => {
    const btn = ev.target.closest('.lang-btn');
    if (!btn) return;
    setLang(btn.dataset.lang);
  });

  // Apply translations on initial load (uses saved preference or default ka)
  applyTranslations();

  loadEntries().then(() => {
    // Ready
    // Re-render in case log/insights tab was active (it's not by default, but safe)
    applyTranslations();
  });
</script>
