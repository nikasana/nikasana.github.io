      'import-choose-msg': 'Found {n} entries in the file. Merge them into your existing data, or replace everything?',
      'btn-merge': 'Merge',
      'btn-replace': 'Replace',
      'replace-confirm': 'Replace will delete all existing entries and load only those from the file. Are you sure?',
      'toast-imported-merged': '{n} entries merged.',
      'toast-imported-replaced': 'Replaced with {n} entries.',

      // === Edit ===
      'edit-save': 'Save',
      'edit-title-activity': 'Edit Activity',
      'edit-title-time': 'Edit Time',
      'edit-title-pred-mastery': 'Edit Predicted Mastery',
      'edit-title-pred-pleasure': 'Edit Predicted Pleasure',
      'edit-title-act-mastery': 'Edit Actual Mastery',
      'edit-title-act-pleasure': 'Edit Actual Pleasure',
      'edit-title-mood-before': 'Edit Mood Before',
      'edit-title-mood-after': 'Edit Mood After',
      'edit-title-company': 'Edit With Whom',
      'toast-edit-saved': 'Saved.',
    }
  };

  const LANG_STORAGE_KEY = 'ba_lang_v1';
  let currentLang = 'ka'; // default

  function t(key, params) {
    let str = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    if (params) {
      Object.keys(params).forEach(p => {
        str = str.replace(`{${p}}`, params[p]);
      });
    }
    return str;
  }

  function applyTranslations() {
    document.documentElement.setAttribute('lang', currentLang);
    // Text content nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    // HTML content (for attribution / footer-2 with <em> / <strong>)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      el.innerHTML = t(el.getAttribute('data-i18n-html'));
    });
    // Placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.setAttribute('placeholder', t(el.getAttribute('data-i18n-placeholder')));
    });
    // Confirm modal default message
    const cmsg = document.getElementById('confirm-message');
    if (cmsg) cmsg.textContent = t('confirm-delete');
    // Update lang button highlight
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
    // Re-render dynamic views since their text is built in JS
    if (document.getElementById('view-log').classList.contains('active')) renderLog();
    if (document.getElementById('view-insights').classList.contains('active')) renderInsights();
    // Rebuild day select labels (Today/Tomorrow change with language)
    if (document.getElementById('scheduled-day').options.length > 0) {
      const currentVal = document.getElementById('scheduled-day').value;
      populateDaySelect();
      document.getElementById('scheduled-day').value = currentVal;
    }
    // Re-render templates list and refresh save-template button label
    if (typeof renderTemplates === 'function') renderTemplates();
    if (typeof updateSaveTemplateBtn === 'function') updateSaveTemplateBtn();
  }

  function setLang(lang) {
    currentLang = (lang === 'en') ? 'en' : 'ka';
    try { localStorage.setItem(LANG_STORAGE_KEY, currentLang); } catch(e) {}
    applyTranslations();
  }

  // Load saved preference (defaults to Georgian)
  try {
    const saved = localStorage.getItem(LANG_STORAGE_KEY);
    if (saved === 'en' || saved === 'ka') currentLang = saved;
  } catch(e) {}

  // ============ STATE ============
  // For each scale key, track tens (0-100 step 10) and ones (0-9). Total = tens + ones, capped at 100.
  const state = {
    parts: {
      'pred-mastery':  { tens: null, ones: null },
      'pred-pleasure': { tens: null, ones: null },
      'act-mastery':   { tens: null, ones: null },
      'act-pleasure':  { tens: null, ones: null },
      'mood-before':   { tens: null, ones: null },
      'mood-after':    { tens: null, ones: null },
    },
    entries: [],
    templates: [],
    ratingEntryId: null,
    logFilterDate: null, // null = show all dates; otherwise a day-start timestamp (ms)
    analysisActivityKey: null,
    dashboardSort: 'diff',
  };

  // Get the resolved total for a scale key (or null if incomplete)
  function getTotal(key) {
    const p = state.parts[key];
    if (p.tens === null || p.ones === null) return null;
    // If tens is 100, ones must be 0
    if (p.tens === 100) return 100;
    return p.tens + p.ones;
  }

  // ============ STORAGE ============
  // Try window.storage first (Claude persistent storage across sessions);
  // fall back to localStorage if it's unavailable or errors out.
  const STORAGE_KEY = 'ba_entries_v1';
  const TEMPLATES_KEY = 'ba_templates_v1';
  let useWindowStorage = !!(window.storage && typeof window.storage.set === 'function');

  function sortEntries() {
    // Show entries by the activity's starting/scheduled date; fall back to createdAt.
    state.entries.sort((a, b) => entryStartTimestamp(b) - entryStartTimestamp(a));
  }

  async function loadEntries() {
    // Try window.storage first
    if (useWindowStorage) {
      try {
        const result = await window.storage.list('entry:');
        if (result && result.keys && result.keys.length > 0) {
          const loaded = [];
          for (const key of result.keys) {
            try {
              const r = await window.storage.get(key);
              if (r && r.value) loaded.push(JSON.parse(r.value));
            } catch(e) { /* skip */ }
          }
          state.entries = loaded;
          sortEntries();
          return;
        } else if (result) {
          // No entries yet but storage works
          state.entries = [];
          // Also check localStorage for any prior data and migrate
          loadFromLocalStorage();
          return;
        }
      } catch(e) {
        useWindowStorage = false;
      }
    }
    loadFromLocalStorage();
  }

  function loadFromLocalStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          // Merge with any existing state.entries (from window.storage)
          const existingIds = new Set(state.entries.map(e => e.id));
          for (const e of parsed) {
            if (!existingIds.has(e.id)) state.entries.push(e);
          }
          state.entries.sort((a, b) => entryStartTimestamp(b) - entryStartTimestamp(a));
        }
      }
    } catch(e) { /* ignore */ }
  }

  function saveToLocalStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
      return true;
    } catch(e) {
      return false;
    }
  }

  // ============ TEMPLATES ============
  function loadTemplates() {
    try {
      const raw = localStorage.getItem(TEMPLATES_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) state.templates = parsed;
      }
    } catch(e) { /* ignore */ }
  }

  function saveTemplates() {
    try {
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(state.templates));
      return true;
    } catch(e) {
      return false;
    }
  }

  function addTemplate(activityText) {
    const trimmed = activityText.trim();
    if (!trimmed) return false;
    // Don't duplicate
    if (state.templates.some(t => t.toLowerCase() === trimmed.toLowerCase())) return false;
    state.templates.unshift(trimmed);
    // Cap at 20 templates to prevent runaway
    if (state.templates.length > 20) state.templates = state.templates.slice(0, 20);
    saveTemplates();
    return true;
  }

  function removeTemplate(activityText) {
    state.templates = state.templates.filter(t => t !== activityText);
    saveTemplates();
  }

  function isTemplate(activityText) {
    const trimmed = activityText.trim().toLowerCase();
    return state.templates.some(t => t.toLowerCase() === trimmed);
  }

  function renderTemplates() {
    const container = document.getElementById('templates-list-container');
    if (!container) return;
    if (state.templates.length === 0) {
      container.innerHTML = `<div class="templates-empty">${t('templates-empty')}</div>`;
      return;
    }
    container.innerHTML = `<div class="templates-list">${
      state.templates.map((tpl, i) =>
        `<div class="template-chip" data-tpl-index="${i}">
          <span class="template-text">${escapeHtml(tpl)}</span>
          <span class="remove" data-tpl-remove="${i}">×</span>
        </div>`
      ).join('')
    }</div>`;

    // Wire up tap-to-fill and remove
    container.querySelectorAll('.template-chip').forEach(chip => {
      chip.addEventListener('click', (ev) => {
        // If remove was clicked, handle separately
        if (ev.target.dataset.tplRemove !== undefined) {
          ev.stopPropagation();
          handleRemoveTemplate(parseInt(ev.target.dataset.tplRemove));
          return;
        }
        const idx = parseInt(chip.dataset.tplIndex);
        const activityInput = document.getElementById('activity');
        if (activityInput && state.templates[idx]) {
          activityInput.value = state.templates[idx];
          activityInput.dispatchEvent(new Event('input'));
          showToast(state.templates[idx]);
          activityInput.focus();
        }
      });
    });
  }

  async function handleRemoveTemplate(index) {
    const tpl = state.templates[index];
    if (!tpl) return;
    const ok = await showConfirm(t('template-delete-confirm'));
    if (!ok) return;
    removeTemplate(tpl);
    renderTemplates();
    updateSaveTemplateBtn();
    showToast(t('toast-template-removed'));
  }

  function updateSaveTemplateBtn() {
    const btn = document.getElementById('save-template-btn');
    if (!btn) return;
    const activityInput = document.getElementById('activity');
    if (!activityInput) return;
    const val = activityInput.value.trim();
    if (!val) {
      btn.disabled = true;
      btn.classList.remove('saved');
      btn.textContent = t('btn-save-template');
      return;
    }
    if (isTemplate(val)) {
      btn.disabled = true;
      btn.classList.add('saved');
      btn.textContent = t('btn-template-saved');
    } else {
      btn.disabled = false;
      btn.classList.remove('saved');
      btn.textContent = t('btn-save-template');
    }
  }

  async function saveEntry(entry) {
    // Update in-memory list first
    const idx = state.entries.findIndex(e => e.id === entry.id);
    if (idx >= 0) state.entries[idx] = entry;
    // else: caller handles insertion

    let savedSomewhere = false;

    if (useWindowStorage) {
      try {
        await window.storage.set('entry:' + entry.id, JSON.stringify(entry));
        savedSomewhere = true;
      } catch(e) {
        useWindowStorage = false;
      }
    }

    // Always also save to localStorage as a safety net
    if (saveToLocalStorage()) savedSomewhere = true;

    if (!savedSomewhere) {
      showToast(t('toast-failed'));
    }
    return savedSomewhere;
  }

  async function deleteEntry(id) {
    state.entries = state.entries.filter(e => e.id !== id);
    if (useWindowStorage) {
      try { await window.storage.delete('entry:' + id); } catch(e) { /* ignore */ }
    }
    saveToLocalStorage();
    return true;
  }

  // ============ SCALES ============
  function buildScale(container, key, part) {
    container.innerHTML = '';
    const color = key.startsWith('mood-') ? 'mood'
                : key.includes('mastery') ? 'mastery'
                : 'pleasure';
    const max = part === 'tens' ? 100 : 9;
    const step = part === 'tens' ? 10 : 1;
    for (let i = 0; i <= max; i += step) {
      const btn = document.createElement('button');
      btn.className = 'scale-btn';
      btn.textContent = i;
      btn.dataset.value = i;
      btn.addEventListener('click', () => selectPart(key, part, i, container, color));
      container.appendChild(btn);
    }
  }

  function selectPart(key, part, value, container, color) {
    // If user picks tens=100, force ones to 0 and disable
    state.parts[key][part] = value;
    if (part === 'tens' && value === 100) {
      state.parts[key].ones = 0;
    }

    // Highlight the selected button in this row
    container.querySelectorAll('.scale-btn').forEach(b => {
      b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
      if (parseInt(b.dataset.value) === value) b.classList.add('selected', color);
    });

    // If tens=100, also visually mark ones=0 and gray out other ones buttons
    if (part === 'tens') {
      const onesRow = document.querySelector(`.scale-row.ones[data-scale="${key}"]`);
      if (onesRow) {
        if (value === 100) {
          onesRow.querySelectorAll('.scale-btn').forEach(b => {
            b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
            if (parseInt(b.dataset.value) === 0) b.classList.add('selected', color);
            b.style.opacity = parseInt(b.dataset.value) === 0 ? '1' : '0.3';
            b.style.pointerEvents = parseInt(b.dataset.value) === 0 ? 'auto' : 'none';
          });
        } else {
          onesRow.querySelectorAll('.scale-btn').forEach(b => {
            b.style.opacity = '';
            b.style.pointerEvents = '';
          });
        }
      }
    }

    updateTotalDisplay(key, color);
    updateSaveButtons();
  }

  function updateTotalDisplay(key, color) {
    const total = getTotal(key);
    const el = document.querySelector(`[data-total="${key}"]`);
    if (!el) return;
    el.classList.remove('pleasure', 'mastery', 'mood', 'empty');
    if (total === null) {
      el.textContent = '—';
      el.classList.add('empty');
    } else {
      el.textContent = total;
      el.classList.add(color);
    }
  }

  function resetScaleKey(key) {
    state.parts[key].tens = null;
    state.parts[key].ones = null;
    document.querySelectorAll(`.scale-row[data-scale="${key}"] .scale-btn`).forEach(b => {
      b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
      b.style.opacity = '';
      b.style.pointerEvents = '';
    });
    const el = document.querySelector(`[data-total="${key}"]`);
    if (el) {
      el.classList.remove('pleasure', 'mastery', 'mood');
      el.classList.add('empty');
      el.textContent = '—';
    }
  }

  function updateSaveButtons() {
    const activity = document.getElementById('activity').value.trim();
    const canSave = activity && getTotal('pred-mastery') !== null && getTotal('pred-pleasure') !== null;
    document.getElementById('save-btn').disabled = !canSave;

    // Require all four post-activity values to enable Save Actual Ratings,
    // so the button matches the same "fully rated" rule used by the log.
    const canRate =
      getTotal('act-mastery')  !== null &&
      getTotal('act-pleasure') !== null &&
      getTotal('mood-before')  !== null &&
      getTotal('mood-after')   !== null;
    document.getElementById('save-rating-btn').disabled = !canRate;
  }

  // ============ VIEWS ============
  function switchView(name) {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.view === name));
    document.querySelectorAll('.view').forEach(v => {
      if (v.id === 'view-rate') return;
      v.classList.toggle('active', v.id === 'view-' + name);
    });
    // Hide view-rate. On desktop, our grid CSS rule has `!important` and is
    // gated on .active, so we MUST also remove .active here — otherwise the
    // inline display:none gets overridden and view-rate stays visible.
    const rateEl = document.getElementById('view-rate');
    rateEl.classList.remove('active');
    rateEl.style.display = 'none';
    if (name === 'log') renderLog();
    if (name === 'insights') renderInsights();
  }

  // ============ NEW ENTRY ============
  document.getElementById('save-btn').addEventListener('click', async () => {
    const activity = document.getElementById('activity').value.trim();
    const company = document.getElementById('company').value.trim();
    const scheduledAt = getScheduledTimestamp();
    const entry = {
      id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      activity,
      company,
      predMastery: getTotal('pred-mastery'),
      predPleasure: getTotal('pred-pleasure'),
      actMastery: null,
      actPleasure: null,
      moodBefore: null,
      moodAfter: null,
      createdAt: Date.now(),
      scheduledAt,
      completedAt: null,
    };
    state.entries.unshift(entry);
    sortEntries();
    const ok = await saveEntry(entry);
    if (ok) {
      document.getElementById('activity').value = '';
      document.getElementById('company').value = '';
      resetScaleKey('pred-mastery');
      resetScaleKey('pred-pleasure');
      // Reset time to current hour
      setTimeFromHourOffset(0);
      document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('active'));
      updateSaveButtons();
      updateSaveTemplateBtn();
      showToast(t('toast-saved'));
      switchView('log');
    } else {
      state.entries = state.entries.filter(e => e.id !== entry.id);
    }
  });

  document.getElementById('activity').addEventListener('input', () => {
    updateSaveButtons();
    updateSaveTemplateBtn();
  });

  // Save-as-template button
  document.getElementById('save-template-btn').addEventListener('click', () => {
    const val = document.getElementById('activity').value.trim();
    if (!val) return;
    const added = addTemplate(val);
    if (added) {
      renderTemplates();
      updateSaveTemplateBtn();
      showToast(t('toast-template-saved'));
    }
  });

  // ============ TIME PICKER ============
  // Hour-only granularity, matching the BA pleasure-predicting sheet:
  // pick a day (Today / Tomorrow / +N days) and an hour (0–23).
  function populateDaySelect() {
    const sel = document.getElementById('scheduled-day');
    sel.innerHTML = '';
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const labels = [t('day-today'), t('day-tomorrow')];
    for (let i = 0; i < 14; i++) {
      const d = new Date(today.getTime() + i * 86400000);
      const opt = document.createElement('option');
      opt.value = d.getTime();
      if (i < 2) {
        opt.textContent = labels[i];
      } else {
        opt.textContent = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      }
      sel.appendChild(opt);
    }
  }

  function populateHourSelect() {
    const sel = document.getElementById('scheduled-hour');
    sel.innerHTML = '';
    for (let h = 0; h < 24; h++) {
      const opt = document.createElement('option');
      opt.value = h;
      // 12-hour format with AM/PM for readability
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
      opt.textContent = `${h12}:00 ${ampm}`;
      sel.appendChild(opt);
    }
  }

  // Get the timestamp from current select values
  function getScheduledTimestamp() {
    const dayMs = parseInt(document.getElementById('scheduled-day').value);
    const hour = parseInt(document.getElementById('scheduled-hour').value);
    return dayMs + hour * 3600000;
  }

  // Set selects from an offset in hours from "now" (rounded to nearest hour)
  function setTimeFromHourOffset(hoursFromNow) {
    const target = new Date(Date.now() + hoursFromNow * 3600000);
    const dayStart = new Date(target);
    dayStart.setHours(0, 0, 0, 0);
    document.getElementById('scheduled-day').value = dayStart.getTime();
    document.getElementById('scheduled-hour').value = target.getHours();
  }

  // Preset buttons
  document.querySelectorAll('.time-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      const hrs = parseInt(btn.dataset.hours);
      setTimeFromHourOffset(hrs);
      document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Clear preset highlight when user manually changes day or hour
  ['scheduled-day', 'scheduled-hour'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('active'));
    });
  });

  // Initial population + default to current hour
  populateDaySelect();
  populateHourSelect();
  setTimeFromHourOffset(0);

  // ============ RATE ENTRY ============
  function openRate(id) {
    const entry = state.entries.find(e => e.id === id);
    if (!entry) return;
    state.ratingEntryId = id;
    document.getElementById('rate-activity').textContent = entry.activity;

    // Reset scales first so we start from a known state
    resetScaleKey('act-mastery');
    resetScaleKey('act-pleasure');
    resetScaleKey('mood-before');
    resetScaleKey('mood-after');

    // Switch views BEFORE prefilling so the rate view is rendered/visible
    // and selectPart can find and style its scale buttons reliably.
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-rate').style.display = 'block';
    document.getElementById('view-rate').classList.add('active');

    // Pre-fill any values that were already saved (e.g., via pencil edits),
    // so the user doesn't have to re-enter them. We do this in a microtask
    // to ensure the just-shown view-rate has been laid out.
    requestAnimationFrame(() => {
      if (typeof entry.actMastery === 'number')  prefillScale('act-mastery',  entry.actMastery);
      if (typeof entry.actPleasure === 'number') prefillScale('act-pleasure', entry.actPleasure);
      if (typeof entry.moodBefore === 'number')  prefillScale('mood-before',  entry.moodBefore);
      if (typeof entry.moodAfter === 'number')   prefillScale('mood-after',   entry.moodAfter);
      updateSaveButtons();
    });

    window.scrollTo(0, 0);
  }

  // Pre-fill a tens/ones scale from a single numeric value (0-100).
  // Used when reopening rate-actual on an entry that already has saved values.
  function prefillScale(key, value) {
    if (typeof value !== 'number' || value < 0 || value > 100) return;
    const tens = value === 100 ? 100 : Math.floor(value / 10) * 10;
    const ones = value === 100 ? 0 : value % 10;
    const color = key.startsWith('mood-') ? 'mood'
                : key.includes('mastery') ? 'mastery'
                : 'pleasure';
    // Find the scale rows belonging to the rate view specifically.
    // The rate view scales live inside #view-rate so we scope the query
    // to avoid matching any other scale rows that share the same data-scale
    // (e.g. if the edit modal happens to be open).
    const scope = document.getElementById('view-rate');
    if (!scope) return;
    const tensRow = scope.querySelector(`.scale-row.tens[data-scale="${key}"]`);
    const onesRow = scope.querySelector(`.scale-row.ones[data-scale="${key}"]`);
    if (tensRow) selectPart(key, 'tens', tens, tensRow, color);
    // selectPart already handles tens=100 (forces ones=0 and disables ones row),
    // so only manually select ones when tens is not 100.
    if (onesRow && tens !== 100) selectPart(key, 'ones', ones, onesRow, color);
  }

  document.getElementById('cancel-rating-btn').addEventListener('click', () => {
    const rateEl = document.getElementById('view-rate');
    rateEl.classList.remove('active');
    rateEl.style.display = 'none';
    switchView('log');
  });

  document.getElementById('save-rating-btn').addEventListener('click', async () => {
    const entry = state.entries.find(e => e.id === state.ratingEntryId);
    if (!entry) return;
    entry.actMastery = getTotal('act-mastery');
    entry.actPleasure = getTotal('act-pleasure');
    entry.moodBefore = getTotal('mood-before'); // null if user didn't pick both tens and ones
    entry.moodAfter  = getTotal('mood-after');

    // Mirror the same "all four required" rule used by the log's isPending check.
    // Only mark the entry as fully completed when every post-activity value is in,
    // otherwise leave it pending so the Rate Actual button remains visible.
    const allFilled =
      entry.actMastery != null &&
      entry.actPleasure != null &&
      entry.moodBefore != null &&
      entry.moodAfter != null;
    entry.completedAt = allFilled ? Date.now() : null;

    const ok = await saveEntry(entry);
    if (ok) {
      const rateEl = document.getElementById('view-rate');
      rateEl.classList.remove('active');
      rateEl.style.display = 'none';
      showToast(t('toast-rated'));
      switchView('log');
    }
  });

  // ============ LOG VIEW ============
  function fmtDate(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yest = new Date(today.getTime() - 86400000);
    const tomorrow = new Date(today.getTime() + 86400000);
    // Hour-only format: e.g. "3 PM" or "12 AM"
    const h = d.getHours();
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    const timeStr = `${h12} ${ampm}`;
    if (d.toDateString() === today.toDateString()) return 'Today · ' + timeStr;
    if (d.toDateString() === yest.toDateString()) return 'Yesterday · ' + timeStr;
    if (d.toDateString() === tomorrow.toDateString()) return 'Tomorrow · ' + timeStr;
    return d.toLocaleDateString([], {month: 'short', day: 'numeric'}) + ' · ' + timeStr;
  }

  function timeHint(ts, isPending) {
    if (!isPending) return '';
    const diff = ts - Date.now();
    const absDiff = Math.abs(diff);
    const hrs = Math.round(absDiff / 3600000);
    const days = Math.round(hrs / 24);
    if (diff > 0) {
      if (hrs < 1) return t('hint-soon');
      if (hrs < 24) return t('hint-in-hr', { n: hrs });
      return t('hint-in-d', { n: days });
    } else {
      if (hrs < 1) return t('hint-now');
      if (hrs < 24) return t('hint-ago-hr', { n: hrs });
      return t('hint-ago-d', { n: days });
    }
  }

  function deltaBadge(pred, act) {
    if (act === null) return '';
    const d = act - pred;
    if (d === 0) return '<span class="delta">±0</span>';
    const cls = d > 0 ? 'positive' : 'negative';
    const sign = d > 0 ? '+' : '';
    return `<span class="delta ${cls}">${sign}${d}</span>`;
  }

  function renderLog() {
    const c = document.getElementById('log-content');
    if (state.entries.length === 0) {
      c.innerHTML = `
        <div class="empty">
          <div class="empty-mark">❦</div>
          <p>${t('empty-log')}</p>
        </div>`;
      return;
    }

    // Group entries by date (day-start timestamp)
    const groups = new Map();
    state.entries.forEach(e => {
      const ts = entryStartTimestamp(e);
      const d = new Date(ts);
      d.setHours(0, 0, 0, 0);
      const key = d.getTime();
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(e);
    });

    // Sort each group by scheduled hour (most recent first)
    groups.forEach(arr => {
      arr.sort((a, b) => entryStartTimestamp(b) - entryStartTimestamp(a));
    });

    // Sort group keys: most recent date first
    const sortedKeys = Array.from(groups.keys()).sort((a, b) => b - a);

    // Auto-correct invalid filter: if the selected date is no longer in the list,
    // fall back to "All"
    if (state.logFilterDate !== null && !groups.has(state.logFilterDate)) {
      state.logFilterDate = null;
    }

    // Today / Yesterday / Tomorrow labels
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayMs = today.getTime();

    function groupLabel(ms) {
      const diffDays = Math.round((ms - todayMs) / 86400000);
      const d = new Date(ms);
      if (diffDays === 0) return t('day-today');
      if (diffDays === -1) return t('day-yesterday');
      if (diffDays === 1) return t('day-tomorrow');
      const localeForDate = currentLang === 'ka' ? 'ka-GE' : 'en-US';
      if (diffDays > 1 && diffDays < 7) return d.toLocaleDateString(localeForDate, { weekday: 'long' });
      return d.toLocaleDateString(localeForDate, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function shortLabel(ms) {
      const diffDays = Math.round((ms - todayMs) / 86400000);
      const d = new Date(ms);
      if (diffDays === 0) return t('short-today');
      if (diffDays === -1) return t('short-yest');
      if (diffDays === 1) return t('short-tmrw');
      const localeForDate = currentLang === 'ka' ? 'ka-GE' : 'en-US';
      return d.toLocaleDateString(localeForDate, { month: 'short', day: 'numeric' });
    }

    // Build date strip with an "All" chip first
    const allActive = state.logFilterDate === null;
    const stripChips = [
      `<button class="date-chip ${allActive ? 'active' : ''}" data-filter="all">
         <div class="date-chip-label">${t('all')}</div>
         <div class="date-chip-count">${state.entries.length} ${state.entries.length === 1 ? t('entry') : t('entries')}</div>
       </button>`,
      ...sortedKeys.map(k => {
        const count = groups.get(k).length;
        const pending = groups.get(k).filter(e => e.actMastery === null).length;
        const active = state.logFilterDate === k;
        return `
          <button class="date-chip ${active ? 'active' : ''}" data-filter="${k}">
            <div class="date-chip-label">${shortLabel(k)}</div>
            <div class="date-chip-count">
              ${count} ${count === 1 ? t('entry') : t('entries')}
              ${pending > 0 ? `<span class="pending-dot"></span>` : ''}
            </div>
          </button>`;
      })
    ];
    const stripHtml = `<div class="date-strip" id="date-strip">${stripChips.join('')}</div>`;

    // Decide which groups to show
    const keysToShow = state.logFilterDate === null ? sortedKeys : [state.logFilterDate];

    const groupsHtml = keysToShow.map(k => {
      const entries = groups.get(k);
      const entriesHtml = entries.map(e => renderEntry(e)).join('');
      return `
        <div class="date-group" id="d-${k}">
          <div class="date-header">
            <span class="date-header-label">${groupLabel(k)}</span>
            <span class="date-header-meta">${entries.length} ${entries.length === 1 ? t('entry') : t('entries')}</span>
          </div>
          ${entriesHtml}
        </div>`;
    }).join('');

    c.innerHTML = stripHtml + `<div class="entries-scroll">${groupsHtml}</div>`;

    // Wire chip taps -> set filter and re-render
    c.querySelectorAll('.date-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const f = chip.dataset.filter;
        state.logFilterDate = (f === 'all') ? null : parseInt(f);
        renderLog();
        // After re-render, scroll the active chip into view horizontally
        requestAnimationFrame(() => {
          const active = document.querySelector('.date-chip.active');
          if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
      });
    });
  }

  // Small pencil SVG icon for edit buttons
  const PENCIL_SVG = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/><path d="M9.5 3.5l3 3"/></svg>';

  function pencilBtn(field, id, sizeCls = '') {
    return `<button class="edit-pencil ${sizeCls}" data-action="edit" data-field="${field}" data-id="${id}" aria-label="edit">${PENCIL_SVG}</button>`;
  }

  function renderEntry(e) {
    // Entry is "pending" (and thus shows the Rate Actual button) until ALL four
    // post-activity values are filled: actual mastery, actual pleasure,
    // mood before, and mood after. The button disappears only once every
    // value has been entered — through the rate flow or via pencil edits.
    const isPending =
      e.actMastery == null ||
      e.actPleasure == null ||
      e.moodBefore == null ||
      e.moodAfter == null;
    const displayTime = entryStartTimestamp(e);
    const hint = timeHint(displayTime, isPending);
    const hintHtml = hint ? `<span class="hint">${hint}</span>` : '';
    // Show only the hour as the row's primary timestamp
    const d = new Date(displayTime);
    const h = d.getHours();
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    const hourStr = `${h12} ${ampm}`;

    // Mood row: always shown so users can fill in mood retroactively via the pencil
    const moodHtml = `
      <div class="entry-mood-row">
        <div class="mood-bubble">
          <span class="mood-bubble-label">${t('label-mood-before')}</span>
          ${e.moodBefore != null
            ? `<span class="mood-bubble-value">${e.moodBefore}</span>`
            : `<span class="mood-bubble-value pending">${t('mood-pending')}</span>`}
          ${pencilBtn('mood-before', e.id)}
        </div>
        <div class="mood-bubble">
          <span class="mood-bubble-label">${t('label-mood-after')}</span>
          ${e.moodAfter != null
            ? `<span class="mood-bubble-value">${e.moodAfter}</span>`
            : `<span class="mood-bubble-value pending">${t('mood-pending')}</span>`}
          ${pencilBtn('mood-after', e.id)}
        </div>
      </div>`;

    return `
      <div class="entry">
        <div class="entry-date">
          ${hourStr}${hint ? ' · ' : ''}${hintHtml}${e.company ? ' · ' + escapeHtml(e.company) : ''}
          ${pencilBtn('time', e.id)}
        </div>
        <div class="entry-activity-row">
          <div class="entry-activity">${escapeHtml(e.activity)}</div>
          ${pencilBtn('activity', e.id, 'lg')}
        </div>
        <div class="entry-grid">
          <div class="metric">
            <div class="metric-label">${t('insight-mastery')}</div>
            <div class="metric-values">
              <span class="pred">${e.predMastery}</span>
              ${pencilBtn('pred-mastery', e.id)}
              <span class="arrow">→</span>
              ${e.actMastery == null
                ? `<span class="pending">${t('pending')}</span>${pencilBtn('act-mastery', e.id)}`
                : `<span class="actual-m">${e.actMastery}</span>${pencilBtn('act-mastery', e.id)}${deltaBadge(e.predMastery, e.actMastery)}`}
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">${t('insight-pleasure')}</div>
            <div class="metric-values">
              <span class="pred">${e.predPleasure}</span>
              ${pencilBtn('pred-pleasure', e.id)}
              <span class="arrow">→</span>
              ${e.actPleasure == null
                ? `<span class="pending">${t('pending')}</span>${pencilBtn('act-pleasure', e.id)}`
                : `<span class="actual-p">${e.actPleasure}</span>${pencilBtn('act-pleasure', e.id)}${deltaBadge(e.predPleasure, e.actPleasure)}`}
            </div>
          </div>
        </div>
        ${moodHtml}
        <div class="entry-actions">
          ${isPending
            ? `<button class="complete" data-action="rate" data-id="${e.id}">${t('btn-rate')}</button>`
            : ''}
          <button class="delete" data-action="delete" data-id="${e.id}">${t('btn-delete')}</button>
        </div>
      </div>`;
  }

  // Event delegation for entry action buttons (works in sandboxed previews
  // where inline onclick handlers may be stripped)
  document.getElementById('log-content').addEventListener('click', (ev) => {
    const btn = ev.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    if (action === 'rate') openRate(id);
    else if (action === 'delete') confirmDelete(id);
    else if (action === 'edit') openEdit(id, btn.dataset.field);
  });

  // Custom confirm modal (replaces native window.confirm, which may be
  // blocked or no-op in some embedded preview frames)
  function showConfirm(message) {
    return new Promise(resolve => {
      const overlay = document.getElementById('confirm-overlay');
      document.getElementById('confirm-message').textContent = message;
      overlay.classList.add('show');
      const yes = document.getElementById('confirm-yes');
      const no = document.getElementById('confirm-no');
      const cleanup = (result) => {
        overlay.classList.remove('show');
        yes.removeEventListener('click', onYes);
        no.removeEventListener('click', onNo);
        overlay.removeEventListener('click', onBackdrop);
        resolve(result);
      };
      const onYes = () => cleanup(true);
      const onNo = () => cleanup(false);
      const onBackdrop = (e) => { if (e.target === overlay) cleanup(false); };
      yes.addEventListener('click', onYes);
      no.addEventListener('click', onNo);
      overlay.addEventListener('click', onBackdrop);
    });
  }

  async function confirmDelete(id) {
    const ok = await showConfirm(t('confirm-delete'));
    if (!ok) return;
    const deleted = await deleteEntry(id);
    if (deleted) {
      renderLog();
      showToast(t('toast-deleted'));
    }
  }

  // ============ EDIT MODAL ============
  // Field metadata: maps field name -> { title key, getter, setter, type }
  // type: 'scale' (tens+ones picker, 0-100) | 'text' | 'time'
  const EDIT_FIELDS = {
    'activity':      { titleKey: 'edit-title-activity',      type: 'text' },
    'company':       { titleKey: 'edit-title-company',       type: 'text' },
    'time':          { titleKey: 'edit-title-time',          type: 'time' },
    'pred-mastery':  { titleKey: 'edit-title-pred-mastery',  type: 'scale', color: 'mastery' },
    'pred-pleasure': { titleKey: 'edit-title-pred-pleasure', type: 'scale', color: 'pleasure' },
    'act-mastery':   { titleKey: 'edit-title-act-mastery',   type: 'scale', color: 'mastery' },
    'act-pleasure':  { titleKey: 'edit-title-act-pleasure',  type: 'scale', color: 'pleasure' },
    'mood-before':   { titleKey: 'edit-title-mood-before',   type: 'scale', color: 'mood' },
    'mood-after':    { titleKey: 'edit-title-mood-after',    type: 'scale', color: 'mood' },
  };

  // Map field name to entry property name
  const FIELD_TO_PROP = {
    'activity': 'activity',
    'company': 'company',
    'pred-mastery': 'predMastery',
    'pred-pleasure': 'predPleasure',
    'act-mastery': 'actMastery',
    'act-pleasure': 'actPleasure',
    'mood-before': 'moodBefore',
    'mood-after': 'moodAfter',
  };

  let editContext = null; // { entryId, field, getValue }

  function openEdit(entryId, field) {
    const meta = EDIT_FIELDS[field];
    if (!meta) return;
    const entry = state.entries.find(e => e.id === entryId);
    if (!entry) return;

    document.getElementById('edit-title').textContent = t(meta.titleKey);
    document.getElementById('edit-save').textContent = t('edit-save');
    const body = document.getElementById('edit-body');

    if (meta.type === 'text') {
      const currentVal = field === 'activity' ? entry.activity : (entry.company || '');
      body.innerHTML = `
        <div class="field" style="margin-bottom: 0;">
          <input type="text" id="edit-text-input" autocomplete="off">
        </div>`;
      const input = document.getElementById('edit-text-input');
      input.value = currentVal;
      setTimeout(() => input.focus(), 60);
      editContext = {
        entryId, field,
        getValue: () => input.value.trim(),
        validate: (v) => field !== 'activity' || v.length > 0,
      };
    } else if (meta.type === 'time') {
      const ts = entryStartTimestamp(entry);
      const d = new Date(ts);
      const dayStart = new Date(d);
      dayStart.setHours(0, 0, 0, 0);
      // Build day select options inline
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const dayOpts = [];
      // Include some past days too, since edits may be retroactive
      for (let i = -14; i < 14; i++) {
        const day = new Date(today.getTime() + i * 86400000);
        const isCurrent = day.getTime() === dayStart.getTime();
        let label;
        if (i === 0) label = t('day-today');
        else if (i === -1) label = t('day-yesterday');
        else if (i === 1) label = t('day-tomorrow');
        else label = day.toLocaleDateString(currentLang === 'ka' ? 'ka-GE' : 'en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        dayOpts.push(`<option value="${day.getTime()}" ${isCurrent ? 'selected' : ''}>${label}</option>`);
      }
      // Hours
      const hour = d.getHours();
      const hourOpts = [];
      for (let h = 0; h < 24; h++) {
        const ampm = h < 12 ? 'AM' : 'PM';
        const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
        hourOpts.push(`<option value="${h}" ${h === hour ? 'selected' : ''}>${h12}:00 ${ampm}</option>`);
      }
      body.innerHTML = `
        <div class="time-row">
          <select id="edit-day-select" class="time-select">${dayOpts.join('')}</select>
          <select id="edit-hour-select" class="time-select">${hourOpts.join('')}</select>
        </div>`;
      editContext = {
        entryId, field,
        getValue: () => {
          const dayMs = parseInt(document.getElementById('edit-day-select').value);
          const hr = parseInt(document.getElementById('edit-hour-select').value);
          return dayMs + hr * 3600000;
        },
        validate: () => true,
      };
    } else if (meta.type === 'scale') {
      // Reuse the existing scale-pair structure with a dedicated key 'edit-scale'
      body.innerHTML = `
        <div class="pair">
          <div class="scale-group">
            <div>
              <div class="scale-sub-label">${t('sub-tens')}</div>
              <div class="scale-row tens" data-scale="edit-scale" data-part="tens"></div>
            </div>
            <div>
              <div class="scale-sub-label">${t('sub-ones')}</div>
              <div class="scale-row ones" data-scale="edit-scale" data-part="ones"></div>
            </div>
          </div>
          <div class="total-display">
            <span class="total-label">${t('total-label')}</span>
            <span class="total-num empty" data-total="edit-scale">—</span>
          </div>
        </div>`;

      // Register transient state.parts entry, build, and prefill
      state.parts['edit-scale'] = { tens: null, ones: null };
      const tensRow = body.querySelector('.scale-row.tens');
      const onesRow = body.querySelector('.scale-row.ones');
      // Build with the right color for this field
      const buildEditScale = (container, part) => {
        container.innerHTML = '';
        const max = part === 'tens' ? 100 : 9;
        const step = part === 'tens' ? 10 : 1;
        for (let i = 0; i <= max; i += step) {
          const btn = document.createElement('button');
          btn.className = 'scale-btn';
          btn.textContent = i;
          btn.dataset.value = i;
          btn.addEventListener('click', () => selectPart('edit-scale', part, i, container, meta.color));
          container.appendChild(btn);
        }
      };
      buildEditScale(tensRow, 'tens');
      buildEditScale(onesRow, 'ones');

      // Prefill from current entry value
      const prop = FIELD_TO_PROP[field];
      const cur = entry[prop];
      if (typeof cur === 'number') {
        const tens = cur === 100 ? 100 : Math.floor(cur / 10) * 10;
        const ones = cur === 100 ? 0 : cur % 10;
        selectPart('edit-scale', 'tens', tens, tensRow, meta.color);
        if (cur !== 100) selectPart('edit-scale', 'ones', ones, onesRow, meta.color);
      }

      editContext = {
        entryId, field,
        getValue: () => getTotal('edit-scale'),
        validate: (v) => v !== null,
      };
    }

    // Show the modal
    document.getElementById('edit-overlay').classList.add('show');
  }

  function closeEdit() {
    document.getElementById('edit-overlay').classList.remove('show');
    // Clean up transient scale state if present
    if (state.parts['edit-scale']) delete state.parts['edit-scale'];
    document.getElementById('edit-body').innerHTML = '';
    editContext = null;
  }

  async function saveEdit() {
    if (!editContext) return;
    const { entryId, field, getValue, validate } = editContext;
    const value = getValue();
    if (validate && !validate(value)) {
      // Invalid; do nothing, leave modal open
      return;
    }
    const entry = state.entries.find(e => e.id === entryId);
    if (!entry) { closeEdit(); return; }

    if (field === 'time') {
      entry.scheduledAt = value;
    } else {
      const prop = FIELD_TO_PROP[field];
      if (prop) entry[prop] = value;
    }

    // If all four post-activity values are now filled, mark the entry as
    // completed so it no longer appears as pending (and the Rate Actual
    // button hides). If any of them is missing, treat the entry as pending again.
    const allFilled =
      entry.actMastery != null &&
      entry.actPleasure != null &&
      entry.moodBefore != null &&
      entry.moodAfter != null;

    if (allFilled && !entry.completedAt) {
      entry.completedAt = Date.now();
    } else if (!allFilled && entry.completedAt) {
      entry.completedAt = null;
    }

    sortEntries();
    const ok = await saveEntry(entry);
    if (ok) {
      closeEdit();
      renderLog();
      showToast(t('toast-edit-saved'));
    }
  }

  // Wire up edit modal buttons + backdrop dismiss
  document.getElementById('edit-cancel').addEventListener('click', closeEdit);
  document.getElementById('edit-save').addEventListener('click', saveEdit);
  document.getElementById('edit-overlay').addEventListener('click', (ev) => {
    if (ev.target.id === 'edit-overlay') closeEdit();
  });

  // ============ INSIGHTS ============
  // ============ CHART (Predicted vs Actual, last 7 days) ============
  // Returns SVG markup as a string. Designed for a ~340px wide mobile viewport.
  function renderChartSvg(completed) {
    const W = 340, H = 220;
    const pad = { top: 14, right: 14, bottom: 28, left: 30 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Filter to the last 7 days of rated entries, sorted ascending by time
    const cutoff = Date.now() - 7 * 86400000;
    const recent = completed
      .filter(e => entryStartTimestamp(e) >= cutoff)
      .sort((a, b) => entryStartTimestamp(a) - entryStartTimestamp(b));

    // With zero recent entries we can't render anything useful
    if (recent.length === 0) return null;

    // X positions: evenly spaced. For a single entry, center it horizontally.
    const xs = recent.length === 1
      ? [pad.left + plotW / 2]
      : recent.map((_, i) => pad.left + (plotW * i) / (recent.length - 1));
    // Y mapping: value 0–100 → top of plot is 100
    const y = (v) => pad.top + plotH - (v / 100) * plotH;

    const path = (vals) => vals.map((v, i) => `${i === 0 ? 'M' : 'L'}${xs[i].toFixed(1)},${y(v).toFixed(1)}`).join(' ');

    // For mood lines, an entry may have no mood data — draw only across points
    // that have a number. Use multiple "M...L..." segments so gaps look right.
    const sparsePath = (entries, getter) => {
      let d = '';
      let started = false;
      entries.forEach((e, i) => {
        const v = getter(e);
        if (typeof v !== 'number') { started = false; return; }
        const cmd = started ? 'L' : 'M';
        d += `${cmd}${xs[i].toFixed(1)},${y(v).toFixed(1)} `;
        started = true;
      });
      return d.trim();
    };

    const predP = recent.map(e => e.predPleasure);
    const actP  = recent.map(e => e.actPleasure);
    const predM = recent.map(e => e.predMastery);
    const actM  = recent.map(e => e.actMastery);

    // Y axis gridlines at 0, 25, 50, 75, 100
    const gridYs = [0, 25, 50, 75, 100];
    const gridLines = gridYs.map(v => {
      const yy = y(v).toFixed(1);
      return `<line x1="${pad.left}" x2="${pad.left + plotW}" y1="${yy}" y2="${yy}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>
              <text x="${pad.left - 6}" y="${(y(v) + 3).toFixed(1)}" font-size="9" fill="var(--ink-faint)" text-anchor="end" font-family="JetBrains Mono, monospace">${v}</text>`;
    }).join('');

    // Date labels under each point (show every other one if crowded)
    const labels = recent.map((e, i) => {
      const showEvery = recent.length > 5 ? 2 : 1;
      if (i % showEvery !== 0 && i !== recent.length - 1) return '';
      const d = new Date(entryStartTimestamp(e));
      const lab = `${d.getMonth() + 1}/${d.getDate()}`;
      return `<text x="${xs[i].toFixed(1)}" y="${H - pad.bottom + 14}" font-size="9" fill="var(--ink-faint)" text-anchor="middle" font-family="JetBrains Mono, monospace">${lab}</text>`;
    }).join('');

    // Dots for all 6 series. With a single entry the dots become the entire
    // chart (no lines connect anything), so we render them in every case.
    const dotR = recent.length === 1 ? 5 : 3;

    const dotsActP = actP.map((v, i) => `<circle cx="${xs[i].toFixed(1)}" cy="${y(v).toFixed(1)}" r="${dotR}" fill="var(--pleasure)"/>`).join('');
    const dotsActM = actM.map((v, i) => `<circle cx="${xs[i].toFixed(1)}" cy="${y(v).toFixed(1)}" r="${dotR}" fill="var(--mastery)"/>`).join('');

    const dotsPredP = predP.map((v, i) =>
      `<circle cx="${xs[i].toFixed(1)}" cy="${y(v).toFixed(1)}" r="${dotR - 1}" fill="none" stroke="var(--pleasure)" stroke-width="1.5" opacity="0.7"/>`
    ).join('');
    const dotsPredM = predM.map((v, i) =>
      `<circle cx="${xs[i].toFixed(1)}" cy="${y(v).toFixed(1)}" r="${dotR - 1}" fill="none" stroke="var(--mastery)" stroke-width="1.5" opacity="0.7"/>`
    ).join('');

    const dotsMoodB = recent.map((e, i) =>
      typeof e.moodBefore === 'number'
        ? `<circle cx="${xs[i].toFixed(1)}" cy="${y(e.moodBefore).toFixed(1)}" r="${dotR - 1}" fill="none" stroke="var(--mood)" stroke-width="1.5" opacity="0.7"/>`
        : ''
    ).join('');
    const dotsMoodA = recent.map((e, i) =>
      typeof e.moodAfter === 'number'
        ? `<circle cx="${xs[i].toFixed(1)}" cy="${y(e.moodAfter).toFixed(1)}" r="${dotR}" fill="var(--mood)"/>`
        : ''
    ).join('');

    const lines = recent.length >= 2 ? `
        <path d="${path(predP)}" fill="none" stroke="var(--pleasure)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
        <path d="${path(actP)}"  fill="none" stroke="var(--pleasure)" stroke-width="2.2"/>
        <path d="${path(predM)}" fill="none" stroke="var(--mastery)"  stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
        <path d="${path(actM)}"  fill="none" stroke="var(--mastery)"  stroke-width="2.2"/>
        <path d="${sparsePath(recent, e => e.moodBefore)}" fill="none" stroke="var(--mood)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
        <path d="${sparsePath(recent, e => e.moodAfter)}"  fill="none" stroke="var(--mood)" stroke-width="2.2"/>` : '';

    // Hover layer: an invisible vertical "lane" over each data point, a
    // crosshair line, six highlight dots, and six tag rectangles that show
    // each numeric value next to its point. All are hidden by default
    // and revealed when JS sets data-hover-index on the SVG.
    const hoverLayer = `
      <line class="crosshair" x1="0" y1="${pad.top}" x2="0" y2="${pad.top + plotH}"/>
      <circle class="hover-dot dot-predP" cx="0" cy="0" r="4" fill="var(--pleasure)" opacity="0.85"/>
      <circle class="hover-dot dot-actP"  cx="0" cy="0" r="4" fill="var(--pleasure)"/>
      <circle class="hover-dot dot-predM" cx="0" cy="0" r="4" fill="var(--mastery)"  opacity="0.85"/>
      <circle class="hover-dot dot-actM"  cx="0" cy="0" r="4" fill="var(--mastery)"/>
      <circle class="hover-dot dot-moodB" cx="0" cy="0" r="4" fill="var(--mood)" opacity="0.85"/>
      <circle class="hover-dot dot-moodA" cx="0" cy="0" r="4" fill="var(--mood)"/>
      ${['predP','actP','predM','actM','moodB','moodA'].map(k => `
        <g class="hover-tag tag-${k}">
          <rect x="0" y="0" width="26" height="14" rx="3"/>
          <text x="0" y="0" text-anchor="middle"></text>
        </g>`).join('')}
    `;

    // Hover zones — one transparent rectangle per data point, spanning
    // the gap between adjacent points. Each carries data-index so the
    // listener can find which entry to show.
    const zones = recent.map((_, i) => {
      const halfBefore = i === 0 ? 0 : (xs[i] - xs[i-1]) / 2;
      const halfAfter  = i === recent.length - 1 ? plotW / 2 : (xs[i+1] - xs[i]) / 2;
      const zx = xs[i] - (halfBefore || halfAfter);
      const zw = (halfBefore || halfAfter) + (halfAfter || halfBefore);
      return `<rect class="hover-zone" data-index="${i}" x="${zx}" y="${pad.top}" width="${zw}" height="${plotH}"/>`;
    }).join('');

    const svg = `
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        ${gridLines}
        ${lines}
        ${dotsPredP}
        ${dotsActP}
        ${dotsPredM}
        ${dotsActM}
        ${dotsMoodB}
        ${dotsMoodA}
        ${labels}
        ${hoverLayer}
        ${zones}
      </svg>`;

    // Data used by the hover handler — coordinates per series + entry refs.
    return {
      svg,
      points: recent.map((e, i) => ({
        index: i,
        x: xs[i],
        entry: e,
        ys: {
          predP: y(e.predPleasure),
          actP:  y(e.actPleasure),
          predM: y(e.predMastery),
          actM:  y(e.actMastery),
          moodB: typeof e.moodBefore === 'number' ? y(e.moodBefore) : null,
          moodA: typeof e.moodAfter  === 'number' ? y(e.moodAfter)  : null,
        }
      })),
      W, H, pad, plotW, plotH,
    };
  }



  function toTimestamp(value) {
    if (value === null || value === undefined || value === '') return null;
    const ts = new Date(value).getTime();
    return Number.isFinite(ts) ? ts : null;
  }

  // Primary date identity for analysis/logging: when the activity was scheduled/started.
  // We intentionally do NOT rewrite stored data; we only resolve which timestamp to use
  // when grouping, graphing, and calculating streaks.
  function entryStartTimestamp(entry) {
    if (!entry) return Date.now();
    return toTimestamp(entry.scheduledAt) ??
           toTimestamp(entry.createdAt) ??
           toTimestamp(entry.completedAt) ??
           Date.now();
  }

  function localDateKey(ts) {
    const d = new Date(ts || Date.now());
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function completedDateKeys(entries) {
    return [...new Set(
      entries
        .filter(e => e && e.actMastery !== null && e.actMastery !== undefined)
        .map(e => localDateKey(entryStartTimestamp(e)))
    )].sort();
  }

  function calculateCurrentStreak(entries) {
    const tracked = new Set(completedDateKeys(entries));
    let cursor = new Date();
    let streak = 0;

    while (tracked.has(localDateKey(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }

    return streak;
  }

  function calculateBestStreak(entries) {
    const keys = completedDateKeys(entries);
    if (!keys.length) return 0;

    let best = 1;
    let current = 1;

    for (let i = 1; i < keys.length; i++) {
      const prev = new Date(keys[i - 1] + 'T00:00:00');
      const curr = new Date(keys[i] + 'T00:00:00');
      const diffDays = Math.round((curr - prev) / 86400000);

      if (diffDays === 1) current++;
      else current = 1;

      if (current > best) best = current;
    }

    return best;
  }

  function wasTodayTracked(entries) {
    const today = localDateKey(Date.now());
    return completedDateKeys(entries).includes(today);
  }


  function scoreOrNull(value) {
    if (value === null || value === undefined || value === '') return null;
    const n = Number(value);
    return Number.isFinite(n) ? n : null;
  }

  function normalizeActivityKey(activity) {
    return String(activity || '').trim().replace(/\s+/g, ' ').toLowerCase();
  }

  function buildActivityRanking(entries, config) {
    const buckets = new Map();

    entries.forEach(e => {
      const key = normalizeActivityKey(e.activity);
      if (!key) return;

      const values = config.valuesFn(e);
      if (!values) return;

      const finalValue = scoreOrNull(values.final);
      const diffValue = scoreOrNull(values.diff);
      if (finalValue === null || diffValue === null) return;

      if (!buckets.has(key)) {
        buckets.set(key, {
          name: String(e.activity || '').trim().replace(/\s+/g, ' '),
          finalTotal: 0,
          diffTotal: 0,
          count: 0
        });
      }

      const bucket = buckets.get(key);
      bucket.finalTotal += finalValue;
      bucket.diffTotal += diffValue;
      bucket.count += 1;
    });

    const rankBy = config.rankBy === 'diff' ? 'avgDiff' : 'avgFinal';

    return [...buckets.values()]
      .map(item => ({
        ...item,
        avgFinal: item.finalTotal / item.count,
        avgDiff: item.diffTotal / item.count
      }))
      .sort((a, b) => (b[rankBy] - a[rankBy]) || (b.count - a.count) || a.name.localeCompare(b.name));
  }

  function formatSignedScore(value) {
    const sign = value > 0 ? '+' : '';
    return `${sign}${value.toFixed(1)}`;
  }

  function renderActivityRanking(items, options) {
    if (!items.length) {
      return `<div class="rank-empty">${t(options.emptyKey)}</div>`;
    }

    return `
      <ol class="rank-list">
        ${items.map((item, i) => {
          const finalValue = item.avgFinal;
          const diffValue = item.avgDiff;
          const diffPolarity = diffValue > 0 ? ' positive' : diffValue < 0 ? ' negative' : '';
          return `
            <li class="rank-item">
              <span class="rank-index">${i + 1}</span>
              <span class="rank-main">
                <span class="rank-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
                <span class="rank-count">${t('dashboard-count', { n: item.count })}</span>
              </span>
              <span class="rank-score-stack">
                <span class="rank-score-row">
                  <span class="rank-score-label">${t('dashboard-final')}</span>
                  <span class="rank-score-value final ${options.className}">${finalValue.toFixed(1)}</span>
                </span>
                <span class="rank-score-row">
                  <span class="rank-score-label">${t('dashboard-difference')}</span>
                  <span class="rank-score-value ${options.className}${diffPolarity}">${formatSignedScore(diffValue)}</span>
                </span>
              </span>
            </li>`;
        }).join('')}
      </ol>`;
  }

  function renderLiftDashboard(entries) {
    const dashboardSort = state.dashboardSort === 'final' ? 'final' : 'diff';

    const moodItems = buildActivityRanking(entries, {
      rankBy: dashboardSort,
      valuesFn: e => {
        const before = scoreOrNull(e.moodBefore);
        const after = scoreOrNull(e.moodAfter);
        return before !== null && after !== null ? { final: after, diff: after - before } : null;
      }
    });

    const masteryItems = buildActivityRanking(entries, {
      rankBy: dashboardSort,
      valuesFn: e => {
        const predicted = scoreOrNull(e.predMastery);
        const actual = scoreOrNull(e.actMastery);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      }
    });

    const pleasureItems = buildActivityRanking(entries, {
      rankBy: dashboardSort,
      valuesFn: e => {
        const predicted = scoreOrNull(e.predPleasure);
        const actual = scoreOrNull(e.actPleasure);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      }
    });

    return `
      <div class="lift-dashboard">
        <div class="lift-dashboard-header">
          <div class="lift-dashboard-title">${t('dashboard-title')}</div>
          <div class="lift-dashboard-subtitle">${t('dashboard-subtitle')}</div>
          <div class="lift-dashboard-controls">
            <label class="dashboard-sort-label" for="dashboard-sort-select">${t('dashboard-sort-label')}</label>
            <select class="dashboard-sort-select" id="dashboard-sort-select">
              <option value="diff" ${dashboardSort === 'diff' ? 'selected' : ''}>${t('dashboard-sort-diff')}</option>
              <option value="final" ${dashboardSort === 'final' ? 'selected' : ''}>${t('dashboard-sort-final')}</option>
            </select>
          </div>
        </div>
        <div class="lift-grid">
          <div class="lift-card">
            <div class="lift-card-title">
              <div class="lift-card-title-main mood">${t('dashboard-mood-title')}</div>
            </div>
            <div class="lift-card-subtitle">${t('dashboard-mood-sub')}</div>
            ${renderActivityRanking(moodItems, { className: 'mood', emptyKey: 'dashboard-empty-mood' })}
          </div>
          <div class="lift-card">
            <div class="lift-card-title">
              <div class="lift-card-title-main mastery">${t('dashboard-mastery-title')}</div>
            </div>
            <div class="lift-card-subtitle">${t('dashboard-mastery-sub')}</div>
            ${renderActivityRanking(masteryItems, { className: 'mastery', emptyKey: 'dashboard-empty-score' })}
          </div>
          <div class="lift-card">
            <div class="lift-card-title">
              <div class="lift-card-title-main pleasure">${t('dashboard-pleasure-title')}</div>
            </div>
            <div class="lift-card-subtitle">${t('dashboard-pleasure-sub')}</div>
            ${renderActivityRanking(pleasureItems, { className: 'pleasure', emptyKey: 'dashboard-empty-score' })}
          </div>
        </div>
      </div>`;
  }

  function buildActivityOptions(entries) {
    const buckets = new Map();

    entries.forEach(e => {
      const key = normalizeActivityKey(e.activity);
      if (!key) return;

      if (!buckets.has(key)) {
        buckets.set(key, {
          key,
          name: String(e.activity || '').trim().replace(/\s+/g, ' '),
          count: 0,
          lastTime: 0
        });
      }

      const bucket = buckets.get(key);
      bucket.count += 1;
      const time = entryStartTimestamp(e);
      if (Number.isFinite(time) && time > bucket.lastTime) bucket.lastTime = time;
    });

    return [...buckets.values()]
      .sort((a, b) => (b.count - a.count) || (b.lastTime - a.lastTime) || a.name.localeCompare(b.name));
  }

  function averageMetricForActivity(entries, key, valuesFn) {
    let finalTotal = 0;
    let diffTotal = 0;
    let count = 0;

    entries.forEach(e => {
      if (normalizeActivityKey(e.activity) !== key) return;
      const values = valuesFn(e);
      if (!values) return;

      const finalValue = scoreOrNull(values.final);
      const diffValue = scoreOrNull(values.diff);
      if (finalValue === null || diffValue === null) return;

      finalTotal += finalValue;
      diffTotal += diffValue;
      count += 1;
    });

    if (!count) return null;
    return {
      avgFinal: finalTotal / count,
      avgDiff: diffTotal / count,
      count
    };
  }

  function getDeepAnalysisStats(entries, key) {
    const activityEntries = entries.filter(e => normalizeActivityKey(e.activity) === key);

    return {
      totalCount: activityEntries.length,
      mood: averageMetricForActivity(entries, key, e => {
        const before = scoreOrNull(e.moodBefore);
        const after = scoreOrNull(e.moodAfter);
        return before !== null && after !== null ? { final: after, diff: after - before } : null;
      }),
      mastery: averageMetricForActivity(entries, key, e => {
        const predicted = scoreOrNull(e.predMastery);
        const actual = scoreOrNull(e.actMastery);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      }),
      pleasure: averageMetricForActivity(entries, key, e => {
        const predicted = scoreOrNull(e.predPleasure);
        const actual = scoreOrNull(e.actPleasure);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      })
    };
  }

  function renderDeepMetricCard(type, titleKey, stats, emptyKey) {
    if (!stats) {
      return `
        <div class="deep-metric-card">
          <div class="deep-metric-title ${type}">${t(titleKey)}</div>
          <div class="deep-metric-value empty">${t(emptyKey)}</div>
        </div>`;
    }

    const diffPolarity = stats.avgDiff > 0 ? ' positive' : stats.avgDiff < 0 ? ' negative' : '';

    return `
      <div class="deep-metric-card">
        <div class="deep-metric-title ${type}">${t(titleKey)}</div>
        <div class="deep-metric-rows">
          <div class="deep-metric-row">
            <span class="deep-metric-label">${t('dashboard-final')}</span>
            <span class="deep-metric-value ${type}">${stats.avgFinal.toFixed(1)}</span>
          </div>
          <div class="deep-metric-row">
            <span class="deep-metric-label">${t('dashboard-difference')}</span>
            <span class="deep-metric-value ${type}${diffPolarity}">${formatSignedScore(stats.avgDiff)}</span>
          </div>
          <div class="deep-metric-row">
            <span class="deep-metric-label">${t('deep-analysis-based-on')}</span>
            <span class="deep-metric-value ${type}">${t('dashboard-count', { n: stats.count })}</span>
          </div>
        </div>
      </div>`;
  }

  function renderDeepCompactMetric(type, titleKey, stats) {
    if (!stats) {
      return `
        <div class="deep-all-metric">
          <span class="deep-all-metric-label">${t(titleKey)}</span>
          <span class="deep-all-empty">${t('deep-analysis-no-data')}</span>
        </div>`;
    }

    const diffPolarity = stats.avgDiff > 0 ? ' positive' : stats.avgDiff < 0 ? ' negative' : '';

    return `
      <div class="deep-all-metric">
        <span class="deep-all-metric-label">${t(titleKey)}</span>
        <span class="deep-all-metric-values">
          <span class="deep-all-final ${type}" title="${t('dashboard-final')}">F ${stats.avgFinal.toFixed(1)}</span>
          <span class="deep-all-diff ${type}${diffPolarity}" title="${t('dashboard-difference')}">Δ ${formatSignedScore(stats.avgDiff)}</span>
        </span>
      </div>`;
  }

  function renderDeepAnalysisAll(entries, options) {
    const sortedOptions = [...options].sort((a, b) => a.name.localeCompare(b.name));

    return `
      <div class="deep-summary">
        <div class="deep-summary-head">
          <div class="deep-summary-name">${t('deep-analysis-all-name')}</div>
          <div class="deep-summary-meta">${t('deep-analysis-all-subtitle')}</div>
        </div>
        <div class="deep-all-list">
          ${sortedOptions.map(item => {
            const stats = getDeepAnalysisStats(entries, item.key);
            return `
              <div class="deep-all-row">
                <div>
                  <div class="deep-all-name">${escapeHtml(item.name)}</div>
                  <div class="deep-summary-meta">${t('dashboard-count', { n: item.count })}</div>
                </div>
                <div class="deep-all-metrics">
                  ${renderDeepCompactMetric('mood', 'deep-analysis-mood', stats.mood)}
                  ${renderDeepCompactMetric('mastery', 'deep-analysis-mastery', stats.mastery)}
                  ${renderDeepCompactMetric('pleasure', 'deep-analysis-pleasure', stats.pleasure)}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function renderDeepAnalysisDetails(entries, selectedKey, selectedName) {
    const stats = getDeepAnalysisStats(entries, selectedKey);

    return `
      <div class="deep-summary">
        <div class="deep-summary-head">
          <div class="deep-summary-name">${escapeHtml(selectedName)}</div>
          <div class="deep-summary-meta">${t('deep-analysis-total', { n: stats.totalCount })}</div>
        </div>
        <div class="deep-metric-grid">
          ${renderDeepMetricCard('mood', 'deep-analysis-mood', stats.mood, 'dashboard-empty-mood')}
          ${renderDeepMetricCard('mastery', 'deep-analysis-mastery', stats.mastery, 'dashboard-empty-score')}
          ${renderDeepMetricCard('pleasure', 'deep-analysis-pleasure', stats.pleasure, 'dashboard-empty-score')}
        </div>
      </div>`;
  }

  function renderDeepAnalysis(entries) {
    const options = buildActivityOptions(entries);
    if (!options.length) return '';

    const SHOW_ALL_KEY = '__all__';
    const stillExists = state.analysisActivityKey === SHOW_ALL_KEY || options.some(item => item.key === state.analysisActivityKey);
    if (!state.analysisActivityKey || !stillExists) {
      state.analysisActivityKey = SHOW_ALL_KEY;
    }

    const selected = options.find(item => item.key === state.analysisActivityKey);
    const showAllSelected = state.analysisActivityKey === SHOW_ALL_KEY || !selected;

    return `
      <div class="deep-analysis">
        <div class="deep-analysis-header">
          <div class="deep-analysis-title">${t('deep-analysis-title')}</div>
          <div class="deep-analysis-subtitle">${t('deep-analysis-subtitle')}</div>
        </div>
        <div class="deep-analysis-control">
          <label for="deep-analysis-select">${t('deep-analysis-select')}</label>
          <select class="deep-analysis-select" id="deep-analysis-select">
            <option value="${SHOW_ALL_KEY}" ${showAllSelected ? 'selected' : ''}>${t('deep-analysis-show-all')}</option>
            ${options.map(item => `
              <option value="${escapeHtml(item.key)}" ${item.key === state.analysisActivityKey ? 'selected' : ''}>
                ${escapeHtml(item.name)} · ${t('dashboard-count', { n: item.count })}
              </option>`).join('')}
          </select>
        </div>
        <div id="deep-analysis-result">
          ${showAllSelected ? renderDeepAnalysisAll(entries, options) : renderDeepAnalysisDetails(entries, selected.key, selected.name)}
        </div>
      </div>`;
  }


  function attachDashboardSortHandler() {
    const select = document.getElementById('dashboard-sort-select');
    if (!select) return;

    select.addEventListener('change', () => {
      state.dashboardSort = select.value === 'final' ? 'final' : 'diff';
      renderInsights();
    });
  }

  function attachDeepAnalysisHandlers(entries) {
    const select = document.getElementById('deep-analysis-select');
    const result = document.getElementById('deep-analysis-result');
    if (!select || !result) return;

    const SHOW_ALL_KEY = '__all__';
    const options = buildActivityOptions(entries);

    select.addEventListener('change', () => {
      state.analysisActivityKey = select.value;
      if (select.value === SHOW_ALL_KEY) {
        result.innerHTML = renderDeepAnalysisAll(entries, options);
        return;
      }

      const selected = options.find(item => item.key === select.value);
      if (!selected) return;
      result.innerHTML = renderDeepAnalysisDetails(entries, selected.key, selected.name);
    });
  }



  function renderInsights() {
    const c = document.getElementById('insights-content');
    const completed = state.entries.filter(e => e.actMastery !== null);

    // Data-actions buttons are always shown so users can export/import even with no data yet
    const dataActionsHtml = `
      <div class="data-actions">
        <button class="data-btn" id="export-btn" data-i18n="btn-export">${t('btn-export')}</button>
        <button class="data-btn" id="import-btn" data-i18n="btn-import">${t('btn-import')}</button>
      </div>`;

    if (completed.length === 0) {
      c.innerHTML = `
        <div class="empty">
          <div class="empty-mark">❦</div>
          <p>${t('empty-insights')}</p>
        </div>
        ${dataActionsHtml}`;
      attachDataActionHandlers();
      return;
    }

    const avgPredM = avg(completed.map(e => e.predMastery));
    const avgActM = avg(completed.map(e => e.actMastery));
    const avgPredP = avg(completed.map(e => e.predPleasure));
    const avgActP = avg(completed.map(e => e.actPleasure));
    const mGap = avgActM - avgPredM;
    const pGap = avgActP - avgPredP;
    const currentStreak = calculateCurrentStreak(completed);
    const bestStreak = calculateBestStreak(completed);
    const todayTracked = wasTodayTracked(completed);

    let insightKey;
    if (pGap > 1) insightKey = 'insight-pleasure-up';
    else if (pGap < -1) insightKey = 'insight-pleasure-down';
    else if (mGap > 1) insightKey = 'insight-mastery-up';
    else if (mGap < -1) insightKey = 'insight-mastery-down';
    else insightKey = 'insight-neutral';

    const liftDashboardBlock = renderLiftDashboard(completed);
    const deepAnalysisBlock = renderDeepAnalysis(completed);
    const chartData = renderChartSvg(completed);
    const chartBlock = chartData ? `
      <div class="chart-container">
        <div class="chart-title">${t('chart-title')}</div>
        <div class="chart-legend">
          <span class="legend-item" style="color: var(--pleasure);">
            <span class="legend-swatch" style="background: var(--pleasure);"></span>
            ${t('chart-pleasure')} · ${t('chart-actual')}
          </span>
          <span class="legend-item" style="color: var(--pleasure);">
            <span class="legend-swatch dashed"></span>
            ${t('chart-pleasure')} · ${t('chart-predicted')}
          </span>
          <span class="legend-item" style="color: var(--mastery);">
            <span class="legend-swatch" style="background: var(--mastery);"></span>
            ${t('chart-mastery')} · ${t('chart-actual')}
          </span>
          <span class="legend-item" style="color: var(--mastery);">
            <span class="legend-swatch dashed"></span>
            ${t('chart-mastery')} · ${t('chart-predicted')}
          </span>
          <span class="legend-item" style="color: var(--mood);">
            <span class="legend-swatch" style="background: var(--mood);"></span>
            ${t('chart-mood-after')}
          </span>
          <span class="legend-item" style="color: var(--mood);">

        ${chartData.svg}
