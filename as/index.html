  const THEME_MODE_STORAGE_KEY = 'ba_theme_mode_v1';
  const THEME_MODE_VALUES = ['night', 'day'];
  const ADVANCED_TAGS_STORAGE_KEY = 'ba_advanced_tags_v1';
  const TAG_LIBRARY_STORAGE_KEY = 'ba_tag_library_v1';
  const DEFAULT_TAG_KEYS = ['social', 'exercise', 'learning', 'work', 'relaxation', 'outside', 'creative', 'chores', 'screen', 'health'];
  const SAMPLE_TAG_SETS = {
    'sample-act-walk': ['exercise', 'outside', 'health'],
    'sample-act-read': ['relaxation', 'learning'],
    'sample-act-friend': ['social', 'relaxation'],
    'sample-act-work': ['work', 'learning'],
    'sample-act-coffee': ['outside', 'relaxation', 'social'],
  };

  function loadScaleModePreference() {
    try {
      const saved = localStorage.getItem(SCALE_MODE_STORAGE_KEY);
      if (SCALE_MODE_VALUES.includes(saved)) return saved;
    } catch(e) { /* ignore */ }
    return 'words';
  }

  function loadThemeModePreference() {
    try {
      const saved = localStorage.getItem(THEME_MODE_STORAGE_KEY);
      if (THEME_MODE_VALUES.includes(saved)) return saved;
    } catch(e) { /* ignore */ }
    return 'day';
  }

  function loadAdvancedTagsPreference() {
    try {
      return localStorage.getItem(ADVANCED_TAGS_STORAGE_KEY) === 'on';
    } catch(e) { /* ignore */ }
    return false;
  }

  function defaultTagLibrary() {
    return DEFAULT_TAG_KEYS.map(key => ({ key, label: '', builtin: true }));
  }

  function cleanTagKey(raw) {
    return String(raw || '')
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .replace(/-+/g, '-')
      .slice(0, 48);
  }

  function cleanTagLabel(raw) {
    return String(raw || '').trim().replace(/\s+/g, ' ').slice(0, 36);
  }

  function normalizeTagLibrary(raw) {
    if (!Array.isArray(raw)) return [];
    const out = [];
    const seen = new Set();

    raw.forEach(item => {
      let key = '';
      let label = '';
      let builtin = false;

      if (typeof item === 'string') {
        key = cleanTagKey(item);
      } else if (item && typeof item === 'object') {
        key = cleanTagKey(item.key);
        label = cleanTagLabel(item.label);
        builtin = item.builtin === true;
      }

      if (!key) return;
      if (DEFAULT_TAG_KEYS.includes(key)) {
        builtin = true;
        label = '';
      } else if (!label) {
        label = key.replace(/^custom-/, '').replace(/[-_]+/g, ' ').trim() || key;
      }

      if (!seen.has(key)) {
        out.push({ key, label, builtin });
        seen.add(key);
      }
    });

    return out;
  }

  function loadTagLibraryPreference() {
    try {
      const raw = localStorage.getItem(TAG_LIBRARY_STORAGE_KEY);
      if (raw !== null) return normalizeTagLibrary(JSON.parse(raw));
    } catch(e) { /* ignore */ }
    return defaultTagLibrary();
  }

  function saveTagLibrary() {
    try {
      localStorage.setItem(TAG_LIBRARY_STORAGE_KEY, JSON.stringify(state.tagLibrary));
      return true;
    } catch(e) {
      return false;
    }
  }

  let currentLang = 'ka'; // default

  function t(key, params) {
    let str;
    if (I18N[currentLang] && Object.prototype.hasOwnProperty.call(I18N[currentLang], key)) {
      str = I18N[currentLang][key];
    } else if (I18N.en && Object.prototype.hasOwnProperty.call(I18N.en, key)) {
      str = I18N.en[key];
    } else {
      str = key;
    }
    if (params) {
      Object.keys(params).forEach(p => {
        str = String(str).replace(`{${p}}`, params[p]);
      });
    }
    return str;
  }

  function applyTranslations() {
    document.documentElement.setAttribute('lang', currentLang);
    document.title = t('browser-title');
    // Text content nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    // HTML content (for attribution / footer-2 with <em> / <strong>)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      el.innerHTML = t(el.getAttribute('data-i18n-html'));
    });
    // Placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.setAttribute('placeholder', t(el.getAttribute('data-i18n-placeholder')));
    });
    // Confirm modal default message
    const cmsg = document.getElementById('confirm-message');
    if (cmsg) cmsg.textContent = t('confirm-delete');
    // Update lang button highlight
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
    // Re-render dynamic views since their text is built in JS
    if (document.getElementById('view-log').classList.contains('active')) renderLog();
    if (document.getElementById('view-insights').classList.contains('active')) renderInsights();
    // Rebuild day select labels (Today/Tomorrow change with language)
    if (document.getElementById('scheduled-day').options.length > 0) {
      const currentVal = document.getElementById('scheduled-day').value;
      populateDaySelect();
      document.getElementById('scheduled-day').value = currentVal;
    }
    // Re-render templates list and refresh save-template button label
    if (typeof renderTemplates === 'function') renderTemplates();
    if (typeof updateSaveTemplateBtn === 'function') updateSaveTemplateBtn();
    if (typeof renderAllScaleWidgets === 'function') renderAllScaleWidgets({ preserve: true });
    if (typeof renderScaleModeSettingsUI === 'function') renderScaleModeSettingsUI();
    if (typeof renderThemeModeSettingsUI === 'function') renderThemeModeSettingsUI();
    if (typeof renderAdvancedTagsSettingsUI === 'function') renderAdvancedTagsSettingsUI();
    if (typeof renderTagPickers === 'function') renderTagPickers();
    if (typeof renderTagManager === 'function') renderTagManager();
  }

  function setLang(lang) {
    currentLang = ['ka', 'en', 'ru'].includes(lang) ? lang : 'ka';
    try { localStorage.setItem(LANG_STORAGE_KEY, currentLang); } catch(e) {}
    applyTranslations();
  }

  // Load saved preference (defaults to Georgian)
  try {
    const saved = localStorage.getItem(LANG_STORAGE_KEY);
    if (['ka', 'en', 'ru'].includes(saved)) currentLang = saved;
  } catch(e) {}

  // ============ STATE ============
  // For each scale key, track tens (0-100 step 10) and ones (0-9). Total = tens + ones, capped at 100.
  const state = {
    parts: {
      'pred-mastery':  { tens: null, ones: null },
      'pred-pleasure': { tens: null, ones: null },
      'act-mastery':   { tens: null, ones: null },
      'act-pleasure':  { tens: null, ones: null },
      'mood-before':   { tens: null, ones: null },
      'mood-after':    { tens: null, ones: null },
    },
    entries: [],
    templates: [],
    ratingEntryId: null,
    logFilterDate: null, // null = show all dates; otherwise a day-start timestamp (ms)
    analysisActivityKey: null,
    dashboardSort: 'diff',
    chartFilter: 'all',
    chartActivityKey: '__all__',
    chartShowAverages: false,
    analysisGroup: 'activity',
    analysisFilterKey: '__all__',
    scaleMode: loadScaleModePreference(),
    themeMode: loadThemeModePreference(),
    advancedTags: loadAdvancedTagsPreference(),
    tagLibrary: loadTagLibraryPreference(),
  };

  // ============ STORAGE ============
  // Try window.storage first (Claude persistent storage across sessions);
  // fall back to localStorage if it's unavailable or errors out.
  const STORAGE_KEY = 'ba_entries_v1';
  const TEMPLATES_KEY = 'ba_templates_v1';
  const SAMPLE_SEEDED_KEY = 'ba_sample_seeded_v1';
  const SAMPLE_TAGS_MIGRATED_KEY = 'ba_sample_tags_migrated_v1';
  let useWindowStorage = !!(window.storage && typeof window.storage.set === 'function');

  function sortEntries() {
    // Show entries by the activity's starting/scheduled date; fall back to createdAt.
    state.entries.sort((a, b) => entryStartTimestamp(b) - entryStartTimestamp(a));
  }

  async function loadEntries() {
    // Try window.storage first
    if (useWindowStorage) {
      try {
        const result = await window.storage.list('entry:');
        if (result && result.keys && result.keys.length > 0) {
          const loaded = [];
          for (const key of result.keys) {
            try {
              const r = await window.storage.get(key);
              if (r && r.value) loaded.push(JSON.parse(r.value));
            } catch(e) { /* skip */ }
          }
          state.entries = loaded;
          sortEntries();
          return;
        } else if (result) {
          // No entries yet but storage works
          state.entries = [];
          // Also check localStorage for any prior data and migrate
          loadFromLocalStorage();
          return;
        }
      } catch(e) {
        useWindowStorage = false;
      }
    }
    loadFromLocalStorage();
  }

  function loadFromLocalStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          // Merge with any existing state.entries (from window.storage)
          const existingIds = new Set(state.entries.map(e => e.id));
          for (const e of parsed) {
            if (!existingIds.has(e.id)) state.entries.push(e);
          }
          state.entries.sort((a, b) => entryStartTimestamp(b) - entryStartTimestamp(a));
        }
      }
    } catch(e) { /* ignore */ }
  }

  function saveToLocalStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
      return true;
    } catch(e) {
      return false;
    }
  }

  // ============ TEMPLATES ============
  function loadTemplates() {
    try {
      const raw = localStorage.getItem(TEMPLATES_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) state.templates = parsed;
      }
    } catch(e) { /* ignore */ }
  }

  function saveTemplates() {
    try {
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(state.templates));
      return true;
    } catch(e) {
      return false;
    }
  }

  function addTemplate(activityText) {
    const trimmed = activityText.trim();
    if (!trimmed) return false;
    // Don't duplicate
    if (state.templates.some(t => t.toLowerCase() === trimmed.toLowerCase())) return false;
    state.templates.unshift(trimmed);
    // Cap at 20 templates to prevent runaway
    if (state.templates.length > 20) state.templates = state.templates.slice(0, 20);
    saveTemplates();
    return true;
  }

  function removeTemplate(activityText) {
    state.templates = state.templates.filter(t => t !== activityText);
    saveTemplates();
  }

  function isTemplate(activityText) {
    const trimmed = activityText.trim().toLowerCase();
    return state.templates.some(t => t.toLowerCase() === trimmed);
  }

  function renderTemplates() {
    const container = document.getElementById('templates-list-container');
    if (!container) return;
    if (state.templates.length === 0) {
      container.innerHTML = `<div class="templates-empty">${t('templates-empty')}</div>`;
      return;
    }
    container.innerHTML = `<div class="templates-list">${
      state.templates.map((tpl, i) =>
        `<div class="template-chip" data-tpl-index="${i}">
          <span class="template-text">${escapeHtml(tpl)}</span>
          <span class="remove" data-tpl-remove="${i}">×</span>
        </div>`
      ).join('')
    }</div>`;

    // Wire up tap-to-fill and remove
    container.querySelectorAll('.template-chip').forEach(chip => {
      chip.addEventListener('click', (ev) => {
        // If remove was clicked, handle separately
        if (ev.target.dataset.tplRemove !== undefined) {
          ev.stopPropagation();
          handleRemoveTemplate(parseInt(ev.target.dataset.tplRemove));
          return;
        }
        const idx = parseInt(chip.dataset.tplIndex);
        const activityInput = document.getElementById('activity');
        if (activityInput && state.templates[idx]) {
          activityInput.value = state.templates[idx];
          activityInput.dispatchEvent(new Event('input'));
          showToast(state.templates[idx]);
          activityInput.focus();
        }
      });
    });
  }

  async function handleRemoveTemplate(index) {
    const tpl = state.templates[index];
    if (!tpl) return;
    const ok = await showConfirm(t('template-delete-confirm'));
    if (!ok) return;
    removeTemplate(tpl);
    renderTemplates();
    updateSaveTemplateBtn();
    showToast(t('toast-template-removed'));
  }

  function updateSaveTemplateBtn() {
    const btn = document.getElementById('save-template-btn');
    if (!btn) return;
    const activityInput = document.getElementById('activity');
    if (!activityInput) return;
    const val = activityInput.value.trim();
    if (!val) {
      btn.disabled = true;
      btn.classList.remove('saved');
      btn.textContent = t('btn-save-template');
      return;
    }
    if (isTemplate(val)) {
      btn.disabled = true;
      btn.classList.add('saved');
      btn.textContent = t('btn-template-saved');
    } else {
      btn.disabled = false;
      btn.classList.remove('saved');
      btn.textContent = t('btn-save-template');
    }
  }


  // ============ ADVANCED TAGS ============
  function getTagLibrary() {
    if (!Array.isArray(state.tagLibrary)) state.tagLibrary = defaultTagLibrary();
    return state.tagLibrary;
  }

  function getTagKeys() {
    return getTagLibrary().map(tag => tag.key);
  }

  function sanitizeTags(tags) {
    if (!Array.isArray(tags)) return [];
    const allowed = new Set(getTagKeys());
    const out = [];
    tags.forEach(tag => {
      const key = cleanTagKey(tag);
      if (allowed.has(key) && !out.includes(key)) out.push(key);
    });
    return out;
  }

  function tagLabel(key) {
    const clean = cleanTagKey(key);
    const tag = getTagLibrary().find(item => item.key === clean);
    if (tag && tag.builtin) return t('tag-' + clean);
    if (tag && tag.label) return tag.label;
    return clean || '';
  }

  function getEntryTags(entry) {
    return sanitizeTags(entry && entry.tags);
  }

  function makeTagKey(label) {
    const base = cleanTagKey(label) || 'tag';
    const existing = new Set(getTagKeys());
    let key = 'custom-' + base;
    let i = 2;
    while (existing.has(key)) {
      key = 'custom-' + base + '-' + i;
      i += 1;
    }
    return key;
  }

  function tagLabelExists(label) {
    const target = cleanTagLabel(label).toLocaleLowerCase();
    if (!target) return false;
    return getTagLibrary().some(tag => tagLabel(tag.key).toLocaleLowerCase() === target);
  }

  function renderTagPicker(containerId, selectedTags = []) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const selected = new Set(sanitizeTags(selectedTags));
    const tags = getTagLibrary();
    const canManageTags = containerId === 'activity-tags-list';
    if (!tags.length) {
      container.innerHTML = `<div class="tag-manager-empty">${t('settings-tags-empty')}</div>`;
      return;
    }
    container.innerHTML = tags.map(tag => `
      <div class="tag-choice-wrap" data-tag-key="${escapeHtml(tag.key)}">
        <label class="tag-choice${canManageTags ? ' has-remove' : ''}">
          <input type="checkbox" value="${escapeHtml(tag.key)}" ${selected.has(tag.key) ? 'checked' : ''}>
          <span>
            ${escapeHtml(tagLabel(tag.key))}
            ${canManageTags ? `<button type="button" class="tag-inline-remove-btn" data-remove-tag="${escapeHtml(tag.key)}" aria-label="${escapeHtml(t('settings-tags-remove'))}" title="${escapeHtml(t('settings-tags-remove'))}">×</button>` : ''}
          </span>
        </label>
      </div>`).join('');

    if (canManageTags) {
      container.querySelectorAll('[data-remove-tag]').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          removeTagFromSettings(btn.dataset.removeTag);
        });
      });
    }
  }

  function getSelectedTags(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return [];
    return sanitizeTags(Array.from(container.querySelectorAll('input[type="checkbox"]:checked')).map(input => input.value));
  }

  function clearTagPicker(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('input[type="checkbox"]').forEach(input => { input.checked = false; });
  }

  function renderTagPickers() {
    const field = document.getElementById('activity-tags-field');
    const showTags = !!state.advancedTags;
    if (field) {
      field.classList.toggle('scale-hidden', !showTags);
      field.hidden = !showTags;
      field.setAttribute('aria-hidden', showTags ? 'false' : 'true');
    }
    if (showTags) {
      renderTagPicker('activity-tags-list', getSelectedTags('activity-tags-list'));
    } else {
      clearTagPicker('activity-tags-list');
    }
  }

  function tagPillsHtml(tags, includeEmpty = false) {
    const clean = sanitizeTags(tags);
    if (!clean.length && !includeEmpty) return '';
    const pills = clean.length
      ? clean.map(key => `<span class="tag-pill">${escapeHtml(tagLabel(key))}</span>`).join('')
      : `<span class="tag-pill">${t('tags-none')}</span>`;
    return pills;
  }

  function renderTagManager() {
    const manager = document.getElementById('tag-manager');
    if (manager) manager.classList.toggle('scale-hidden', !state.advancedTags);

    const list = document.getElementById('tag-manager-list');
    if (!list) return;

    const tags = getTagLibrary();
    if (!tags.length) {
      list.innerHTML = `<div class="tag-manager-empty">${t('settings-tags-empty')}</div>`;
      return;
    }

    list.innerHTML = tags.map(tag => `
      <div class="tag-manager-row" data-tag-key="${escapeHtml(tag.key)}">
        <div class="tag-manager-name">
          <span>${escapeHtml(tagLabel(tag.key))}</span>
          <span class="tag-manager-type">${escapeHtml(t(tag.builtin ? 'settings-tags-builtin' : 'settings-tags-custom'))}</span>
        </div>
        <button type="button" class="tag-remove-btn" data-remove-tag="${escapeHtml(tag.key)}">${escapeHtml(t('settings-tags-remove'))}</button>
      </div>`).join('');

    list.querySelectorAll('[data-remove-tag]').forEach(btn => {
      btn.addEventListener('click', () => removeTagFromSettings(btn.dataset.removeTag));
    });
  }

  function renderAdvancedTagsSettingsUI() {
    document.documentElement.setAttribute('data-advanced-tags', state.advancedTags ? 'on' : 'off');
    document.querySelectorAll('input[name="advanced-tags"]').forEach(radio => {
      radio.checked = radio.value === (state.advancedTags ? 'on' : 'off');
    });
    const current = document.getElementById('advanced-tags-current');
    if (current) current.textContent = t(state.advancedTags ? 'settings-tags-current-on' : 'settings-tags-current-off');
    renderTagPickers();
  }

  function setAdvancedTagsMode(value) {
    const enabled = value === true || value === 'on';
    if (state.advancedTags === enabled) {
      renderAdvancedTagsSettingsUI();
      return;
    }
    state.advancedTags = enabled;
    if (!enabled) {
      state.analysisGroup = 'activity';
      state.analysisFilterKey = '__all__';
    }
    try { localStorage.setItem(ADVANCED_TAGS_STORAGE_KEY, enabled ? 'on' : 'off'); } catch(e) { /* ignore */ }
    renderAdvancedTagsSettingsUI();
    if (document.getElementById('view-log').classList.contains('active')) renderLog();
    if (document.getElementById('view-insights').classList.contains('active')) renderInsights();
    showToast(t('toast-settings-saved'));
  }

  function addTagFromSettings() {
    const input = document.getElementById('new-entry-tag-input');
    if (!input) return;
    const label = cleanTagLabel(input.value);
    if (!label) {
      showToast(t('toast-tag-invalid'));
      return;
    }
    if (tagLabelExists(label)) {
      showToast(t('toast-tag-exists'));
      return;
    }

    const selected = getSelectedTags('activity-tags-list');
    const newTag = { key: makeTagKey(label), label, builtin: false };
    state.tagLibrary.push(newTag);
    saveTagLibrary();
    input.value = '';
    renderTagPicker('activity-tags-list', selected.concat(newTag.key));
    if (document.getElementById('view-log').classList.contains('active')) renderLog();
    if (document.getElementById('view-insights').classList.contains('active')) renderInsights();
    showToast(t('toast-tag-added'));
  }

  async function saveAllEntries() {
    let savedSomewhere = false;

    if (useWindowStorage) {
      try {
        for (const entry of state.entries) {
          await window.storage.set('entry:' + entry.id, JSON.stringify(entry));
        }
        savedSomewhere = true;
      } catch(e) {
        useWindowStorage = false;
      }
    }

    if (saveToLocalStorage()) savedSomewhere = true;
    if (!savedSomewhere) showToast(t('toast-failed'));
    return savedSomewhere;
  }

  async function removeTagFromSettings(key) {
    const clean = cleanTagKey(key);
    const tag = getTagLibrary().find(item => item.key === clean);
    if (!tag) return;

    const ok = await showConfirm(t('settings-tags-delete-confirm', { tag: tagLabel(clean) }));
    if (!ok) return;

    state.tagLibrary = getTagLibrary().filter(item => item.key !== clean);
    state.entries.forEach(entry => {
      if (Array.isArray(entry.tags)) entry.tags = entry.tags.filter(tagKey => cleanTagKey(tagKey) !== clean);
    });

    saveTagLibrary();
    await saveAllEntries();

    state.analysisFilterKey = '__all__';
    state.chartActivityKey = '__all__';
    renderAdvancedTagsSettingsUI();
    if (document.getElementById('view-log').classList.contains('active')) renderLog();
    if (document.getElementById('view-insights').classList.contains('active')) renderInsights();
    showToast(t('toast-tag-removed'));
  }

  function mergeTagLibrary(importedTagLibrary) {
    const imported = normalizeTagLibrary(importedTagLibrary);
    if (!imported.length) return;
    const existing = new Set(getTagKeys());
    imported.forEach(tag => {
      if (!existing.has(tag.key)) {
        state.tagLibrary.push(tag);
        existing.add(tag.key);
      }
    });
    saveTagLibrary();
  }

  async function saveEntry(entry) {
    // Update in-memory list first
    const idx = state.entries.findIndex(e => e.id === entry.id);
    if (idx >= 0) state.entries[idx] = entry;
    // else: caller handles insertion

    let savedSomewhere = false;

    if (useWindowStorage) {
      try {
        await window.storage.set('entry:' + entry.id, JSON.stringify(entry));
        savedSomewhere = true;
      } catch(e) {
        useWindowStorage = false;
      }
    }

    // Always also save to localStorage as a safety net
    if (saveToLocalStorage()) savedSomewhere = true;

    if (!savedSomewhere) {
      showToast(t('toast-failed'));
    }
    return savedSomewhere;
  }

  async function deleteEntry(id) {
    state.entries = state.entries.filter(e => e.id !== id);
    if (useWindowStorage) {
      try { await window.storage.delete('entry:' + id); } catch(e) { /* ignore */ }
    }
    saveToLocalStorage();
    return true;
  }

  // ============ SAMPLE DATA (first-launch onboarding) ============
  // Builds 5 illustrative entries scattered across the last ~5 days so
  // beginners immediately see a populated Log, a meaningful Insights chart,
  // a working streak, and dashboard rankings. Each entry is marked
  // `isSample: true` so it can be styled and removed in bulk.
  function buildSampleEntries() {
    const now = Date.now();
    const DAY = 86400000;
    // Helper: build a timestamp N days ago at hour H
    const at = (daysAgo, hour) => {
      const d = new Date(now - daysAgo * DAY);
      d.setHours(hour, 0, 0, 0);
      return d.getTime();
    };

    // Curated mix: under-predicted (reality kinder than expected), accurate,
    // over-predicted (reality lower than expected), and rising mood lift.
    const samples = [
      {
        activityKey: 'sample-act-walk',
        companyKey: 'sample-alone',
        scheduledAt: at(4, 8),  // 4 days ago, 8 AM
        predMastery: 50, predPleasure: 40,
        actMastery: 70,  actPleasure: 75,
        moodBefore: 40,  moodAfter: 65,
        tags: ['exercise', 'outside', 'health'],
      },
      {
        activityKey: 'sample-act-read',
        companyKey: 'sample-alone',
        scheduledAt: at(3, 21),
        predMastery: 60, predPleasure: 65,
        actMastery: 65,  actPleasure: 70,
        moodBefore: 55,  moodAfter: 68,
        tags: ['relaxation', 'learning'],
      },
      {
        activityKey: 'sample-act-friend',
        companyKey: 'sample-with-friend',
        scheduledAt: at(2, 19),
        predMastery: 30, predPleasure: 45,
        actMastery: 55,  actPleasure: 82,
        moodBefore: 35,  moodAfter: 78,
        tags: ['social', 'relaxation'],
      },
      {
        activityKey: 'sample-act-work',
        companyKey: 'sample-alone',
        scheduledAt: at(1, 11),
        predMastery: 80, predPleasure: 30,
        actMastery: 75,  actPleasure: 45,
        moodBefore: 50,  moodAfter: 55,
        tags: ['work', 'learning'],
      },
      {
        activityKey: 'sample-act-coffee',
        companyKey: 'sample-alone',
        scheduledAt: at(0, 10),
        predMastery: 20, predPleasure: 55,
        actMastery: 40,  actPleasure: 80,
        moodBefore: 45,  moodAfter: 72,
        tags: ['outside', 'relaxation', 'social'],
      },
    ];

    return samples.map((s, i) => ({
      id: 'e_sample_' + (now + i) + '_' + Math.random().toString(36).slice(2, 6),
      sampleKey: s.activityKey,
      activity: t(s.activityKey),
      company: t(s.companyKey),
      predMastery: s.predMastery,
      predPleasure: s.predPleasure,
      actMastery: s.actMastery,
      actPleasure: s.actPleasure,
      moodBefore: s.moodBefore,
      moodAfter: s.moodAfter,
      tags: sanitizeTags(SAMPLE_TAG_SETS[s.activityKey] || s.tags || []),
      createdAt: s.scheduledAt - 3600000, // "saved" an hour before scheduled
      scheduledAt: s.scheduledAt,
      completedAt: s.scheduledAt + 1800000, // "rated" 30 min after scheduled
      isSample: true,
    }));
  }


  function sampleKeyForEntry(entry) {
    if (!entry || !(entry.isSample || String(entry.id || '').startsWith('e_sample_'))) return null;
    if (entry.sampleKey && SAMPLE_TAG_SETS[entry.sampleKey]) return entry.sampleKey;

    const activity = String(entry.activity || '').trim();
    if (!activity) return null;

    const languages = Object.keys(I18N || {});
    for (const sampleKey of Object.keys(SAMPLE_TAG_SETS)) {
      for (const lang of languages) {
        if (I18N[lang] && I18N[lang][sampleKey] === activity) return sampleKey;
      }
    }
    return null;
  }

  async function ensureSampleEntryTags() {
    let alreadyMigrated = false;
    try { alreadyMigrated = !!localStorage.getItem(SAMPLE_TAGS_MIGRATED_KEY); } catch(_) {}
    if (alreadyMigrated) return false;

    let changed = false;
    state.entries.forEach(entry => {
      const sampleKey = sampleKeyForEntry(entry);
      if (!sampleKey) return;

      const wantedTags = SAMPLE_TAG_SETS[sampleKey] || [];
      const existingTags = Array.isArray(entry.tags)
        ? entry.tags.map(cleanTagKey).filter(Boolean)
        : [];
      const mergedTags = Array.from(new Set(existingTags.concat(wantedTags)));

      if (entry.sampleKey !== sampleKey) {
        entry.sampleKey = sampleKey;
        changed = true;
      }
      if (JSON.stringify(entry.tags || []) !== JSON.stringify(mergedTags)) {
        entry.tags = mergedTags;
        changed = true;
      }
    });

    if (changed) await saveAllEntries();
    try { localStorage.setItem(SAMPLE_TAGS_MIGRATED_KEY, '1'); } catch(_) {}
    return changed;
  }

  async function seedSampleData() {
    // Only seed on a truly fresh install:
    // - no flag stored saying we've seeded before
    // - no existing entries (so users who deleted samples never see them again)
    let alreadySeeded = false;
    try { alreadySeeded = !!localStorage.getItem(SAMPLE_SEEDED_KEY); } catch(_) {}
    if (alreadySeeded) return;
    if (state.entries.length > 0) {
      // Existing user — mark flag so they don't suddenly get samples later
      try { localStorage.setItem(SAMPLE_SEEDED_KEY, '1'); } catch(_) {}
      return;
    }

    const samples = buildSampleEntries();
    state.entries = samples.concat(state.entries);
    sortEntries();

    // Persist each sample to both storage layers
    for (const s of samples) {
      if (useWindowStorage) {
        try { await window.storage.set('entry:' + s.id, JSON.stringify(s)); } catch(_) {}
      }
    }
    saveToLocalStorage();

    // Mark that we've seeded so we never do it again
    try { localStorage.setItem(SAMPLE_SEEDED_KEY, '1'); } catch(_) {}
  }

  async function removeAllSampleEntries() {
    const sampleIds = state.entries.filter(e => e.isSample).map(e => e.id);
    if (sampleIds.length === 0) return;

    state.entries = state.entries.filter(e => !e.isSample);
    if (useWindowStorage) {
      for (const id of sampleIds) {
        try { await window.storage.delete('entry:' + id); } catch(_) {}
      }
    }
    saveToLocalStorage();
    renderLog();
    showToast(t('sample-toast-removed'));
  }

  // ============ SCALES ============
  const MAIN_SCALE_KEYS = ['pred-mastery', 'pred-pleasure', 'act-mastery', 'act-pleasure', 'mood-before', 'mood-after'];

  function scaleColor(key) {
    return key.startsWith('mood-') ? 'mood'
         : key.includes('mastery') ? 'mastery'
         : 'pleasure';
  }

  function clampScore(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return null;
    return Math.max(0, Math.min(100, Math.round(n)));
  }

  function scoreToTen(value) {
    const n = clampScore(value);
    if (n === null) return null;
    return Math.max(0, Math.min(10, Math.round(n / 10)));
  }

  function normalizeScoreForCurrentMode(value) {
    const n = clampScore(value);
    if (n === null) return null;
    if (state.scaleMode === 'precise') return n;
    if (state.scaleMode === 'half') return Math.max(0, Math.min(100, Math.round(n / 5) * 5));
    return scoreToTen(n) * 10;
  }

  function formatHalfScore(total) {
    return (total / 10).toFixed(1);
  }

  function formatTotalForCurrentMode(total) {
    if (total === null) return '—';
    if (state.scaleMode === 'precise') return String(total);
    if (state.scaleMode === 'half') return `${formatHalfScore(total)}/10`;
    return `${scoreToTen(total)}/10`;
  }

  function ensureScaleState(key) {
    if (!state.parts[key]) state.parts[key] = { tens: null, ones: null };
    return state.parts[key];
  }

  function setPartsFromScore(key, score) {
    const p = ensureScaleState(key);
    const n = clampScore(score);
    if (n === null) {
      p.tens = null;
      p.ones = null;
      return;
    }
    if (n === 100) {
      p.tens = 100;
      p.ones = 0;
    } else {
      p.tens = Math.floor(n / 10) * 10;
      p.ones = n % 10;
    }
  }

  function updateScaleLabels(container, part) {
    const label = container && container.previousElementSibling;
    if (!label || !label.classList || !label.classList.contains('scale-sub-label')) return;
    if (state.scaleMode === 'precise') {
      label.textContent = t(part === 'tens' ? 'sub-tens' : 'sub-ones');
    } else if (part === 'tens' && state.scaleMode === 'ten') {
      label.textContent = t('sub-zero-ten');
    } else if (part === 'tens' && state.scaleMode === 'half') {
      label.textContent = t('sub-half-step');
    } else if (part === 'tens' && state.scaleMode === 'words') {
      label.textContent = t('sub-word-selector');
    }
  }

  function buildScale(container, key, part) {
    ensureScaleState(key);
    container.innerHTML = '';
    container.classList.remove('ten-mode', 'words', 'half-mode');
    const wrapper = container.parentElement;
    if (wrapper) wrapper.classList.remove('scale-hidden');
    const color = scaleColor(key);

    if (state.scaleMode !== 'precise' && part === 'ones') {
      if (wrapper) wrapper.classList.add('scale-hidden');
      return;
    }

    updateScaleLabels(container, part);

    if (state.scaleMode === 'words' && part === 'tens') {
      container.classList.add('words');
      const select = document.createElement('select');
      select.className = 'scale-word-select';
      select.innerHTML = `<option value="" disabled selected>${t('scale-word-placeholder')}</option>`;
      for (let i = 0; i <= 10; i++) {
        const opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = `${i} · ${t('scale-word-' + i)}`;
        select.appendChild(opt);
      }
      select.addEventListener('change', () => selectTenValue(key, parseInt(select.value, 10), container, color));
      container.appendChild(select);
      return;
    }

    if (state.scaleMode === 'half' && part === 'tens') {
      container.classList.add('half-mode');
      const select = document.createElement('select');
      select.className = 'scale-word-select scale-half-select';
      select.innerHTML = `<option value="" disabled selected>${t('scale-half-placeholder')}</option>`;
      for (let score = 0; score <= 100; score += 5) {
        const opt = document.createElement('option');
        opt.value = String(score);
        opt.textContent = formatHalfScore(score);
        select.appendChild(opt);
      }
      select.addEventListener('change', () => selectHalfScore(key, parseInt(select.value, 10), container, color));
      container.appendChild(select);
      return;
    }

    if (state.scaleMode === 'ten' && part === 'tens') {
      container.classList.add('ten-mode');
      for (let i = 0; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'scale-btn';
        btn.textContent = i;
        btn.dataset.value = String(i);
        btn.addEventListener('click', () => selectTenValue(key, i, container, color));
        container.appendChild(btn);
      }
      return;
    }

    const max = part === 'tens' ? 100 : 9;
    const step = part === 'tens' ? 10 : 1;
    for (let i = 0; i <= max; i += step) {
      const btn = document.createElement('button');
      btn.className = 'scale-btn';
      btn.textContent = i;
      btn.dataset.value = i;
      btn.addEventListener('click', () => selectPart(key, part, i, container, color));
      container.appendChild(btn);
    }
  }

  function selectTenValue(key, tenValue, container, color) {
    const ten = Math.max(0, Math.min(10, parseInt(tenValue, 10)));
    const score = ten * 10;
    setPartsFromScore(key, score);

    container.querySelectorAll('.scale-btn').forEach(b => {
      b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
      if (parseInt(b.dataset.value, 10) === ten) b.classList.add('selected', color);
    });

    const select = container.querySelector('.scale-word-select');
    if (select) select.value = String(ten);

    updateTotalDisplay(key, color);
    updateSaveButtons();
  }

  function selectHalfScore(key, scoreValue, container, color) {
    const score = Math.max(0, Math.min(100, Math.round(parseInt(scoreValue, 10) / 5) * 5));
    setPartsFromScore(key, score);

    const select = container.querySelector('.scale-half-select');
    if (select) select.value = String(score);

    updateTotalDisplay(key, color);
    updateSaveButtons();
  }

  function selectPart(key, part, value, container, color) {
    ensureScaleState(key);
    // If user picks tens=100, force ones to 0 and disable
    state.parts[key][part] = value;
    if (part === 'tens' && value === 100) {
      state.parts[key].ones = 0;
    }

    // Highlight the selected button in this row
    container.querySelectorAll('.scale-btn').forEach(b => {
      b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
      if (parseInt(b.dataset.value, 10) === value) b.classList.add('selected', color);
    });

    // If tens=100, also visually mark ones=0 and gray out other ones buttons
    if (part === 'tens') {
      const onesRow = document.querySelector(`.scale-row.ones[data-scale="${key}"]`);
      if (onesRow) {
        if (value === 100) {
          onesRow.querySelectorAll('.scale-btn').forEach(b => {
            b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
            if (parseInt(b.dataset.value, 10) === 0) b.classList.add('selected', color);
            b.style.opacity = parseInt(b.dataset.value, 10) === 0 ? '1' : '0.3';
            b.style.pointerEvents = parseInt(b.dataset.value, 10) === 0 ? 'auto' : 'none';
          });
        } else {
          onesRow.querySelectorAll('.scale-btn').forEach(b => {
            b.style.opacity = '';
            b.style.pointerEvents = '';
          });
        }
      }
    }

    updateTotalDisplay(key, color);
    updateSaveButtons();
  }

  function updateTotalDisplay(key, color) {
    const total = getTotal(key);
    const el = document.querySelector(`[data-total="${key}"]`);
    if (!el) return;
    el.classList.remove('pleasure', 'mastery', 'mood', 'empty');
    if (total === null) {
      el.textContent = '—';
      el.classList.add('empty');
    } else {
      el.textContent = formatTotalForCurrentMode(total);
      el.classList.add(color);
    }
  }

  function resetScaleKey(key) {
    const p = ensureScaleState(key);
    p.tens = null;
    p.ones = null;
    document.querySelectorAll(`.scale-row[data-scale="${key}"] .scale-btn`).forEach(b => {
      b.classList.remove('selected', 'pleasure', 'mastery', 'mood');
      b.style.opacity = '';
      b.style.pointerEvents = '';
    });
    document.querySelectorAll(`.scale-row[data-scale="${key}"] .scale-word-select`).forEach(sel => {
      sel.value = '';
    });
    const el = document.querySelector(`[data-total="${key}"]`);
    if (el) {
      el.classList.remove('pleasure', 'mastery', 'mood');
      el.classList.add('empty');
      el.textContent = '—';
    }
  }

  function renderScaleWidget(key, scope = document) {
    ensureScaleState(key);
    const tensRow = scope.querySelector(`.scale-row.tens[data-scale="${key}"]`);
    const onesRow = scope.querySelector(`.scale-row.ones[data-scale="${key}"]`);
    if (tensRow) buildScale(tensRow, key, 'tens');
    if (onesRow) buildScale(onesRow, key, 'ones');
  }

  function renderAllScaleWidgets({ preserve = true } = {}) {
    const keys = Array.from(document.querySelectorAll('.scale-row.tens[data-scale]'))
      .map(row => row.dataset.scale)
      .filter((key, idx, arr) => key && arr.indexOf(key) === idx && state.parts[key]);
    const totals = {};
    if (preserve) keys.forEach(key => { totals[key] = getTotal(key); });
    keys.forEach(key => {
      renderScaleWidget(key, document);
      resetScaleKey(key);
      if (preserve && totals[key] !== null) prefillScale(key, totals[key], document);
    });
  }

  // Get the resolved total for a scale key (or null if incomplete)
  function getTotal(key) {
    const p = state.parts[key];
    if (!p || p.tens === null || p.ones === null) return null;
    if (p.tens === 100) return 100;
    return p.tens + p.ones;
  }

  function updateSaveButtons() {
    const activityEl = document.getElementById('activity');
    const saveBtn = document.getElementById('save-btn');
    if (activityEl && saveBtn) {
      const activity = activityEl.value.trim();
      const canSave = activity && getTotal('pred-mastery') !== null && getTotal('pred-pleasure') !== null;
      saveBtn.disabled = !canSave;
    }

    const rateBtn = document.getElementById('save-rating-btn');
    if (rateBtn) {
      const canRate =
        getTotal('act-mastery')  !== null &&
        getTotal('act-pleasure') !== null &&
        getTotal('mood-before')  !== null &&
        getTotal('mood-after')   !== null;
      rateBtn.disabled = !canRate;
    }
  }

  function renderScaleModeSettingsUI() {
    document.querySelectorAll('input[name="scale-mode"]').forEach(radio => {
      radio.checked = radio.value === state.scaleMode;
    });
    const current = document.getElementById('scale-mode-current');
    if (current) current.textContent = t('settings-current-' + state.scaleMode);
  }

  function setScaleMode(mode) {
    if (!SCALE_MODE_VALUES.includes(mode)) return;
    if (state.scaleMode === mode) {
      renderScaleModeSettingsUI();
      return;
    }
    state.scaleMode = mode;
    try { localStorage.setItem(SCALE_MODE_STORAGE_KEY, mode); } catch(e) { /* ignore */ }
    renderAllScaleWidgets({ preserve: true });
    renderScaleModeSettingsUI();
    updateSaveButtons();
    showToast(t('toast-settings-saved'));
  }

  function applyThemeMode(mode) {
    const resolved = THEME_MODE_VALUES.includes(mode) ? mode : 'day';
    document.documentElement.setAttribute('data-theme', resolved);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', resolved === 'day' ? '#f7f6f0' : '#1a1f1c');
  }

  function renderThemeModeSettingsUI() {
    document.querySelectorAll('input[name="theme-mode"]').forEach(radio => {
      radio.checked = radio.value === state.themeMode;
    });
    const current = document.getElementById('theme-mode-current');
    if (current) current.textContent = t('settings-theme-current-' + state.themeMode);
  }

  function setThemeMode(mode) {
    if (!THEME_MODE_VALUES.includes(mode)) return;
    if (state.themeMode === mode) {
      renderThemeModeSettingsUI();
      return;
    }
    state.themeMode = mode;
    try { localStorage.setItem(THEME_MODE_STORAGE_KEY, mode); } catch(e) { /* ignore */ }
    applyThemeMode(mode);
    renderThemeModeSettingsUI();
    showToast(t('toast-settings-saved'));
  }

  // ============ VIEWS ============
  function switchView(name) {
    document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.view === name));
    document.querySelectorAll('.view').forEach(v => {
      if (v.id === 'view-rate') return;
      v.classList.toggle('active', v.id === 'view-' + name);
    });
    // Hide view-rate. On desktop, our grid CSS rule has `!important` and is
    // gated on .active, so we MUST also remove .active here — otherwise the
    // inline display:none gets overridden and view-rate stays visible.
    const rateEl = document.getElementById('view-rate');
    rateEl.classList.remove('active');
    rateEl.style.display = 'none';
    if (name === 'new') renderTagPickers();
    if (name === 'log') renderLog();
    if (name === 'insights') renderInsights();
  }

  // ============ NEW ENTRY ============
  document.getElementById('save-btn').addEventListener('click', async () => {
    const activity = document.getElementById('activity').value.trim();
    const company = document.getElementById('company').value.trim();
    const scheduledAt = getScheduledTimestamp();
    const entry = {
      id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      activity,
      company,
      predMastery: getTotal('pred-mastery'),
      predPleasure: getTotal('pred-pleasure'),
      actMastery: null,
      actPleasure: null,
      moodBefore: null,
      moodAfter: null,
      tags: state.advancedTags ? getSelectedTags('activity-tags-list') : [],
      createdAt: Date.now(),
      scheduledAt,
      completedAt: null,
    };
    state.entries.unshift(entry);
    sortEntries();
    const ok = await saveEntry(entry);
    if (ok) {
      document.getElementById('activity').value = '';
      document.getElementById('company').value = '';
      clearTagPicker('activity-tags-list');
      resetScaleKey('pred-mastery');
      resetScaleKey('pred-pleasure');
      // Reset time to current hour
      setTimeFromHourOffset(0);
      document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('active'));
      updateSaveButtons();
      updateSaveTemplateBtn();
      showToast(t('toast-saved'));
      switchView('log');
    } else {
      state.entries = state.entries.filter(e => e.id !== entry.id);
    }
  });

  document.getElementById('activity').addEventListener('input', () => {
    updateSaveButtons();
    updateSaveTemplateBtn();
  });

  // Save-as-template button
  document.getElementById('save-template-btn').addEventListener('click', () => {
    const val = document.getElementById('activity').value.trim();
    if (!val) return;
    const added = addTemplate(val);
    if (added) {
      renderTemplates();
      updateSaveTemplateBtn();
      showToast(t('toast-template-saved'));
    }
  });

  // ============ TIME PICKER ============
  // Hour-only granularity, matching the BA pleasure-predicting sheet:
  // pick a day (Today / Tomorrow / +N days) and an hour (0–23).
  function populateDaySelect() {
    const sel = document.getElementById('scheduled-day');
    sel.innerHTML = '';
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const labels = [t('day-today'), t('day-tomorrow')];
    for (let i = 0; i < 14; i++) {
      const d = new Date(today.getTime() + i * 86400000);
      const opt = document.createElement('option');
      opt.value = d.getTime();
      if (i < 2) {
        opt.textContent = labels[i];
      } else {
        opt.textContent = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      }
      sel.appendChild(opt);
    }
  }

  function populateHourSelect() {
    const sel = document.getElementById('scheduled-hour');
    sel.innerHTML = '';
    for (let h = 0; h < 24; h++) {
      const opt = document.createElement('option');
      opt.value = h;
      // 12-hour format with AM/PM for readability
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
      opt.textContent = `${h12}:00 ${ampm}`;
      sel.appendChild(opt);
    }
  }

  // Get the timestamp from current select values
  function getScheduledTimestamp() {
    const dayMs = parseInt(document.getElementById('scheduled-day').value);
    const hour = parseInt(document.getElementById('scheduled-hour').value);
    return dayMs + hour * 3600000;
  }

  // Set selects from an offset in hours from "now" (rounded to nearest hour)
  function setTimeFromHourOffset(hoursFromNow) {
    const target = new Date(Date.now() + hoursFromNow * 3600000);
    const dayStart = new Date(target);
    dayStart.setHours(0, 0, 0, 0);
    document.getElementById('scheduled-day').value = dayStart.getTime();
    document.getElementById('scheduled-hour').value = target.getHours();
  }

  // Preset buttons
  document.querySelectorAll('.time-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      const hrs = parseInt(btn.dataset.hours);
      setTimeFromHourOffset(hrs);
      document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Clear preset highlight when user manually changes day or hour
  ['scheduled-day', 'scheduled-hour'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      document.querySelectorAll('.time-preset').forEach(b => b.classList.remove('active'));
    });
  });

  // Initial population + default to current hour
  populateDaySelect();
  populateHourSelect();
  setTimeFromHourOffset(0);

  // ============ RATE ENTRY ============
  function openRate(id) {
    const entry = state.entries.find(e => e.id === id);
    if (!entry) return;
    state.ratingEntryId = id;
    document.getElementById('rate-activity').textContent = entry.activity;

    // Reset scales first so we start from a known state
    resetScaleKey('act-mastery');
    resetScaleKey('act-pleasure');
    resetScaleKey('mood-before');
    resetScaleKey('mood-after');

    // Switch views BEFORE prefilling so the rate view is rendered/visible
    // and selectPart can find and style its scale buttons reliably.
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-rate').style.display = 'block';
    document.getElementById('view-rate').classList.add('active');

    // Pre-fill any values that were already saved (e.g., via pencil edits),
    // so the user doesn't have to re-enter them. We do this in a microtask
    // to ensure the just-shown view-rate has been laid out.
    requestAnimationFrame(() => {
      if (typeof entry.actMastery === 'number')  prefillScale('act-mastery',  entry.actMastery);
      if (typeof entry.actPleasure === 'number') prefillScale('act-pleasure', entry.actPleasure);
      if (typeof entry.moodBefore === 'number')  prefillScale('mood-before',  entry.moodBefore);
      if (typeof entry.moodAfter === 'number')   prefillScale('mood-after',   entry.moodAfter);
      updateSaveButtons();
    });

    window.scrollTo(0, 0);
  }

  // Pre-fill a scale from a single numeric value (0-100).
  // In 0–10, 0.5-step, and word modes, existing 0–100 scores are rounded to the nearest supported step.
  function prefillScale(key, value, scope = document) {
    const score = normalizeScoreForCurrentMode(value);
    if (score === null) return;
    const color = scaleColor(key);
    const tensRow = scope.querySelector(`.scale-row.tens[data-scale="${key}"]`);
    const onesRow = scope.querySelector(`.scale-row.ones[data-scale="${key}"]`);
    if (!tensRow) return;

    if (state.scaleMode === 'precise') {
      const tens = score === 100 ? 100 : Math.floor(score / 10) * 10;
      const ones = score === 100 ? 0 : score % 10;
      selectPart(key, 'tens', tens, tensRow, color);
      if (onesRow && tens !== 100) selectPart(key, 'ones', ones, onesRow, color);
      return;
    }

    if (state.scaleMode === 'half') {
      selectHalfScore(key, score, tensRow, color);
      return;
    }

    selectTenValue(key, scoreToTen(score), tensRow, color);
  }

  document.getElementById('cancel-rating-btn').addEventListener('click', () => {

    rateEl.classList.remove('active');
    rateEl.style.display = 'none';
    switchView('log');

  document.getElementById('save-rating-btn').addEventListener('click', async () => {

    if (!entry) return;
    entry.actMastery = getTotal('act-mastery');
    entry.actPleasure = getTotal('act-pleasure');
    entry.moodBefore = getTotal('mood-before'); // null if user didn't pick both tens and ones
    entry.moodAfter  = getTotal('mood-after');

    // Mirror the same "all four required" rule used by the log's isPending check.
    // Only mark the entry as fully completed when every post-activity value is in,
    // otherwise leave it pending so the Rate Actual button remains visible.
    const allFilled =
      entry.actMastery != null &&
      entry.actPleasure != null &&
      entry.moodBefore != null &&

  // ============ LOG VIEW ============
  function fmtDate(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yest = new Date(today.getTime() - 86400000);
    const tomorrow = new Date(today.getTime() + 86400000);
    // Hour-only format: e.g. "3 PM" or "12 AM"
    const h = d.getHours();
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    const timeStr = `${h12} ${ampm}`;
    if (d.toDateString() === today.toDateString()) return 'Today · ' + timeStr;
    if (d.toDateString() === yest.toDateString()) return 'Yesterday · ' + timeStr;
    if (d.toDateString() === tomorrow.toDateString()) return 'Tomorrow · ' + timeStr;
    return d.toLocaleDateString([], {month: 'short', day: 'numeric'}) + ' · ' + timeStr;
  }

  function timeHint(ts, isPending) {
    if (!isPending) return '';
    const diff = ts - Date.now();
    const absDiff = Math.abs(diff);
    const hrs = Math.round(absDiff / 3600000);
    const days = Math.round(hrs / 24);
    if (diff > 0) {
      if (hrs < 1) return t('hint-soon');
      if (hrs < 24) return t('hint-in-hr', { n: hrs });
      return t('hint-in-d', { n: days });
    } else {
      if (hrs < 1) return t('hint-now');
      if (hrs < 24) return t('hint-ago-hr', { n: hrs });
      return t('hint-ago-d', { n: days });
    }
  }

  function deltaBadge(pred, act) {
    if (act === null) return '';
    const d = act - pred;
    if (d === 0) return '<span class="delta">±0</span>';
    const cls = d > 0 ? 'positive' : 'negative';
    const sign = d > 0 ? '+' : '';
    return `<span class="delta ${cls}">${sign}${d}</span>`;
  }

  function renderLog() {
    const c = document.getElementById('log-content');
    if (state.entries.length === 0) {
      c.innerHTML = `
        <div class="empty">
          <div class="empty-mark">❦</div>
          <p>${t('empty-log')}</p>
        </div>`;
      return;
    }

    // Group entries by date (day-start timestamp)
    const groups = new Map();
    state.entries.forEach(e => {
      const ts = entryStartTimestamp(e);
      const d = new Date(ts);
      d.setHours(0, 0, 0, 0);
      const key = d.getTime();
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(e);
    });

    // Sort each group by scheduled hour (most recent first)
    groups.forEach(arr => {
      arr.sort((a, b) => entryStartTimestamp(b) - entryStartTimestamp(a));
    });

    // Sort group keys: most recent date first
    const sortedKeys = Array.from(groups.keys()).sort((a, b) => b - a);

    // Auto-correct invalid filter: if the selected date is no longer in the list,
    // fall back to "All"
    if (state.logFilterDate !== null && !groups.has(state.logFilterDate)) {
      state.logFilterDate = null;
    }

    // Today / Yesterday / Tomorrow labels
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayMs = today.getTime();

    function groupLabel(ms) {
      const diffDays = Math.round((ms - todayMs) / 86400000);
      const d = new Date(ms);
      if (diffDays === 0) return t('day-today');
      if (diffDays === -1) return t('day-yesterday');
      if (diffDays === 1) return t('day-tomorrow');
      const localeForDate = currentLang === 'ka' ? 'ka-GE' : 'en-US';
      if (diffDays > 1 && diffDays < 7) return d.toLocaleDateString(localeForDate, { weekday: 'long' });
      return d.toLocaleDateString(localeForDate, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function shortLabel(ms) {
      const diffDays = Math.round((ms - todayMs) / 86400000);
      const d = new Date(ms);
      if (diffDays === 0) return t('short-today');
      if (diffDays === -1) return t('short-yest');
      if (diffDays === 1) return t('short-tmrw');
      const localeForDate = currentLang === 'ka' ? 'ka-GE' : 'en-US';
      return d.toLocaleDateString(localeForDate, { month: 'short', day: 'numeric' });
    }

    // Build date strip with an "All" chip first
    const allActive = state.logFilterDate === null;
    const stripChips = [
      `<button class="date-chip ${allActive ? 'active' : ''}" data-filter="all">
         <div class="date-chip-label">${t('all')}</div>
         <div class="date-chip-count">${state.entries.length} ${state.entries.length === 1 ? t('entry') : t('entries')}</div>
       </button>`,
      ...sortedKeys.map(k => {
        const count = groups.get(k).length;
        const pending = groups.get(k).filter(e => e.actMastery === null).length;
        const active = state.logFilterDate === k;
        return `
          <button class="date-chip ${active ? 'active' : ''}" data-filter="${k}">
            <div class="date-chip-label">${shortLabel(k)}</div>
            <div class="date-chip-count">
              ${count} ${count === 1 ? t('entry') : t('entries')}
              ${pending > 0 ? `<span class="pending-dot"></span>` : ''}
            </div>
          </button>`;
      })
    ];
    const stripHtml = `<div class="date-strip" id="date-strip">${stripChips.join('')}</div>`;

    // Decide which groups to show
    const keysToShow = state.logFilterDate === null ? sortedKeys : [state.logFilterDate];

    const groupsHtml = keysToShow.map(k => {
      const entries = groups.get(k);
      const entriesHtml = entries.map(e => renderEntry(e)).join('');
      return `
        <div class="date-group" id="d-${k}">
          <div class="date-header">
            <span class="date-header-label">${groupLabel(k)}</span>
            <span class="date-header-meta">${entries.length} ${entries.length === 1 ? t('entry') : t('entries')}</span>
          </div>
          ${entriesHtml}
        </div>`;
    }).join('');

    // Sample-data welcome banner: render only when at least one entry is
    // tagged as a sample (`isSample: true`). Users can remove all samples
    // with one click via the banner's action button.
    const hasSamples = state.entries.some(e => e.isSample);
    const bannerHtml = hasSamples ? `
      <div class="sample-banner">
        <div class="sample-banner-title">${t('sample-banner-title')}</div>
        <div class="sample-banner-msg">${t('sample-banner-msg')}</div>
        <button class="sample-banner-action" data-action="remove-samples">${t('sample-banner-action')}</button>
      </div>` : '';

    c.innerHTML = bannerHtml + stripHtml + `<div class="entries-scroll">${groupsHtml}</div>`;

    // Wire the "remove samples" button if it's present
    const removeBtn = c.querySelector('[data-action="remove-samples"]');
    if (removeBtn) {
      removeBtn.addEventListener('click', removeAllSampleEntries);
    }

    // Wire chip taps -> set filter and re-render
    c.querySelectorAll('.date-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const f = chip.dataset.filter;
        state.logFilterDate = (f === 'all') ? null : parseInt(f);
        renderLog();
        // After re-render, scroll the active chip into view horizontally
        requestAnimationFrame(() => {
          const active = document.querySelector('.date-chip.active');
          if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
      });
    });
  }

  // Small pencil SVG icon for edit buttons
  const PENCIL_SVG = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3z"/><path d="M9.5 3.5l3 3"/></svg>';

  function pencilBtn(field, id, sizeCls = '') {
    return `<button class="edit-pencil ${sizeCls}" data-action="edit" data-field="${field}" data-id="${id}" aria-label="edit">${PENCIL_SVG}</button>`;
  }

  function renderEntry(e) {
    // Entry is "pending" (and thus shows the Rate Actual button) until ALL four
    // post-activity values are filled: actual mastery, actual pleasure,
    // mood before, and mood after. The button disappears only once every
    // value has been entered — through the rate flow or via pencil edits.
    const isPending =
      e.actMastery == null ||
      e.actPleasure == null ||
      e.moodBefore == null ||
      e.moodAfter == null;
    const displayTime = entryStartTimestamp(e);
    const hint = timeHint(displayTime, isPending);
    const hintHtml = hint ? `<span class="hint">${hint}</span>` : '';
    // Show only the hour as the row's primary timestamp
    const d = new Date(displayTime);
    const h = d.getHours();
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    const hourStr = `${h12} ${ampm}`;
    const entryTags = getEntryTags(e);
    const tagsHtml = state.advancedTags
      ? `<div class="entry-tags">${tagPillsHtml(entryTags, true)}${pencilBtn('tags', e.id)}</div>`
      : '';

    // Mood row: always shown so users can fill in mood retroactively via the pencil
    const moodHtml = `
      <div class="entry-mood-row">
        <div class="mood-bubble">
          <span class="mood-bubble-label">${t('label-mood-before')}</span>
          ${e.moodBefore != null
            ? `<span class="mood-bubble-value">${e.moodBefore}</span>`
            : `<span class="mood-bubble-value pending">${t('mood-pending')}</span>`}
          ${pencilBtn('mood-before', e.id)}
        </div>
        <div class="mood-bubble">
          <span class="mood-bubble-label">${t('label-mood-after')}</span>
          ${e.moodAfter != null
            ? `<span class="mood-bubble-value">${e.moodAfter}</span>`
            : `<span class="mood-bubble-value pending">${t('mood-pending')}</span>`}
          ${pencilBtn('mood-after', e.id)}
        </div>
      </div>`;

    return `
      <div class="entry${e.isSample ? ' sample-entry' : ''}">
        <div class="entry-date">
