<!DOCTYPE html>
<html lang="ka" data-theme="day">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7f6f0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23161a17'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='44' fill='%23c9a96e'%3E%E2%9D%A6%3C/text%3E%3C/svg%3E">
<link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23161a17'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='44' fill='%23c9a96e'%3E%E2%9D%A6%3C/text%3E%3C/svg%3E">
<title>სიამოვნების პროგნოზის ფურცელი</title>
<style>
  :root {
    --bg: #161a17;
    --bg-card: #1f2521;
    --bg-elevated: #262d28;
    --ink: #e8e4d8;
    --ink-dim: #9ba197;
    --ink-faint: #5c6259;
    --accent: #c9a96e;
    --accent-soft: #8a7548;
    --pleasure: #e08962;  /* warm coral / terracotta — distinct from mood */
    --mastery: #6db4a3;   /* slightly cooler teal-green */
    --mood: #a78bca;      /* soft lavender — clearly distinct from both */
    --border: #2d342f;
    --danger: #b86a5e;
  }

  html[data-theme="day"] {
    --bg: #f7f6f0;
    --bg-card: #ffffff;
    --bg-elevated: #efeee7;
    --ink: #171915;
    --ink-dim: #4d5149;
    --ink-faint: #777c72;
    --accent: #8a6226;
    --accent-soft: #b78f4f;
    --pleasure: #b95f3d;
    --mastery: #2c8275;
    --mood: #7355a7;
    --border: #d9d6ca;
    --danger: #a84d42;
  }

  html[data-theme="day"] body {
    background-image:
      radial-gradient(at 20% 0%, rgba(138, 98, 38, 0.10) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(44, 130, 117, 0.08) 0px, transparent 50%);
  }

  html[data-theme="day"] .toast,
  html[data-theme="day"] button.primary,
  html[data-theme="day"] .edit-actions .confirm-yes,
  html[data-theme="day"] .tag-add-btn {
    color: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', 'Noto Serif Georgian', Georgia, serif;
    font-optical-sizing: auto;
    overscroll-behavior: none;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* When the document is in Georgian, switch to a Georgian-tuned serif as primary */
  html[lang="ka"] body,
  html[lang="ka"] input[type="text"],
  html[lang="ka"] textarea,
  html[lang="ka"] .time-select,
  html[lang="ka"] button.primary,
  html[lang="ka"] .entry-activity,
  html[lang="ka"] .empty p,
  html[lang="ka"] .insight-text,
  html[lang="ka"] .confirm-message,
  html[lang="ka"] .attribution,
  html[lang="ka"] .date-header-label,
  html[lang="ka"] .pair-title,
  html[lang="ka"] .toast,
  html[lang="ka"] .footer-line {
    font-family: 'Noto Serif Georgian', 'Fraunces', Georgia, serif;
  }

  html[lang="ka"] h1 {
    font-family: 'Noto Serif Georgian', 'Fraunces', Georgia, serif;
  }

  /* Mono / label-style elements use Georgian sans (mono Georgian doesn't really exist) */
  html[lang="ka"] .eyebrow,
  html[lang="ka"] label,
  html[lang="ka"] .tab,
  html[lang="ka"] .scale-sub-label,
  html[lang="ka"] .metric-label,
  html[lang="ka"] .entry-date,
  html[lang="ka"] .stat-label,
  html[lang="ka"] .insight-label,
  html[lang="ka"] .date-chip,
  html[lang="ka"] .date-header-meta,
  html[lang="ka"] .time-preset,
  html[lang="ka"] button.ghost,
  html[lang="ka"] .entry-actions button,
  html[lang="ka"] .confirm-actions button,
  html[lang="ka"] .footer-credit {
    font-family: 'Noto Sans Georgian', 'JetBrains Mono', monospace;
  }


  html[lang="ru"] body,
  html[lang="ru"] input[type="text"],
  html[lang="ru"] textarea,
  html[lang="ru"] .time-select,
  html[lang="ru"] button.primary,
  html[lang="ru"] .entry-activity,
  html[lang="ru"] .empty p,
  html[lang="ru"] .insight-text,
  html[lang="ru"] .confirm-message,
  html[lang="ru"] .attribution,
  html[lang="ru"] .date-header-label,
  html[lang="ru"] .pair-title,
  html[lang="ru"] .toast,
  html[lang="ru"] .footer-line {
    font-family: 'Noto Serif', 'Fraunces', Georgia, serif;
  }

  html[lang="ru"] h1 {
    font-family: 'Noto Serif', 'Fraunces', Georgia, serif;
  }

  html[lang="ru"] .eyebrow,
  html[lang="ru"] label,
  html[lang="ru"] .tab,
  html[lang="ru"] .scale-sub-label,
  html[lang="ru"] .metric-label,
  html[lang="ru"] .entry-date,
  html[lang="ru"] .stat-label,
  html[lang="ru"] .insight-label,
  html[lang="ru"] .date-chip,
  html[lang="ru"] .date-header-meta,
  html[lang="ru"] .time-preset,
  html[lang="ru"] button.ghost,
  html[lang="ru"] .entry-actions button,
  html[lang="ru"] .confirm-actions button,
  html[lang="ru"] .footer-credit,
  html[lang="ru"] .dashboard-sort-label,
  html[lang="ru"] .dashboard-sort-select,
  html[lang="ru"] .chart-filter-label,
  html[lang="ru"] .chart-filter-select {
    font-family: 'Noto Sans', 'JetBrains Mono', monospace;
  }

  body {
    padding: 0 0 80px 0;
    background-image:
      radial-gradient(at 20% 0%, rgba(201, 169, 110, 0.06) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(125, 169, 154, 0.04) 0px, transparent 50%);
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* The rate view lives outside .container so we mirror its sizing here */
  #view-rate {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  header {
    margin-bottom: 28px;
    padding-top: 8px;
    position: relative;
  }

  .lang-switcher {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    gap: 2px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
  }

  .lang-btn {
    background: transparent;
    border: none;
    color: var(--ink-faint);
    padding: 5px 9px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 36px;
  }

  .lang-btn.active {
    background: var(--bg-elevated);
    color: var(--accent);
  }

  .lang-btn:not(.active):active {
    transform: scale(0.95);
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 30px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    font-style: italic;
  }

  h1 .accent { font-style: normal; font-weight: 500; }

  .subtitle {
    font-size: 14px;
    color: var(--ink-dim);
    margin-top: 8px;
    line-height: 1.5;
  }

  .attribution {
    font-size: 11px;
    line-height: 1.55;
    color: var(--ink-faint);
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-style: italic;
  }

  .attribution em {
    color: var(--ink-dim);
    font-style: italic;
  }

  .footer-credit {
    text-align: center;
    padding: 32px 20px 12px;
    font-size: 10px;
    line-height: 1.6;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
    font-family: 'JetBrains Mono', monospace;
  }

  .footer-credit a {
    color: var(--accent-soft);
    text-decoration: none;
  }

  .footer-credit .footer-line {
    font-family: 'Fraunces', serif;
    font-style: italic;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0;
  }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--bg-elevated);
    color: var(--accent);
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* Form */
  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-soft);
  }

  .time-select {
    flex: 1;
    min-width: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%239ba197' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
    cursor: pointer;
  }

  .time-select:focus {
    outline: none;
    border-color: var(--accent-soft);
  }

  .time-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .time-presets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .time-preset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 9px 4px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .time-preset:active { transform: scale(0.96); }

  .time-preset.active {
    background: var(--bg-elevated);
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  textarea { resize: none; min-height: 70px; line-height: 1.5; }

  .scale-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .scale-sub-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }

  .scale-row {
    display: grid;
    gap: 5px;
    margin-top: 2px;
  }

  .scale-row.tens { grid-template-columns: repeat(6, 1fr); }
  .scale-row.ones { grid-template-columns: repeat(10, 1fr); }

  .scale-btn {
    aspect-ratio: 1.1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .scale-row.ones .scale-btn { font-size: 11px; aspect-ratio: 1; }

  .total-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px;
    background: var(--bg-elevated);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .total-num {
    font-size: 22px;
    font-weight: 500;
  }

  .total-num.pleasure { color: var(--pleasure); }
  .total-num.mastery { color: var(--mastery); }
  .total-num.mood { color: var(--mood); }

  .total-num.empty { color: var(--ink-faint); }

  .total-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .scale-btn:active { transform: scale(0.94); }

  .scale-btn.selected.pleasure {
    background: var(--pleasure);
    color: #1a1f1c;
    border-color: var(--pleasure);
    font-weight: 600;
  }

  .scale-btn.selected.mastery {
    background: var(--mastery);
    color: #1a1f1c;
    border-color: var(--mastery);
    font-weight: 600;
  }

  .scale-btn.selected.mood {
    background: var(--mood);
    color: #1a1f1c;
    border-color: var(--mood);
    font-weight: 600;
  }

  .scale-label {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .pair {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
  }

  .pair-title {
    font-style: italic;
    font-size: 17px;
    margin-bottom: 14px;
    color: var(--ink);
  }

  .pair-title .quill {
    color: var(--accent);
    margin-right: 6px;
  }

  button.primary {
    width: 100%;
    background: var(--accent);
    color: #161a17;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s;
  }

  button.primary:active { transform: scale(0.98); }

  button.primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button.ghost {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
  }

  /* Log entries */
  .entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 12px;
    position: relative;
  }

  .entry-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .entry-date .hint {
    color: var(--accent);
    font-style: italic;
  }

  .entry-activity {
    font-size: 18px;
    line-height: 1.3;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .entry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }

  .metric {
    background: var(--bg-elevated);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .metric-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .metric-values {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .pred { color: var(--ink-dim); font-size: 13px; }
  .arrow { color: var(--ink-faint); font-size: 11px; }
  .actual-p { color: var(--pleasure); font-size: 18px; font-weight: 500; }
  .actual-m { color: var(--mastery); font-size: 18px; font-weight: 500; }
  .pending { color: var(--ink-faint); font-style: italic; font-size: 13px; }

  .delta {
    font-size: 11px;
    margin-left: 4px;
    color: var(--ink-faint);
  }
  .delta.positive { color: #8db692; }
  .delta.negative { color: var(--danger); }

  .entry-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .entry-actions button {
    flex: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 9px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .entry-actions button.complete { color: var(--accent); border-color: var(--accent-soft); }
  .entry-actions button.delete { color: var(--danger); }

  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-faint);
  }

  .empty-mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 56px;
    color: var(--accent-soft);
    opacity: 0.4;
    margin-bottom: 16px;
    line-height: 1;
  }

  .empty p {
    font-style: italic;
    font-size: 15px;
    line-height: 1.5;
    max-width: 280px;
    margin: 0 auto;
  }

  /* ===== Sample data welcome banner ===== */
  .sample-banner {
    background: linear-gradient(135deg, rgba(201, 169, 110, 0.12), rgba(125, 169, 154, 0.08));
    border: 1px solid var(--accent-soft);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 18px;
    position: relative;
  }

  .sample-banner-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .sample-banner-msg {
    font-family: 'Fraunces', serif;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink-dim);
    margin-bottom: 12px;
  }

  .sample-banner-action {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 9px 16px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sample-banner-action:hover {
    background: var(--danger);
    color: var(--ink);
  }
  .sample-banner-action:active { transform: scale(0.97); }

  /* Subtle "sample" tag on individual sample entries */
  .entry.sample-entry {
    position: relative;
  }
  .entry.sample-entry::before {
    content: '✦';
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 11px;
    color: var(--accent-soft);
    opacity: 0.6;
    pointer-events: none;
  }

  /* Insights */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-num.pleasure { color: var(--pleasure); }
  .stat-num.mastery { color: var(--mastery); }
  .stat-num.accent { color: var(--accent); }


  .streak-fire {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 6px;
    font-size: 20px;
    transition: opacity 0.2s, filter 0.2s;
  }

  .streak-fire.inactive {
    opacity: 0.28;
    filter: grayscale(1);
  }

  .streak-fire.active {
    opacity: 1;
    filter: drop-shadow(0 0 8px rgba(255,140,60,0.35));
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 6px;
  }

  .insight {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 16px 18px;

  .date-strip {

    scroll-snap-type: x mandatory;

    height: 5px;

  .date-header {

    font-style: italic;
    font-size: 18px;
    color: var(--ink);

  .date-header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--ink-faint);
    font-style: italic;
  }
    text-align: center;
    padding: 40px;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* Toast */
  /* Toast: wrapper does the centering via flexbox so it works even when
     CSS transforms are misbehaving in embedded chat frames. */
  .toast-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
    padding: 0 20px 32px 20px;
    z-index: 9999;
  }

  .toast {
    background: var(--accent);
    color: #161a17;
    padding: 14px 26px;
    border-radius: 999px;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: 0.01em;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateY(20px);
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(201, 169, 110, 0.25);
    max-width: 100%;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  /* Confirm modal */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .confirm-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .confirm-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px 20px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .confirm-overlay.show .confirm-box {
    transform: scale(1);
  }

  .confirm-icon {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 12px;
    line-height: 1;

  .confirm-message {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 22px;
    line-height: 1.4;

  .confirm-actions {
    display: flex;
    gap: 10px;
  }

  .confirm-actions button {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .confirm-no {
    background: transparent;
    color: var(--ink-dim);
  }

  .confirm-yes {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
    font-weight: 500;
  }

  .confirm-no:active, .confirm-yes:active { transform: scale(0.97); }

  /* Three-button import choice modal */
  .confirm-actions.import-three {
    flex-wrap: wrap;
    gap: 8px;
  }
  .confirm-actions.import-three button {
    flex: 1 1 0;
    min-width: 80px;
    padding: 12px 8px;

  .import-merge {

  /* ===== Mood slider ===== */
  .mood-field {
    background: var(--bg-card);

  .save-template-btn {

  /* ===== Chart ===== */
  .chart-container {
    background: var(--bg-card);

    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%239ba197' d='M6 8L0 0h12z'/></svg>");

  /* Chart hover interaction */
  .chart-svg .hover-zone,
  .chart-svg .hover-surface {
    fill: transparent;
    pointer-events: all;
    cursor: crosshair;
  }

  .chart-svg .crosshair {
    stroke: var(--accent);
    stroke-width: 1;
    stroke-dasharray: 3 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
  }

  .chart-svg.has-hover .crosshair { opacity: 0.55; }

  .chart-svg .hover-dot {
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .chart-svg.has-hover .hover-dot { opacity: 1; }

  .chart-svg .hover-tag {
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .chart-svg.has-hover .hover-tag { opacity: 1; }

    stroke-width: 1;
  }
  .chart-svg .hover-tag text {

    font-size: 9px;
    font-weight: 500;

    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-faint);
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 6px;
    flex-shrink: 0;
    transition: all 0.15s;
    vertical-align: middle;
  }

  .edit-pencil:active { transform: scale(0.9); }
  .edit-pencil svg { width: 11px; height: 11px; display: block; }

  /* Header-level pencil (next to activity name / time) */
  .edit-pencil.lg {
    width: 26px;
    height: 26px;
  }
  .edit-pencil.lg svg { width: 13px; height: 13px; }

  /* Activity row with pencil */
  .entry-activity-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 14px;
  }

  .entry-activity-row .entry-activity {
    margin-bottom: 0;
    flex: 1;
    min-width: 0;
  }

  /* Pencil placement for metric rows */
  .metric-values {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  /* Pencil placement for mood bubbles */
  .mood-bubble .edit-pencil {
    margin-left: 4px;
    width: 20px;
    height: 20px;
  }
  .mood-bubble .edit-pencil svg { width: 10px; height: 10px; }

  /* Date row with pencil */
  .entry-date {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }
  .entry-date .edit-pencil {
    margin-left: auto;
  }

  /* ===== Edit modal ===== */
  .edit-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 250;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .edit-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .edit-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 22px 18px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .edit-overlay.show .edit-box { transform: scale(1); }

  .edit-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--ink);
    margin-bottom: 18px;
    text-align: center;
  }

  .edit-body { margin-bottom: 18px; }

  .edit-actions {
    display: flex;
    gap: 10px;
  }

  .edit-actions button {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .edit-actions .confirm-yes {
    background: var(--accent);
    border-color: var(--accent);
    color: #161a17;
    font-weight: 500;
  }

  /* Reuse pair/scale-group styles inside the edit modal */
  .edit-body .pair {
    margin-bottom: 0;
    background: var(--bg-elevated);
  }

  .edit-body input[type="text"],
  .edit-body select.time-select {
    width: 100%;
  }

  .edit-body .time-row {
    display: flex;
    gap: 8px;
  }

  .edit-body .time-row select {
    flex: 1;
  }

  /* ===== About / How-to-use view ===== */
  #view-about .about-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 24px;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  .about-section {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px dashed var(--border);
  }

  .about-section:last-of-type {
    border-bottom: none;
  }

  .about-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .about-text {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .about-text:last-child { margin-bottom: 0; }

  .about-text em {
    font-style: italic;
    color: var(--accent);
  }

  .about-text strong {
    font-weight: 600;
    color: var(--ink);
  }

  .about-steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .about-step {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    border-left: 3px solid var(--accent);
  }

  .about-step-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .about-step p {
    font-family: 'Fraunces', serif;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
    margin: 0;
  }

  .about-tips {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .about-tips li {
    font-family: 'Fraunces', serif;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
    padding: 10px 0 10px 22px;
    position: relative;
    border-bottom: 1px dashed var(--border);
  }

  .about-tips li:last-child {
    border-bottom: none;
  }

  .about-tips li::before {
    content: '❦';
    position: absolute;
    left: 0;
    top: 10px;
    color: var(--accent);
    font-size: 13px;
  }

  .about-privacy {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .about-privacy .about-text {
    font-size: 14px;
    color: var(--ink-dim);
  }

  .about-attribution {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-faint);
    text-align: center;
    padding: 0 16px;
    margin-top: 12px;
  }

  .about-attribution em {
    color: var(--ink-dim);
    font-style: italic;
  }

  .footer-important {
    margin-top: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(201, 169, 110, 0.06);
    color: var(--ink-dim);
    font-size: 10px;
    line-height: 1.55;
    letter-spacing: 0.03em;
  }

  .footer-about-link {
    display: inline;
    background: transparent;
    border: 0;
    padding: 0;
    margin: 0 0 0 4px;
    color: var(--accent);
    font: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
  }

  .footer-about-link:focus {
    outline: 1px solid var(--accent-soft);
    outline-offset: 3px;
    border-radius: 3px;
  }

  /* ====================================================================
     DESKTOP RESPONSIVE STYLES
     Mobile-first design above is preserved. These queries adapt for
     larger screens so the app doesn't look like a stretched phone app.
     ==================================================================== */

  /* --- Tablet / small desktop (720px+) --- */
  @media (min-width: 720px) {
    .container,
    #view-rate {
      max-width: 720px;
      padding: 36px 32px;
    }

    body {
      padding-bottom: 60px;
    }

    /* Header proportions for wider viewports */
    header {
      margin-bottom: 36px;
      padding-top: 16px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.05;
    }

    .subtitle {
      font-size: 16px;
      max-width: 580px;
    }

    .attribution {
      font-size: 12px;
      max-width: 600px;
    }

    .eyebrow {
      font-size: 11px;
    }

    /* Tabs: a touch larger and roomier */
    .tabs {
      padding: 6px;
      margin-bottom: 32px;
    }

    .tab {
      padding: 12px 16px;
      font-size: 12px;
    }

    /* Form fields with more breathing room */
    .field {
      margin-bottom: 24px;
    }

    input[type="text"], textarea, .time-select {
      padding: 16px 18px;
      font-size: 17px;
    }

    label {
      font-size: 11px;
    }

    /* Scale pairs: more padding, slightly larger buttons */
    .pair {
      padding: 22px 20px;
      margin-bottom: 20px;
    }

    .pair-title {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .scale-row.tens { grid-template-columns: repeat(11, 1fr); gap: 6px; }
    .scale-row.ones { grid-template-columns: repeat(10, 1fr); gap: 6px; }

    .scale-btn {
      font-size: 14px;
      border-radius: 8px;
    }

    .scale-row.ones .scale-btn { font-size: 13px; }

    .scale-sub-label {
      font-size: 10px;
    }

    .total-display {
      padding: 10px;
      margin-top: 12px;
    }

    .total-num {
      font-size: 24px;
    }

    /* Primary button */
    button.primary {
      padding: 18px;
      font-size: 17px;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
      display: block;
    }

    /* Templates */
    .templates-section { padding: 18px 20px; }
    .template-chip { padding: 9px 14px 9px 16px; font-size: 14px; }
    .template-chip .remove { font-size: 16px; padding-left: 10px; }

    /* Log entries: more horizontal breathing room */
    .entry {
      padding: 22px 22px;
      margin-bottom: 14px;
    }

    .entry-activity {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .entry-grid {
      gap: 14px;
    }

    .metric {
      padding: 12px 14px;
    }

    .actual-p, .actual-m {
      font-size: 20px;
    }

    .entry-mood-row {
      gap: 12px;
    }

    .mood-bubble {
      padding: 9px 12px;
    }

    .mood-bubble-value {
      font-size: 18px;
    }

    /* Entry actions: don't stretch to full width on desktop */
    .entry-actions button {
      flex: 0 1 auto;
      min-width: 120px;
      padding: 10px 16px;
    }

    /* Insights stat grid */
    .stat-grid {
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-card {
      padding: 18px;
    }

    .stat-num {
      font-size: 32px;
    }

    /* Chart: more vertical room on wider screens */
    .chart-container {
      padding: 22px 20px 18px;
    }

    .chart-svg {
      max-height: 280px;
    }

    /* Date strip: chips a touch larger */
    .date-chip {
      padding: 12px 18px;
      min-width: 92px;
    }

    .date-chip-label {
      font-size: 13px;
    }

    /* Toast */
    .toast {
      font-size: 16px;
      padding: 16px 32px;
    }
  }

  /* --- Wide desktop (960px+): two-column layouts --- */
  @media (min-width: 960px) {
    .container,
    #view-rate {
      max-width: 980px;
      padding: 48px 40px;
    }

    /* New tab: form on the left, prediction scales on the right.
       Gated on .active so the view still hides when another tab is selected. */
    #view-new.active {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    /* Templates span both columns at the top */
    #view-new .templates-section {
      grid-column: 1 / -1;
    }

    /* When tags are off, keep scheduled time centered on its own row.
       When tags are on, place tags + scheduled time side by side. */
    #view-new #activity-tags-field {
      grid-column: 1 / -1;
    }

    #view-new #scheduled-time-field {
      grid-column: 1 / -1;
      justify-self: center;
      width: min(100%, 460px);
    }

    html[data-advanced-tags="on"] #view-new #activity-tags-field {
      grid-column: 1 / 2;
    }

    html[data-advanced-tags="on"] #view-new #scheduled-time-field {
      grid-column: 2 / 3;
      justify-self: center;
      width: min(100%, 460px);
    }

    /* Save button + footer text span both columns at the bottom */
    #view-new > .primary,
    #view-new > .ornament,
    #view-new > .subtitle {
      grid-column: 1 / -1;
    }

    /* The save button shouldn't be too wide on desktop */
    #view-new > .primary {
      max-width: 320px;
    }

    /* Rate view: activity + mood scales on left, mastery/pleasure on right.
       Rate view uses inline display:block when shown, so target both states. */
    #view-rate.active,
    #view-rate[style*="display: block"] {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    /* The activity display and the two action buttons span both columns */
    #view-rate > .field:first-child,
    #view-rate > .primary,
    #view-rate > .ghost {
      grid-column: 1 / -1;
    }

    #view-rate > .primary,
    #view-rate > .ghost {
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    /* The log and insights tabs stay single-column but get a wider container */

    /* About view: 2x2 grid for the four steps on wide screens */
    #view-about .about-steps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    #view-about .about-title {
      font-size: 32px;
      margin-bottom: 32px;
    }

    /* Date strip becomes more spacious */
    .date-strip {
      gap: 10px;
    }

    /* Header */
    h1 {
      font-size: 48px;
    }
  }

  /* --- Extra-wide desktop (1200px+) --- */
  @media (min-width: 1200px) {
    .container,
    #view-rate {
      max-width: 1100px;
    }

    /* On very wide screens, allow chart to be even taller */
    .chart-svg {
      max-height: 340px;
    }
  }

  /* Cursor feedback: only on devices with real hover (skip mobile) */
  @media (hover: hover) and (pointer: fine) {
    .scale-btn:hover {
      border-color: var(--accent-soft);
    }

    .tab:not(.active):hover {
      color: var(--ink);
    }

    .entry-actions button:hover {
      border-color: var(--accent-soft);
    }

    button.primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .date-chip:hover {
      border-color: var(--accent-soft);
    }

    .time-preset:hover {
      border-color: var(--accent-soft);
      color: var(--accent);
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="ka">ქარ</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1><span data-i18n="title-pre"></span> <span class="accent" data-i18n="title-accent"></span> <span data-i18n="title-post"></span></h1>
    <p class="subtitle" data-i18n="subtitle"></p>
    <p class="attribution" data-i18n-html="attribution"></p>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="new" data-i18n="tab-new"></button>
    <button class="tab" data-view="log" data-i18n="tab-log"></button>
    <button class="tab" data-view="insights" data-i18n="tab-insights"></button>
    <button class="tab" data-view="settings" data-i18n="tab-settings"></button>
    <button class="tab" data-view="about" data-i18n="tab-about"></button>
  </div>

  <!-- NEW ENTRY -->
  <div class="view active" id="view-new">
    <!-- Templates / Quick Add -->
    <div class="templates-section">
      <div class="templates-header">
        <span class="templates-label" data-i18n="label-templates"></span>
      </div>
      <div id="templates-list-container"></div>
    </div>

    <div class="field">
      <label data-i18n="label-activity"></label>
      <input type="text" id="activity" data-i18n-placeholder="ph-activity" autocomplete="off">
      <button type="button" class="save-template-btn" id="save-template-btn" disabled data-i18n="btn-save-template"></button>
    </div>

    <div class="field">
      <label data-i18n="label-company"></label>
      <input type="text" id="company" data-i18n-placeholder="ph-company" autocomplete="off">
    </div>

    <div class="tag-field scale-hidden" id="activity-tags-field" hidden aria-hidden="true">
      <label data-i18n="label-activity-tags"></label>
      <p class="tag-help" data-i18n="tag-help"></p>
      <div class="tag-add-row new-tag-add-row">
        <input type="text" id="new-entry-tag-input" data-i18n-placeholder="settings-tags-add-placeholder" autocomplete="off">
        <button type="button" class="tag-add-btn" id="add-entry-tag-btn" data-i18n="settings-tags-add-btn"></button>
      </div>
      <div class="tag-choice-grid" id="activity-tags-list"></div>
    </div>

    <div class="field" id="scheduled-time-field">
      <label data-i18n="label-when"></label>
      <div class="time-row">
        <select id="scheduled-day" class="time-select"></select>
        <select id="scheduled-hour" class="time-select"></select>
      </div>
      <div class="time-presets">
        <button type="button" class="time-preset" data-hours="0" data-i18n="preset-now"></button>
        <button type="button" class="time-preset" data-hours="1" data-i18n="preset-1hr"></button>
        <button type="button" class="time-preset" data-hours="3" data-i18n="preset-3hr"></button>
        <button type="button" class="time-preset" data-hours="24" data-i18n="preset-tmrw"></button>
      </div>
    </div>

    <div class="pair">
      <div class="pair-title"><span class="quill">❦</span><span data-i18n="pair-pred-mastery"></span></div>
      <div class="scale-group">
        <div>
          <div class="scale-sub-label" data-i18n="sub-tens"></div>
          <div class="scale-row tens" data-scale="pred-mastery" data-part="tens"></div>
        </div>
        <div>
          <div class="scale-sub-label" data-i18n="sub-ones"></div>
          <div class="scale-row ones" data-scale="pred-mastery" data-part="ones"></div>
        </div>
      </div>
      <div class="total-display"><span class="total-label" data-i18n="total-label"></span><span class="total-num empty" data-total="pred-mastery">—</span></div>
    </div>

    <div class="pair">
      <div class="pair-title"><span class="quill">❦</span><span data-i18n="pair-pred-pleasure"></span></div>
      <div class="scale-group">
        <div>
          <div class="scale-sub-label" data-i18n="sub-tens"></div>
          <div class="scale-row tens" data-scale="pred-pleasure" data-part="tens"></div>
        </div>
        <div>
          <div class="scale-sub-label" data-i18n="sub-ones"></div>
          <div class="scale-row ones" data-scale="pred-pleasure" data-part="ones"></div>
        </div>
      </div>
      <div class="total-display"><span class="total-label" data-i18n="total-label"></span><span class="total-num empty" data-total="pred-pleasure">—</span></div>
    </div>

    <button class="primary" id="save-btn" disabled data-i18n="btn-save"></button>
    <div class="ornament">· · ·</div>
    <p class="subtitle" style="text-align: center; font-style: italic;" data-i18n="footer-new"></p>
  </div>

  <!-- LOG -->
  <div class="view" id="view-log">
    <div id="log-content"></div>
  </div>

  <!-- INSIGHTS -->
  <div class="view" id="view-insights">
    <div id="insights-content"></div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="view-settings">
    <h2 class="about-title" data-i18n="settings-title"></h2>

    <section class="settings-card">
      <div class="settings-title" data-i18n="settings-scale-title"></div>
      <p class="settings-description" data-i18n="settings-scale-description"></p>

      <div class="settings-options" id="scale-mode-settings">
        <label class="settings-option">
          <input type="radio" name="scale-mode" value="precise">
          <span>
            <span class="settings-option-title" data-i18n="settings-scale-precise-title"></span>
            <span class="settings-option-desc" data-i18n="settings-scale-precise-desc"></span>
          </span>
        </label>
        <label class="settings-option">
          <input type="radio" name="scale-mode" value="ten">
          <span>
            <span class="settings-option-title" data-i18n="settings-scale-ten-title"></span>
            <span class="settings-option-desc" data-i18n="settings-scale-ten-desc"></span>
          </span>
        </label>
        <label class="settings-option">
          <input type="radio" name="scale-mode" value="half">
          <span>
            <span class="settings-option-title" data-i18n="settings-scale-half-title"></span>
            <span class="settings-option-desc" data-i18n="settings-scale-half-desc"></span>
          </span>
        </label>
        <label class="settings-option">
          <input type="radio" name="scale-mode" value="words">
          <span>
            <span class="settings-option-title" data-i18n="settings-scale-words-title"></span>
            <span class="settings-option-desc" data-i18n="settings-scale-words-desc"></span>
          </span>
        </label>
      </div>

      <p class="settings-note" id="scale-mode-current"></p>
    </section>

    <section class="settings-card">
      <div class="settings-title" data-i18n="settings-theme-title"></div>
      <p class="settings-description" data-i18n="settings-theme-description"></p>

      <div class="settings-options" id="theme-mode-settings">
        <label class="settings-option">
          <input type="radio" name="theme-mode" value="night">
          <span>
            <span class="settings-option-title" data-i18n="settings-theme-night-title"></span>
            <span class="settings-option-desc" data-i18n="settings-theme-night-desc"></span>
          </span>
        </label>
        <label class="settings-option">
          <input type="radio" name="theme-mode" value="day">
          <span>
            <span class="settings-option-title" data-i18n="settings-theme-day-title"></span>

      'about-intro-p1': 'ეს არის ხელსაწყო, რომელიც აღწერილია დევიდ ბერნზის წიგნში <em>The Feeling Good Handbook</em>. იგი ეფუძნება ცნობილ ფსიქოლოგიურ აღმოჩენას: დეპრესიულ ან ჩაკეტილ მდგომარეობაში მყოფი ადამიანების გონება სისტემატურად ცდუნებაში აგდებს მათ, ეუბნება რა, რომ მომავალი აქტივობა არ მოიტანს არც სიამოვნებას, არც წარმატების შეგრძნებას. ეს არის ფსიქოლოგიური ფილტრი, არა რეალობა.',
      'about-intro-p2': 'ფურცელი გვაძლევს მტკიცებულებას. ჯერ თქვი რას მოგცემს აქტივობა (პროგნოზი), შემდეგ გააკეთე და შეაფასე რეალური გამოცდილება. დროთა განმავლობაში დაინახავ, რომ რეალობა შენი მოლოდინისგან განსხვავდება — ხშირად მისგან უკეთესია.',

      'about-method-title': 'რატომ მუშაობს',
      'about-method-p1': 'ეს არის <strong>ქცევითი აქტივაცია (Behavioral Activation)</strong> — CBT-ის ერთ-ერთი ყველაზე ემპირიულად დადასტურებული მეთოდი დეპრესიის სამკურნალოდ. იდეა მარტივია: ნუ დაელოდები ხასიათის გაუმჯობესებას, რომ რამე გააკეთო. გააკეთე, შემდეგ ხასიათი გაუმჯობესდება.',
      'about-method-p2': 'პროგნოზის რეალურთან შედარება გვაჩვენებს, რომ ჩვენი გონების უარყოფითი წინასწარმეტყველებები არ არის სიმართლე — ეს არის შემეცნებითი დამახინჯება (cognitive distortion). უმეტესობა ჩვენგანი დაბლა აფასებს იმას, რასაც სინამდვილეში ვისიამოვნებთ.',

      'about-howto-title': 'როგორ ვისარგებლო',
      'about-step1-title': '1. ახალი',
      'about-step1-p': 'ჩაწერე აქტივობა, რომელსაც აპირებ. დაგეგმე დრო. შემდეგ წინასწარ შეაფასე ოსტატობა (რამდენად კარგად გააკეთებ ან რამდენი მნიშვნელობის შეგრძნებას მოგცემს) და სიამოვნება (რამდენი სიამოვნება გექნება). გამოიყენე შენ მიერ არჩეული შეფასების ფორმატი; მონაცემები შიგნით 0–100 ფორმატში ინახება.',
      'about-step2-title': '2. გააკეთე',
      'about-step2-p': 'წადი და გააკეთე აქტივობა. არ ცადო ხასიათის ცვლილების მიღწევა წინასწარ — უბრალოდ გააკეთე.',
      'about-step3-title': '3. ისტორია (შეფასება)',
      'about-step3-p': 'დაბრუნდი და დააწექი „რეალურის შეფასება". შეაფასე რა მოხდა სინამდვილეში: რეალური ოსტატობა, რეალური სიამოვნება, ასევე განწყობა მანამდე და შემდეგ. ფანქარის ღილაკით შეგიძლია ნებისმიერი მნიშვნელობის შესწორება.',
      'about-step4-title': '4. ანალიზი',
      'about-step4-p': 'დაინახე კანონზომიერებები: სად ცდუნდება შენი გონება, რომელი აქტივობები აუმჯობესებენ ხასიათს, რა იყო შენი მცდარი მოლოდინი. ეს მონაცემები არის შენი მთავარი ხელსაწყო.',

      'about-features-title': 'ახალი ფუნქციების სრული ახსნა',
      'about-feature1': '<strong>სწრაფი შაბლონები:</strong> თუ ერთი და იგივე აქტივობას ხშირად გეგმავ — მაგალითად სეირნობა, ვარჯიში, სწავლა ან მეგობართან საუბარი — შეინახე შაბლონად. შემდეგ ახალი ჩანაწერის გაკეთებისას შეგიძლია ერთი შეხებით ჩასვა და არ აკრიფო თავიდან.',
      'about-feature2': '<strong>განწყობა მანამდე/შემდეგ:</strong> რეალური შეფასების დროს შეგიძლია ჩაწერო განწყობა აქტივობამდე და აქტივობის შემდეგ. ეს აჩვენებს არა მხოლოდ სიამოვნებასა და ოსტატობას, არამედ იმასაც, მართლა აუმჯობესებს თუ არა აქტივობა შენს ზოგად მდგომარეობას.',
      'about-feature3': '<strong>გრაფიკის ფილტრი:</strong> Insights-ში გრაფიკზე არის არჩევანი: „ყველა“ ნაგულისხმევად აჩვენებს ყველაფერს ერთად, ხოლო „მხოლოდ განწყობა“, „მხოლოდ სიამოვნება“ და „მხოლოდ ოსტატობა“ ტოვებს მხოლოდ არჩეულ კატეგორიას, რომ გრაფიკი უფრო სუფთა და გასაგები იყოს.',
      'about-feature4': '<strong>გრაფიკის წარწერები s/f ფორმატით:</strong> გრაფიკზე კურსორის გადატარებისას ან შეხებისას მნიშვნელობები ჩანს წერტილებთან ახლოს. s50 ნიშნავს საწყის/პროგნოზირებულ მნიშვნელობას 50-ს, ხოლო f49 ნიშნავს საბოლოო/რეალურ მნიშვნელობას 49-ს. იგივე წესია განწყობისთვის, სიამოვნებისთვის და ოსტატობისთვის.',
      'about-feature5': '<strong>არაგადაფარული ყუთები გრაფიკზე:</strong> თუ ერთ დღეში ბევრი წერტილია ახლოს, წარწერების ყუთები ავტომატურად გადანაცვლდება ისე, რომ ერთმანეთს არ გადაეფაროს და ყველა რიცხვი წაკითხვადი დარჩეს.',
      'about-feature6': '<strong>რა მუშაობს ყველაზე კარგად:</strong> ეს დაფა აჩვენებს, რომელი აქტივობები გაძლევს ყველაზე ძლიერ შედეგს განწყობაში, ოსტატობასა და სიამოვნებაში. თითოეულში ჩანს როგორც საბოლოო ქულა, ისე სხვაობა საწყის/პროგნოზირებულ და საბოლოო/რეალურ ქულას შორის.',
      'about-feature7': '<strong>დალაგება სხვაობით ან საბოლოო ქულით:</strong> „სხვაობით დალაგება“ გიჩვენებს, რომელმა აქტივობამ მოგცა ყველაზე დიდი გაუმჯობესება. „საბოლოო ქულით დალაგება“ გიჩვენებს, რომელი აქტივობები სრულდება ყველაზე მაღალი შედეგით, თუნდაც გაუმჯობესება დიდი არ იყოს.',
      'about-feature8': '<strong>შეუზღუდავი აქტივობების სია:</strong> საუკეთესო აქტივობების დაფა აღარ არის შეზღუდული მხოლოდ ტოპ 5-ით. თუ მონაცემი გაქვს, შეგიძლია ნახო ყველა აქტივობა და შეადარო უფრო ფართო სურათი.',
      'about-feature9': '<strong>ღრმა ანალიზი ერთი აქტივობისთვის:</strong> აირჩიე კონკრეტული აქტივობა და ნახე მისი განწყობა, ოსტატობა და სიამოვნება ერთად: რამდენი იყო საბოლოო ქულა, რამდენით შეიცვალა და რამდენ ჩანაწერს ეფუძნება დასკვნა.',
      'about-feature10': '<strong>„ყველას ჩვენება“ ღრმა ანალიზში:</strong> არჩევანში პირველი ვარიანტია „ყველას ჩვენება“. ეს არ აჩვენებს რეიტინგს, არამედ ალფაბეტურად ჩამოთვლის ყველა აქტივობას, რათა თითოეული აქტივობის განწყობა, ოსტატობა და სიამოვნება ერთ ხაზზე იყოს ერთად.',
      'about-feature11': '<strong>დაწყების თარიღი მთავარია:</strong> გრაფიკი, სტრიკები და ანალიზი აქტივობას აკავშირებს დაგეგმილ/დაწყების დღესთან. მაგალითად, თუ აქტივობა დაიწყო გუშინ 23:00-ზე და დასრულდა 00:20-ზე, იგი მაინც გუშინდელ დღედ ჩაითვლება ანალიზში.',
      'about-feature12': '<strong>ენა, სარეზერვო ასლი და პასუხისმგებლობა:</strong> შეგიძლია გადართო ქართული, ინგლისური და რუსული ენა. მონაცემები რჩება შენს მოწყობილობაზე, ამიტომ მნიშვნელოვანი ჩანაწერები პერიოდულად გაიტანე Export-ით. აპი შეიძლება წაიშალოს ვებიდან ან გახდეს მიუწვდომელი, და ამ შემთხვევაში ავტორი მაინც არ არის პასუხისმგებელი გამოყენებაზე, შედეგებზე, დაკარგულ წვდომაზე ან დაკარგულ მონაცემებზე.',
      'about-feature13': '<strong>შეფასების შეყვანის პარამეტრები:</strong> პარამეტრების ჩანართში შეგიძლია აირჩიო ზუსტი 0–100, სწრაფი 0–10, ნახევარბიჯიანი 0.0–10.0 ან სიტყვიერი აღწერების რეჟიმი. ყველა ალტერნატიული რეჟიმი ისევ აპის 0–100 მონაცემთა ფორმატში გადაითარგმნება.',
      'about-feature14': '<strong>დამატებითი აქტივობის თეგები:</strong> პარამეტრებში შეგიძლია ჩართო თეგები, დაამატო საკუთარი თეგები და წაშალო არასაჭიროები. ჩართვის შემდეგ ჩანაწერებს შეიძლება ჰქონდეს კატეგორიები, როგორიცაა სოციალური, ვარჯიში, სწავლა, სამუშაო, დასვენება და სხვა. ანალიზის ფილტრი შემდეგ მუშაობს როგორც აქტივობებით, ისე თეგებით.',

      'about-tips-title': 'რჩევები',
      'about-tip1': 'იყავი მართალი. ნუ შეცვლი წინასწარ პროგნოზს მას შემდეგ, რაც გააკეთე — ეს ანადგურებს ხელსაწყოს მთელ აზრს.',
      'about-tip2': 'დაიწყე პატარა აქტივობებით. ერთი 10-წუთიანი სიარული უკვე საკმარისია.',
      'about-tip3': 'რეგულარულობა მონაცემზე უფრო მნიშვნელოვანია, ვიდრე სრულყოფა. დღეში ერთი ჩანაწერი 2 კვირის განმავლობაში გიჩვენებს კანონზომიერებებს.',
      'about-tip4': 'არ მიიჩნიო ეს მკურნალობად. ეს არის თვითრეფლექსიის ხელსაწყო. თუ გრძნობ მძიმე დეპრესიას ან აღმოაჩენ თვითდამაზიანებელ ფიქრებს — დაუკავშირდი პროფესიონალს.',

      'about-privacy-title': 'შენი მონაცემები',
      'about-privacy-p': 'ყველა ჩანაწერი ინახება მხოლოდ შენს მოწყობილობაზე, ბრაუზერის localStorage-ში. ჩანაწერები არ იგზავნება ამ საიტის ავტორთან, სერვერზე ან მონაცემთა ბაზაში. შეგიძლია ნებისმიერ დროს გააკეთო ექსპორტი (Backup), ან გაასუფთავო ბრაუზერის მონაცემები ყველაფრის წასაშლელად.',

      'tab-about': 'О программе',
      'about-title': 'Как пользоваться этим инструментом',
      'about-intro-title': 'Что такое лист прогнозирования удовольствия?',
      'about-intro-p1': 'Это инструмент, описанный в книге Дэвида Бернса <em>The Feeling Good Handbook</em>. Он основан на известном психологическом наблюдении: когда человек подавлен или застрял, ум систематически обманывает его, предсказывая, что будущие активности не принесут ни удовольствия, ни чувства достижения. Это психологический фильтр, а не реальность.',
      'about-intro-p2': 'Лист даёт доказательства. Сначала ты прогнозируешь, что даст активность, затем выполняешь её и оцениваешь реальный опыт. Со временем видно, что реальность отличается от ожиданий — часто в лучшую сторону.',

      'about-method-title': 'Почему это работает',
      'about-method-p1': 'Это <strong>поведенческая активация (Behavioral Activation, BA)</strong> — одна из наиболее эмпирически подтверждённых техник CBT при депрессии. Идея простая: не жди улучшения настроения, чтобы что-то сделать. Сделай — и настроение начнёт догонять.',
      'about-method-p2': 'Сравнение прогноза с реальностью показывает, что негативные предсказания ума не являются истиной — это когнитивное искажение. Мы часто недооцениваем, сколько удовольствия или ощущения достижения реально получим.',

      'about-howto-title': 'Как пользоваться',
      'about-step1-title': '1. Новое',
      'about-step1-p': 'Запиши активность, которую планируешь. Назначь время. Затем заранее оцени мастерство (насколько хорошо ты это сделаешь или сколько чувства достижения это даст) и удовольствие (насколько тебе понравится). Используй выбранный формат оценок; внутри данные сохраняются в формате 0–100.',
      'about-step2-title': '2. Сделай',
      'about-step2-p': 'Иди и сделай активность. Не пытайся заранее изменить настроение — просто сделай.',
      'about-step3-title': '3. Журнал (оценить реальность)',
      'about-step3-p': 'Вернись и нажми «Оценить реальность». Запиши, что произошло на самом деле: реальное мастерство, реальное удовольствие, а также настроение до и после. Кнопка с карандашом позволяет редактировать любое значение.',
      'about-step4-title': '4. Анализ',
      'about-step4-p': 'Смотри закономерности: где ум тебя обманывает, какие активности улучшают настроение, какие ожидания были ложными. Эти данные — твой главный инструмент.',

      'about-features-title': 'Полное объяснение новых функций',
      'about-feature1': '<strong>Быстрые шаблоны:</strong> если ты часто планируешь одну и ту же активность — прогулку, тренировку, учёбу или разговор с другом — сохрани её как шаблон. Потом на экране новой записи её можно вставить одним нажатием, без повторного ввода.',
      'about-feature2': '<strong>Настроение до/после:</strong> при оценке активности можно записать настроение до и после. Так ты видишь не только удовольствие и мастерство, но и то, реально ли активность сдвигает общее состояние.',
      'about-feature3': '<strong>Фильтр графика:</strong> в разделе «Анализ» есть выбор: «Все» по умолчанию показывает всё вместе, а «Только настроение», «Только удовольствие» и «Только мастерство» оставляют на графике только выбранную категорию, чтобы картинка была чище.',
      'about-feature4': '<strong>Подписи графика в формате s/f:</strong> при наведении или касании значения появляются рядом с точками. s50 означает стартовое/прогнозное значение 50, а f49 означает финальное/реальное значение 49. Этот формат используется для настроения, удовольствия и мастерства.',
      'about-feature5': '<strong>Боксы на графике не перекрываются:</strong> если в один день много точек рядом, подписи автоматически сдвигаются так, чтобы не накладываться друг на друга и чтобы все числа оставались читаемыми.',
      'about-feature6': '<strong>Что работает лучше всего:</strong> эта панель показывает, какие активности дают самый сильный результат по настроению, мастерству и удовольствию. В каждой строке видно и финальную оценку, и разницу между стартовым/прогнозным и финальным/реальным значением.',
      'about-feature7': '<strong>Сортировка по разнице или финальной оценке:</strong> сортировка по разнице показывает, какие активности дают самый большой подъём. Сортировка по финальной оценке показывает, какие активности заканчиваются самым высоким результатом, даже если подъём был небольшим.',
      'about-feature8': '<strong>Неограниченный список активностей:</strong> панель лучших активностей больше не ограничена топ-5. Если данные есть, можно смотреть все активности и сравнивать более широкую картину.',
      'about-feature9': '<strong>Глубокий анализ одной активности:</strong> выбери конкретную активность и смотри настроение, мастерство и удовольствие вместе: финальную оценку, изменение и количество записей, на которых основан вывод.',
      'about-feature10': '<strong>«Показать все» в глубоком анализе:</strong> первый вариант в списке — «Показать все». Он показывает не рейтинг, а алфавитный список всех активностей, чтобы настроение, мастерство и удовольствие каждой активности были вместе в одной строке.',
      'about-feature11': '<strong>Дата начала главная:</strong> график, серии и анализ привязывают активность к запланированной/стартовой дате. Например, если активность началась вчера в 23:00 и закончилась в 00:20, в анализе она всё равно относится ко вчерашнему дню.',
      'about-feature12': '<strong>Язык, резервная копия и ответственность:</strong> можно переключаться между грузинским, английским и русским языком. Данные остаются на твоём устройстве, поэтому важные записи лучше периодически сохранять через Export. Приложение может быть удалено из интернета или стать недоступным, и даже в этом случае автор не несёт ответственности за использование, результаты, потерю доступа или потерю данных.',
      'about-feature13': '<strong>Настройки ввода оценок:</strong> во вкладке настроек можно выбрать точный ввод 0–100, быстрый ввод 0–10, шаги по 0.5 от 0.0 до 10.0 или словесные описания. Все альтернативные режимы переводятся обратно в формат данных 0–100.',
      'about-feature14': '<strong>Дополнительные теги активностей:</strong> в настройках можно включить теги, добавить свои теги и удалить ненужные. После включения записи могут иметь категории: социальное, тренировка, учёба, работа, отдых и другие. Затем фильтр анализа работает и по активностям, и по тегам.',

      'about-tips-title': 'Советы',
      'about-tip1': 'Будь честен. Не меняй прогноз после выполнения активности — иначе теряется смысл инструмента.',
      'about-tip2': 'Начинай с маленьких активностей. Даже 10-минутной прогулки уже достаточно.',
      'about-tip3': 'Регулярность важнее совершенства. Одна запись в день в течение 2 недель уже покажет закономерности.',
      'about-tip4': 'Не воспринимай это как лечение. Это инструмент саморефлексии. Если у тебя тяжёлая депрессия или мысли о самоповреждении — обратись к специалисту.',

      'about-privacy-title': 'Твои данные',
      'about-privacy-p': 'Все записи хранятся только на твоём устройстве, в localStorage браузера. Записи не отправляются автору сайта, на сервер или в базу данных. Ты можешь в любой момент сделать экспорт (Backup) или очистить данные браузера, чтобы удалить всё.',
      'about-privacy-p2': 'Важное примечание о конфиденциальности: эта версия не использует аналитику, рекламные трекеры, cookies или удалённые веб-шрифты. Однако хостинг сайта может получать обычную техническую информацию запроса, такую как IP-адрес, тип браузера и время запроса. Если в браузере или на устройстве включена синхронизация/резервное копирование, локальные данные браузера могут быть скопированы этим сервисом согласно твоим настройкам. Не вводи личную или очень чувствительную информацию, которую ты не хочешь хранить на этом устройстве или в этом браузере.',
      'about-responsibility-p': 'Примечание об ответственности: приложение предоставляется для личной саморефлексии. Я не несу ответственности за то, как кто-либо использует это приложение, его результаты или данные. Приложение может быть в любой момент удалено из интернета, стать недоступным или измениться, и даже в этом случае я не несу ответственности за потерю доступа, потерю данных или любые последствия.',
      'about-legal-title': 'Безопасность, ответственность и публикация онлайн',
      'about-legal-p1': 'Этот инструмент не является медицинской, психологической, терапевтической, диагностической или экстренной службой. Он не даёт профессиональных советов и не должен использоваться вместо лечения, диагноза, лекарств, терапии или помощи в кризисной ситуации.',
      'about-legal-p2': 'Если ты чувствуешь, что находишься в опасности, у тебя есть мысли о самоповреждении или суициде, или тебе нужна срочная помощь, обратись в местные экстренные службы, кризисную линию или к квалифицированному специалисту. Не полагайся на этот сайт в экстренной ситуации.',
      'about-legal-p3': 'Сайт предоставляется «как есть», без каких-либо гарантий. Автор не обещает, что сайт всегда будет работать, будет точным, безопасным, свободным от ошибок или подходящим для конкретной цели.',
      'about-legal-p4': 'Используя сайт, пользователь сам несёт ответственность за свои записи, решения, результаты, экспорт данных, удаление данных и за то, соответствует ли использование местным правилам и законам.',
      'about-legal-p5': 'Эти примечания уменьшают риск недопонимания, но не являются юридической консультацией и могут быть недостаточны во всех странах. Если ты публикуешь сайт публично или даёшь его использовать другим людям, желательно показать его местному юристу.',
      'about-attribution': 'Основано на книге <em>The Feeling Good Handbook</em>, Дэвид Д. Бернс, MD. Это личный инструмент саморефлексии, а не замена профессиональной психологической помощи.',

      // === About / How-to-use screen ===
      'tab-about': 'About',
      'about-title': 'How to Use This Tool',
      'about-intro-title': 'What is the Pleasure-Predicting Sheet?',
      'about-intro-p1': 'This is a tool described in David Burns\' book <em>The Feeling Good Handbook</em>. It is based on a well-known psychological finding: when people feel depressed or stuck, their minds systematically deceive them, predicting that future activities will bring neither pleasure nor a sense of accomplishment. That is a psychological filter, not reality.',
      'about-intro-p2': 'This sheet provides evidence. First you predict what an activity will deliver, then you do it and rate the actual experience. Over time you\'ll see that reality differs from your expectations — often for the better.',

      'about-method-title': 'Why It Works',
      'about-method-p1': 'This is <strong>Behavioral Activation (BA)</strong> — one of the most empirically supported CBT techniques for treating depression. The idea is simple: don\'t wait for your mood to improve before doing things. Do them, and mood follows.',
      'about-method-p2': 'Comparing prediction with reality shows you that your mind\'s negative forecasts aren\'t truth — they\'re a cognitive distortion. Most of us systematically underestimate how much we\'ll actually enjoy or accomplish.',

      'about-howto-title': 'How to Use It',
      'about-step1-title': '1. New',
      'about-step1-p': 'Write down the activity you\'re planning. Schedule a time. Then predict mastery (how well you\'ll do it, or how much sense of accomplishment it will bring) and pleasure (how much you\'ll enjoy it). Use your selected rating format; internally the data is saved as 0–100.',
      'about-step2-title': '2. Do It',
      'about-step2-p': 'Go and do the activity. Don\'t try to change your mood beforehand — just do it.',
      'about-step3-title': '3. Log (Rate Actual)',
      'about-step3-p': 'Come back and tap "Rate Actual." Record what actually happened: real mastery, real pleasure, plus your mood before and after. The pencil button lets you edit any value at any time.',
      'about-step4-title': '4. Insights',
      'about-step4-p': 'See patterns: where your mind deceives you, which activities improve your mood, what your false expectations were. This data is your main tool.',

      'about-features-title': 'Full Explanation of the New Features',
      'about-feature1': '<strong>Quick templates:</strong> if you often plan the same activity — a walk, workout, study block, or conversation with a friend — save it as a template. Next time, insert it from the New screen with one tap instead of typing it again.',
      'about-feature2': '<strong>Mood before/after:</strong> when rating an activity, you can record mood before and mood after. This shows not only pleasure and mastery, but also whether the activity actually shifts your overall state.',
      'about-feature3': '<strong>Graph filter:</strong> in Insights, the graph has a selector. All is the default and shows everything together. Mood only, Pleasure only, and Mastery only hide the other categories so the graph is easier to read.',
      'about-feature4': '<strong>s/f labels on the graph:</strong> when you hover or touch the graph, values appear next to the dots. s50 means starting/predicted value 50, and f49 means final/actual value 49. The same format is used for mood, pleasure, and mastery.',
      'about-feature5': '<strong>Non-overlapping graph boxes:</strong> when several values are close together on the same day, the value boxes automatically shift so they do not cover each other and all numbers stay readable.',
      'about-feature6': '<strong>What works best:</strong> this dashboard shows which activities produce the strongest results for mood, mastery, and pleasure. Each row shows both the final score and the difference between starting/predicted and final/actual values.',
      'about-feature7': '<strong>Sort by difference or final score:</strong> Sort by difference finds the biggest improvements. Sort by final score finds the activities that end with the highest result, even if the improvement was small.',
      'about-feature8': '<strong>Unlimited activity rankings:</strong> the best-activity dashboard is no longer limited to a top 5. If data exists, you can review all activities and compare the wider pattern.',
      'about-feature9': '<strong>Deep analysis for one activity:</strong> choose a specific activity and see mood, mastery, and pleasure together: final score, change, and how many entries the conclusion is based on.',
      'about-feature10': '<strong>Show all in deep analysis:</strong> the first option is Show all. It does not show a ranking; it lists all activity names alphabetically so each activity keeps mood, mastery, and pleasure together on one line.',
      'about-feature11': '<strong>Start date is primary:</strong> charts and analysis attach an activity to its scheduled/start date. Global streaks count days with entries using that same start date, and are not narrowed by activity or tag filters. For example, if an activity started yesterday at 11 PM and ended at 12:20 AM, it still belongs to yesterday in analysis.',
      'about-feature12': '<strong>Language, backup, and responsibility:</strong> you can switch between Georgian, English, and Russian. Data stays on your device, so export important records as a backup. The app may be removed from the web or become unavailable, and even then the author is not responsible for use, results, lost access, or lost data.',
      'about-feature13': '<strong>Rating input settings:</strong> the Settings tab lets you choose between precise 0–100 input, quick 0–10 input, half-step 0.0–10.0 input, or word-description selectors. All alternative modes are translated back into the app’s 0–100 data format.',
      'about-feature14': '<strong>Advanced activity tags:</strong> the Settings tab can turn tags on or off. Once enabled, the New tab lets you choose, add, and remove tags such as social, exercise, learning, work, relaxation, and more. The Insights filter can then work by activity or by tag.',

      'about-tips-title': 'Tips',
      'about-tip1': 'Be honest. Don\'t change your prediction after you\'ve done the activity — that destroys the entire point of the tool.',
      'about-tip2': 'Start with small activities. One 10-minute walk is already enough.',
      'about-tip3': 'Consistency matters more than perfection. One entry per day for 2 weeks will show you patterns.',
      'about-tip4': 'Don\'t treat this as treatment. It\'s a self-reflection tool. If you\'re experiencing severe depression or notice self-harming thoughts, contact a professional.',

      'about-privacy-p': 'All entries are stored only on your device, in your browser\'s localStorage. Entries are not sent to the site author, a server, or a database. You can export a backup any time, or clear your browser data to wipe everything.',
      'about-privacy-p2': 'Important privacy note: this version does not use analytics, advertising trackers, cookies, or remote web fonts. However, the site host may receive ordinary technical request information such as IP address, browser type, and request time. If browser or device sync/backup is enabled, local browser data may be copied by that service according to your settings. Do not enter personal or highly sensitive information that you do not want stored on this device or in this browser.',
