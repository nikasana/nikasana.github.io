          ${pencilBtn('time', e.id)}
        </div>
        <div class="entry-activity-row">
          <div class="entry-activity">${escapeHtml(e.activity)}</div>
          ${pencilBtn('activity', e.id, 'lg')}
        </div>
        ${tagsHtml}
        <div class="entry-grid">
          <div class="metric">
            <div class="metric-label">${t('insight-mastery')}</div>
            <div class="metric-values">
              <span class="pred">${e.predMastery}</span>
              ${pencilBtn('pred-mastery', e.id)}
              <span class="arrow">→</span>
              ${e.actMastery == null
                ? `<span class="pending">${t('pending')}</span>${pencilBtn('act-mastery', e.id)}`
                : `<span class="actual-m">${e.actMastery}</span>${pencilBtn('act-mastery', e.id)}${deltaBadge(e.predMastery, e.actMastery)}`}
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">${t('insight-pleasure')}</div>
            <div class="metric-values">
              <span class="pred">${e.predPleasure}</span>
              ${pencilBtn('pred-pleasure', e.id)}
              <span class="arrow">→</span>
              ${e.actPleasure == null
                ? `<span class="pending">${t('pending')}</span>${pencilBtn('act-pleasure', e.id)}`
                : `<span class="actual-p">${e.actPleasure}</span>${pencilBtn('act-pleasure', e.id)}${deltaBadge(e.predPleasure, e.actPleasure)}`}
            </div>
          </div>
        </div>
        ${moodHtml}
        <div class="entry-actions">
          ${isPending
            ? `<button class="complete" data-action="rate" data-id="${e.id}">${t('btn-rate')}</button>`
            : ''}
          <button class="delete" data-action="delete" data-id="${e.id}">${t('btn-delete')}</button>
        </div>
      </div>`;
  }

  // Event delegation for entry action buttons (works in sandboxed previews
  // where inline onclick handlers may be stripped)
  document.getElementById('log-content').addEventListener('click', (ev) => {
    const btn = ev.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    if (action === 'rate') openRate(id);
    else if (action === 'delete') confirmDelete(id);
    else if (action === 'edit') openEdit(id, btn.dataset.field);
  });

  // Custom confirm modal (replaces native window.confirm, which may be
  // blocked or no-op in some embedded preview frames)
  function showConfirm(message) {
    return new Promise(resolve => {
      const overlay = document.getElementById('confirm-overlay');
      document.getElementById('confirm-message').textContent = message;
      overlay.classList.add('show');
      const yes = document.getElementById('confirm-yes');
      const no = document.getElementById('confirm-no');
      const cleanup = (result) => {
        overlay.classList.remove('show');
        yes.removeEventListener('click', onYes);
        no.removeEventListener('click', onNo);
        overlay.removeEventListener('click', onBackdrop);
        resolve(result);
      };
      const onYes = () => cleanup(true);
      const onNo = () => cleanup(false);
      const onBackdrop = (e) => { if (e.target === overlay) cleanup(false); };
      yes.addEventListener('click', onYes);
      no.addEventListener('click', onNo);
      overlay.addEventListener('click', onBackdrop);
    });
  }

  async function confirmDelete(id) {
    const ok = await showConfirm(t('confirm-delete'));
    if (!ok) return;
    const deleted = await deleteEntry(id);
    if (deleted) {
      renderLog();
      showToast(t('toast-deleted'));
    }
  }

  // ============ EDIT MODAL ============
  // Field metadata: maps field name -> { title key, getter, setter, type }
  // type: 'scale' (tens+ones picker, 0-100) | 'text' | 'time'
  const EDIT_FIELDS = {
    'activity':      { titleKey: 'edit-title-activity',      type: 'text' },
    'company':       { titleKey: 'edit-title-company',       type: 'text' },
    'time':          { titleKey: 'edit-title-time',          type: 'time' },
    'pred-mastery':  { titleKey: 'edit-title-pred-mastery',  type: 'scale', color: 'mastery' },
    'pred-pleasure': { titleKey: 'edit-title-pred-pleasure', type: 'scale', color: 'pleasure' },
    'act-mastery':   { titleKey: 'edit-title-act-mastery',   type: 'scale', color: 'mastery' },
    'act-pleasure':  { titleKey: 'edit-title-act-pleasure',  type: 'scale', color: 'pleasure' },
    'mood-before':   { titleKey: 'edit-title-mood-before',   type: 'scale', color: 'mood' },
    'mood-after':    { titleKey: 'edit-title-mood-after',    type: 'scale', color: 'mood' },
    'tags':          { titleKey: 'edit-title-tags',          type: 'tags' },
  };

  // Map field name to entry property name
  const FIELD_TO_PROP = {
    'activity': 'activity',
    'company': 'company',
    'pred-mastery': 'predMastery',
    'pred-pleasure': 'predPleasure',
    'act-mastery': 'actMastery',
    'act-pleasure': 'actPleasure',
    'mood-before': 'moodBefore',
    'mood-after': 'moodAfter',
    'tags': 'tags',
  };

  let editContext = null; // { entryId, field, getValue }

  function openEdit(entryId, field) {
    const meta = EDIT_FIELDS[field];
    if (!meta) return;
    const entry = state.entries.find(e => e.id === entryId);
    if (!entry) return;

    document.getElementById('edit-title').textContent = t(meta.titleKey);
    document.getElementById('edit-save').textContent = t('edit-save');
    const body = document.getElementById('edit-body');

    if (meta.type === 'text') {
      const currentVal = field === 'activity' ? entry.activity : (entry.company || '');
      body.innerHTML = `
        <div class="field" style="margin-bottom: 0;">
          <input type="text" id="edit-text-input" autocomplete="off">
        </div>`;
      const input = document.getElementById('edit-text-input');
      input.value = currentVal;
      setTimeout(() => input.focus(), 60);
      editContext = {
        entryId, field,
        getValue: () => input.value.trim(),
        validate: (v) => field !== 'activity' || v.length > 0,
      };
    } else if (meta.type === 'time') {
      const ts = entryStartTimestamp(entry);
      const d = new Date(ts);
      const dayStart = new Date(d);
      dayStart.setHours(0, 0, 0, 0);
      // Build day select options inline
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const dayOpts = [];
      // Include some past days too, since edits may be retroactive
      for (let i = -14; i < 14; i++) {
        const day = new Date(today.getTime() + i * 86400000);
        const isCurrent = day.getTime() === dayStart.getTime();
        let label;
        if (i === 0) label = t('day-today');
        else if (i === -1) label = t('day-yesterday');
        else if (i === 1) label = t('day-tomorrow');
        else label = day.toLocaleDateString(currentLang === 'ka' ? 'ka-GE' : 'en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        dayOpts.push(`<option value="${day.getTime()}" ${isCurrent ? 'selected' : ''}>${label}</option>`);
      }
      // Hours
      const hour = d.getHours();
      const hourOpts = [];
      for (let h = 0; h < 24; h++) {
        const ampm = h < 12 ? 'AM' : 'PM';
        const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
        hourOpts.push(`<option value="${h}" ${h === hour ? 'selected' : ''}>${h12}:00 ${ampm}</option>`);
      }
      body.innerHTML = `
        <div class="time-row">
          <select id="edit-day-select" class="time-select">${dayOpts.join('')}</select>
          <select id="edit-hour-select" class="time-select">${hourOpts.join('')}</select>
        </div>`;
      editContext = {
        entryId, field,
        getValue: () => {
          const dayMs = parseInt(document.getElementById('edit-day-select').value);
          const hr = parseInt(document.getElementById('edit-hour-select').value);
          return dayMs + hr * 3600000;
        },
        validate: () => true,
      };
    } else if (meta.type === 'tags') {
      body.innerHTML = `
        <div class="tag-field" style="margin-bottom: 0;">
          <p class="tag-help">${t('tag-help')}</p>
          <div class="tag-choice-grid" id="edit-tags-list"></div>
        </div>`;
      renderTagPicker('edit-tags-list', getEntryTags(entry));
      editContext = {
        entryId, field,
        getValue: () => getSelectedTags('edit-tags-list'),
        validate: () => true,
      };
    } else if (meta.type === 'scale') {
      // Reuse the existing scale-pair structure with a dedicated key 'edit-scale'.
      // It respects the same input mode chosen in Settings.
      body.innerHTML = `
        <div class="pair">
          <div class="scale-group">
            <div>
              <div class="scale-sub-label"></div>
              <div class="scale-row tens" data-scale="edit-scale" data-part="tens"></div>
            </div>
            <div>
              <div class="scale-sub-label"></div>
              <div class="scale-row ones" data-scale="edit-scale" data-part="ones"></div>
            </div>
          </div>
          <div class="total-display">
            <span class="total-label">${t('total-label')}</span>
            <span class="total-num empty" data-total="edit-scale">—</span>
          </div>
        </div>`;

      // Register transient state.parts entry, build according to current Settings, and prefill.
      state.parts['edit-scale'] = { tens: null, ones: null };
      renderScaleWidget('edit-scale', body);

      // Prefill from current entry value
      const prop = FIELD_TO_PROP[field];
      const cur = entry[prop];
      if (typeof cur === 'number') {
        prefillScale('edit-scale', cur, body);
      }

      editContext = {
        entryId, field,
        getValue: () => getTotal('edit-scale'),
        validate: (v) => v !== null,
      };
    }

    // Show the modal
    document.getElementById('edit-overlay').classList.add('show');
  }

  function closeEdit() {
    document.getElementById('edit-overlay').classList.remove('show');
    // Clean up transient scale state if present
    if (state.parts['edit-scale']) delete state.parts['edit-scale'];
    document.getElementById('edit-body').innerHTML = '';
    editContext = null;
  }

  async function saveEdit() {
    if (!editContext) return;
    const { entryId, field, getValue, validate } = editContext;
    const value = getValue();
    if (validate && !validate(value)) {
      // Invalid; do nothing, leave modal open
      return;
    }
    const entry = state.entries.find(e => e.id === entryId);
    if (!entry) { closeEdit(); return; }

    if (field === 'time') {
      entry.scheduledAt = value;
    } else {
      const prop = FIELD_TO_PROP[field];
      if (prop) entry[prop] = value;
    }

    // If all four post-activity values are now filled, mark the entry as
    // completed so it no longer appears as pending (and the Rate Actual
    // button hides). If any of them is missing, treat the entry as pending again.
    const allFilled =
      entry.actMastery != null &&
      entry.actPleasure != null &&
      entry.moodBefore != null &&
      entry.moodAfter != null;

    if (allFilled && !entry.completedAt) {
      entry.completedAt = Date.now();
    } else if (!allFilled && entry.completedAt) {
      entry.completedAt = null;
    }

    sortEntries();
    const ok = await saveEntry(entry);
    if (ok) {
      closeEdit();
      renderLog();
      showToast(t('toast-edit-saved'));
    }
  }

  // Wire up edit modal buttons + backdrop dismiss
  document.getElementById('edit-cancel').addEventListener('click', closeEdit);
  document.getElementById('edit-save').addEventListener('click', saveEdit);
  document.getElementById('edit-overlay').addEventListener('click', (ev) => {
    if (ev.target.id === 'edit-overlay') closeEdit();
  });

  // ============ INSIGHTS ============
  // ============ CHART (Predicted vs Actual, last 7 days) ============
  // Returns SVG markup as a string. Designed for a ~340px wide mobile viewport.
  function getChartFilter() {
    return ['all', 'mood', 'pleasure', 'mastery'].includes(state.chartFilter) ? state.chartFilter : 'all';
  }

  function getChartActivityKey(options = []) {
    const SHOW_ALL_KEY = '__all__';
    const stillExists = state.chartActivityKey === SHOW_ALL_KEY || options.some(item => item.key === state.chartActivityKey);
    if (!state.chartActivityKey || !stillExists) {
      state.chartActivityKey = SHOW_ALL_KEY;
    }
    return state.chartActivityKey;
  }

  function visibleChartKeys(filter) {
    const f = ['all', 'mood', 'pleasure', 'mastery'].includes(filter) ? filter : 'all';
    if (f === 'pleasure') return ['predP', 'actP'];
    if (f === 'mastery') return ['predM', 'actM'];
    if (f === 'mood') return ['moodB', 'moodA'];
    return ['predP', 'actP', 'predM', 'actM', 'moodB', 'moodA'];
  }

  function chartSeriesMeta(key) {
    const map = {
      predP: { color: 'var(--pleasure)', dashed: true,  label: `${t('chart-pleasure')} · ${t('chart-predicted')}`, short: 'Pp', value: e => e.predPleasure },
      actP:  { color: 'var(--pleasure)', dashed: false, label: `${t('chart-pleasure')} · ${t('chart-actual')}`,    short: 'Pa', value: e => e.actPleasure },
      predM: { color: 'var(--mastery)',  dashed: true,  label: `${t('chart-mastery')} · ${t('chart-predicted')}`,  short: 'Mp', value: e => e.predMastery },
      actM:  { color: 'var(--mastery)',  dashed: false, label: `${t('chart-mastery')} · ${t('chart-actual')}`,     short: 'Ma', value: e => e.actMastery },
      moodB: { color: 'var(--mood)',     dashed: true,  label: t('chart-mood-before'), short: 'Mb', value: e => e.moodBefore },
      moodA: { color: 'var(--mood)',     dashed: false, label: t('chart-mood-after'),  short: 'Ma', value: e => e.moodAfter },
    };
    return map[key];
  }

  function renderChartLegend(filter) {
    return visibleChartKeys(filter).map(key => {
      const meta = chartSeriesMeta(key);
      return `
        <span class="legend-item" style="color: ${meta.color};">
          <span class="legend-swatch${meta.dashed ? ' dashed' : ''}" ${meta.dashed ? '' : `style="background: ${meta.color};"`}></span>
          ${meta.label}
        </span>`;
    }).join('');
  }

  // Returns SVG markup as a string. Designed for a ~340px wide mobile viewport.
  function renderChartSvg(completed, chartFilter = 'all', chartActivityKey = '__all__', showAverages = false) {
    const W = 340, H = 230;
    const pad = { top: 18, right: 34, bottom: 30, left: 30 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;
    const filter = ['all', 'mood', 'pleasure', 'mastery'].includes(chartFilter) ? chartFilter : 'all';
    const activityKey = typeof chartActivityKey === 'string' ? chartActivityKey : '__all__';
    const visibleKeys = visibleChartKeys(filter);

    // Filter to the last 7 days of rated entries, sorted ascending by start time.
    // Start/scheduled date is primary, so an activity finished after midnight still
    // belongs to the day it was started/scheduled. If an activity is selected,
    // the graph only shows entries with the same normalized activity name.
    const cutoff = Date.now() - 7 * 86400000;
    const recent = completed
      .filter(e => entryStartTimestamp(e) >= cutoff)
      .filter(e => activityKey === '__all__' || normalizeActivityKey(e.activity) === activityKey)
      .sort((a, b) => entryStartTimestamp(a) - entryStartTimestamp(b));

    if (recent.length === 0) return null;

    const xs = recent.length === 1
      ? [pad.left + plotW / 2]
      : recent.map((_, i) => pad.left + (plotW * i) / (recent.length - 1));
    const y = (v) => pad.top + plotH - (v / 100) * plotH;

    const pathFromPoints = (items) => items.map((item, i) => `${i === 0 ? 'M' : 'L'}${item.x.toFixed(1)},${item.y.toFixed(1)}`).join(' ');

    // Draw sparse series as separate segments so missing mood values create gaps.
    const sparseLinePaths = (key) => {
      const meta = chartSeriesMeta(key);
      let segments = [];
      let current = [];
      recent.forEach((e, i) => {
        const v = scoreOrNull(meta.value(e));
        if (v === null) {
          if (current.length) segments.push(current);
          current = [];
          return;
        }
        current.push({ x: xs[i], y: y(v) });
      });
      if (current.length) segments.push(current);
      return segments.map(seg => pathFromPoints(seg));
    };

    const gridYs = [0, 25, 50, 75, 100];
    const gridLines = gridYs.map(v => {
      const yy = y(v).toFixed(1);
      return `<line x1="${pad.left}" x2="${pad.left + plotW}" y1="${yy}" y2="${yy}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>
              <text x="${pad.left - 6}" y="${(y(v) + 3).toFixed(1)}" font-size="9" fill="var(--ink-faint)" text-anchor="end" font-family="JetBrains Mono, monospace">${v}</text>`;
    }).join('');

    const labels = recent.map((e, i) => {
      const showEvery = recent.length > 5 ? 2 : 1;
      if (i % showEvery !== 0 && i !== recent.length - 1) return '';
      const d = new Date(entryStartTimestamp(e));
      const lab = `${d.getMonth() + 1}/${d.getDate()}`;
      return `<text x="${xs[i].toFixed(1)}" y="${H - pad.bottom + 16}" font-size="9" fill="var(--ink-faint)" text-anchor="middle" font-family="JetBrains Mono, monospace">${lab}</text>`;
    }).join('');

    const dotR = recent.length === 1 ? 5 : 3;

    const lineMarkup = visibleKeys.map(key => {
      const meta = chartSeriesMeta(key);
      const paths = sparseLinePaths(key);
      if (recent.length < 2 || !paths.length) return '';
      return paths
        .filter(d => d)
        .map(d => `<path d="${d}" fill="none" stroke="${meta.color}" stroke-width="${meta.dashed ? '1.5' : '2.2'}" ${meta.dashed ? 'stroke-dasharray="4 3" opacity="0.7"' : ''}/>`)
        .join('');
    }).join('');

    const dotMarkup = visibleKeys.map(key => {
      const meta = chartSeriesMeta(key);
      return recent.map((e, i) => {
        const v = scoreOrNull(meta.value(e));
        if (v === null) return '';
        const r = meta.dashed ? Math.max(dotR - 1, 2) : dotR;
        return meta.dashed
          ? `<circle cx="${xs[i].toFixed(1)}" cy="${y(v).toFixed(1)}" r="${r}" fill="none" stroke="${meta.color}" stroke-width="1.5" opacity="0.7"/>`
          : `<circle cx="${xs[i].toFixed(1)}" cy="${y(v).toFixed(1)}" r="${r}" fill="${meta.color}"/>`;
      }).join('');
    }).join('');

    // Averages are optional and controlled by the checkbox above the graph.
    // When enabled, they apply to the current filters: all activities or one
    // activity, all value types or one value type. Start/before averages use a
    // dashed line; final/after averages use a solid line. Exact values are also
    // repeated below the SVG for easier reading.
    const shouldShowAverages = !!showAverages;
    const avgSeries = shouldShowAverages
      ? visibleKeys.map(key => {
          const meta = chartSeriesMeta(key);
          const values = recent
            .map(e => scoreOrNull(meta.value(e)))
            .filter(v => typeof v === 'number');
          if (!values.length) return null;
          const avgValue = values.reduce((sum, v) => sum + v, 0) / values.length;
          return {
            key,
            meta,
            value: avgValue,
            yPos: y(avgValue),
            code: `${meta.dashed ? 's' : 'f'}${avgValue.toFixed(1)}`,
            text: `${t('chart-avg-short')} ${meta.dashed ? 's' : 'f'}${avgValue.toFixed(1)}`
          };
        }).filter(Boolean)
      : [];

    const avgMarkup = avgSeries.map(item => {
      const lineY = item.yPos.toFixed(1);
      const dashAttr = item.meta.dashed ? ' stroke-dasharray="5 4"' : '';
      const strokeWidth = item.meta.dashed ? '1.25' : '1.75';
      const opacity = item.meta.dashed ? '0.62' : '0.72';
      return `<line x1="${pad.left}" x2="${pad.left + plotW}" y1="${lineY}" y2="${lineY}" stroke="${item.meta.color}" stroke-width="${strokeWidth}"${dashAttr} opacity="${opacity}"/>`;
    }).join('');

    const avgHtml = avgSeries.length
      ? `<div class="chart-average-strip">${avgSeries.map(item => `
          <span class="chart-average-chip" style="border-color: ${item.meta.color};">
            <span class="chart-average-chip-label">${escapeHtml(item.meta.label)}</span>
            <span class="chart-average-chip-value" style="color: ${item.meta.color};">
              <span class="chart-average-chip-prefix">${escapeHtml(t('chart-avg-short'))} </span><span class="chart-average-chip-code">${escapeHtml(item.code)}</span>
            </span>
          </span>`).join('')}</div>`
      : '';

    const hoverLayer = `
      <line class="crosshair" x1="0" y1="${pad.top}" x2="0" y2="${pad.top + plotH}"/>
      ${visibleKeys.map(key => {
        const meta = chartSeriesMeta(key);
        return `
          <circle class="hover-dot dot-${key}" cx="0" cy="0" r="4" fill="${meta.color}" opacity="0.85"/>
          <g class="hover-tag tag-${key}">
            <rect x="0" y="0" width="26" height="14" rx="3"/>
            <text x="0" y="0" text-anchor="middle"></text>
          </g>`;
      }).join('')}
    `;

    const zones = recent.map((_, i) => {
      // The first and last points get hit zones that extend all the way to
      // the SVG edges. This fixes the common issue where the rightmost value
      // looks hovered visually but cannot be selected because the pointer is
      // inside the chart padding rather than the exact plot interval.
      let zx, zw;
      if (recent.length === 1) {
        zx = 0;
        zw = W;
      } else if (i === 0) {
        const nextMid = (xs[0] + xs[1]) / 2;
        zx = 0;
        zw = nextMid;
      } else if (i === recent.length - 1) {
        const prevMid = (xs[i - 1] + xs[i]) / 2;
        zx = prevMid;
        zw = W - prevMid;
      } else {
        const prevMid = (xs[i - 1] + xs[i]) / 2;
        const nextMid = (xs[i] + xs[i + 1]) / 2;
        zx = prevMid;
        zw = nextMid - prevMid;
      }
      return `<rect class="hover-zone" data-index="${i}" x="${zx.toFixed(1)}" y="0" width="${zw.toFixed(1)}" height="${H}"/>`;
    }).join('');

    const svg = `
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <rect class="hover-surface" x="0" y="0" width="${W}" height="${H}"/>
        ${gridLines}
        ${avgMarkup}
        ${lineMarkup}
        ${dotMarkup}
        ${labels}
        ${hoverLayer}
        ${zones}
      </svg>`;

    return {
      svg,
      avgHtml,
      filter,
      visibleKeys,
      points: recent.map((e, i) => ({
        index: i,
        x: xs[i],
        entry: e,
        ys: {
          predP: scoreOrNull(e.predPleasure) !== null ? y(e.predPleasure) : null,
          actP:  scoreOrNull(e.actPleasure)  !== null ? y(e.actPleasure)  : null,
          predM: scoreOrNull(e.predMastery)  !== null ? y(e.predMastery)  : null,
          actM:  scoreOrNull(e.actMastery)   !== null ? y(e.actMastery)   : null,
          moodB: scoreOrNull(e.moodBefore)   !== null ? y(e.moodBefore)   : null,
          moodA: scoreOrNull(e.moodAfter)    !== null ? y(e.moodAfter)    : null,
        }
      })),
      W, H, pad, plotW, plotH,
    };
  }



  function toTimestamp(value) {
    if (value === null || value === undefined || value === '') return null;
    const ts = new Date(value).getTime();
    return Number.isFinite(ts) ? ts : null;
  }

  // Primary date identity for analysis/logging: when the activity was scheduled/started.
  // We intentionally do NOT rewrite stored data; we only resolve which timestamp to use
  // when grouping, graphing, and calculating streaks.
  function entryStartTimestamp(entry) {
    if (!entry) return Date.now();
    return toTimestamp(entry.scheduledAt) ??
           toTimestamp(entry.createdAt) ??
           toTimestamp(entry.completedAt) ??
           Date.now();
  }

  function localDateKey(ts) {
    const d = new Date(ts || Date.now());
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function entryDateKeys(entries) {
    return [...new Set(
      entries
        .filter(Boolean)
        .map(e => localDateKey(entryStartTimestamp(e)))
    )].sort();
  }

  // Streaks are intentionally global: they are based only on which calendar
  // days have entries, and they are never narrowed by activity or tag filters.
  function calculateCurrentStreak(entries) {
    const tracked = new Set(entryDateKeys(entries));
    let cursor = new Date();
    let streak = 0;

    while (tracked.has(localDateKey(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }

    return streak;
  }

  function calculateBestStreak(entries) {
    const keys = entryDateKeys(entries);
    if (!keys.length) return 0;

    let best = 1;
    let current = 1;

    for (let i = 1; i < keys.length; i++) {
      const prev = new Date(keys[i - 1] + 'T00:00:00');
      const curr = new Date(keys[i] + 'T00:00:00');
      const diffDays = Math.round((curr - prev) / 86400000);

      if (diffDays === 1) current++;
      else current = 1;

      if (current > best) best = current;
    }

    return best;
  }

  function wasTodayTracked(entries) {
    const today = localDateKey(Date.now());
    return entryDateKeys(entries).includes(today);
  }


  function scoreOrNull(value) {
    if (value === null || value === undefined || value === '') return null;
    const n = Number(value);
    return Number.isFinite(n) ? n : null;
  }

  function normalizeActivityKey(activity) {
    return String(activity || '').trim().replace(/\s+/g, ' ').toLowerCase();
  }

  function getAnalysisGroup() {
    if (!state.advancedTags) return 'activity';
    return state.analysisGroup === 'tag' ? 'tag' : 'activity';
  }

  function entryMatchesGroup(entry, group, key) {
    if (key === '__all__') return true;
    if (group === 'tag') return getEntryTags(entry).includes(key);
    return normalizeActivityKey(entry.activity) === key;
  }

  function getEntryGroupItems(entry, group) {
    if (group === 'tag') {
      return getEntryTags(entry).map(key => ({ key, name: tagLabel(key) }));
    }
    const key = normalizeActivityKey(entry.activity);
    return key ? [{ key, name: String(entry.activity || '').trim().replace(/\s+/g, ' ') }] : [];
  }

  function buildGroupRanking(entries, config, group = getAnalysisGroup()) {
    const buckets = new Map();

    entries.forEach(e => {
      const values = config.valuesFn(e);
      if (!values) return;

      const finalValue = scoreOrNull(values.final);
      const diffValue = scoreOrNull(values.diff);
      if (finalValue === null || diffValue === null) return;

      getEntryGroupItems(e, group).forEach(item => {
        if (!item.key) return;
        if (!buckets.has(item.key)) {
          buckets.set(item.key, {
            key: item.key,
            name: item.name,
            finalTotal: 0,
            diffTotal: 0,
            count: 0
          });
        }

        const bucket = buckets.get(item.key);
        bucket.finalTotal += finalValue;
        bucket.diffTotal += diffValue;
        bucket.count += 1;
      });
    });

    const rankBy = config.rankBy === 'diff' ? 'avgDiff' : 'avgFinal';

    return [...buckets.values()]
      .map(item => ({
        ...item,
        avgFinal: item.finalTotal / item.count,
        avgDiff: item.diffTotal / item.count
      }))
      .sort((a, b) => (b[rankBy] - a[rankBy]) || (b.count - a.count) || a.name.localeCompare(b.name));
  }

  function formatSignedScore(value) {
    const sign = value > 0 ? '+' : '';
    return `${sign}${value.toFixed(1)}`;
  }

  function renderActivityRanking(items, options) {
    if (!items.length) {
      return `<div class="rank-empty">${t(options.emptyKey)}</div>`;
    }

    return `
      <ol class="rank-list">
        ${items.map((item, i) => {
          const finalValue = item.avgFinal;
          const diffValue = item.avgDiff;
          const diffPolarity = diffValue > 0 ? ' positive' : diffValue < 0 ? ' negative' : '';
          return `
            <li class="rank-item">
              <span class="rank-index">${i + 1}</span>
              <span class="rank-main">
                <span class="rank-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
                <span class="rank-count">${t('dashboard-count', { n: item.count })}</span>
              </span>
              <span class="rank-score-stack">
                <span class="rank-score-row">
                  <span class="rank-score-label">${t('dashboard-final')}</span>
                  <span class="rank-score-value final ${options.className}">${finalValue.toFixed(1)}</span>
                </span>
                <span class="rank-score-row">
                  <span class="rank-score-label">${t('dashboard-difference')}</span>
                  <span class="rank-score-value ${options.className}${diffPolarity}">${formatSignedScore(diffValue)}</span>
                </span>
              </span>
            </li>`;
        }).join('')}
      </ol>`;
  }

  function renderLiftDashboard(entries) {
    const dashboardSort = state.dashboardSort === 'final' ? 'final' : 'diff';
    const group = getAnalysisGroup();

    const moodItems = buildGroupRanking(entries, {
      rankBy: dashboardSort,
      valuesFn: e => {
        const before = scoreOrNull(e.moodBefore);
        const after = scoreOrNull(e.moodAfter);
        return before !== null && after !== null ? { final: after, diff: after - before } : null;
      }
    }, group);

    const masteryItems = buildGroupRanking(entries, {
      rankBy: dashboardSort,
      valuesFn: e => {
        const predicted = scoreOrNull(e.predMastery);
        const actual = scoreOrNull(e.actMastery);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      }
    }, group);

    const pleasureItems = buildGroupRanking(entries, {
      rankBy: dashboardSort,
      valuesFn: e => {
        const predicted = scoreOrNull(e.predPleasure);
        const actual = scoreOrNull(e.actPleasure);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      }
    }, group);

    return `
      <div class="lift-dashboard">
        <div class="lift-dashboard-header">
          <div class="lift-dashboard-title">${t(group === 'tag' ? 'dashboard-title-tags' : 'dashboard-title')}</div>
          <div class="lift-dashboard-subtitle">${t(group === 'tag' ? 'dashboard-subtitle-tags' : 'dashboard-subtitle')}</div>
          <div class="lift-dashboard-controls">
            <label class="dashboard-sort-label" for="dashboard-sort-select">${t('dashboard-sort-label')}</label>
            <select class="dashboard-sort-select" id="dashboard-sort-select">
              <option value="diff" ${dashboardSort === 'diff' ? 'selected' : ''}>${t('dashboard-sort-diff')}</option>
              <option value="final" ${dashboardSort === 'final' ? 'selected' : ''}>${t('dashboard-sort-final')}</option>
            </select>
          </div>
        </div>
        <div class="lift-grid">
          <div class="lift-card">
            <div class="lift-card-title">
              <div class="lift-card-title-main mood">${t('dashboard-mood-title')}</div>
            </div>
            <div class="lift-card-subtitle">${t('dashboard-mood-sub')}</div>
            ${renderActivityRanking(moodItems, { className: 'mood', emptyKey: 'dashboard-empty-mood' })}
          </div>
          <div class="lift-card">
            <div class="lift-card-title">
              <div class="lift-card-title-main mastery">${t('dashboard-mastery-title')}</div>
            </div>
            <div class="lift-card-subtitle">${t('dashboard-mastery-sub')}</div>
            ${renderActivityRanking(masteryItems, { className: 'mastery', emptyKey: 'dashboard-empty-score' })}
          </div>
          <div class="lift-card">
            <div class="lift-card-title">
              <div class="lift-card-title-main pleasure">${t('dashboard-pleasure-title')}</div>
            </div>
            <div class="lift-card-subtitle">${t('dashboard-pleasure-sub')}</div>
            ${renderActivityRanking(pleasureItems, { className: 'pleasure', emptyKey: 'dashboard-empty-score' })}
          </div>
        </div>
      </div>`;
  }

  function buildActivityOptions(entries) {
    const buckets = new Map();

    entries.forEach(e => {
      const key = normalizeActivityKey(e.activity);
      if (!key) return;

      if (!buckets.has(key)) {
        buckets.set(key, {
          key,
          name: String(e.activity || '').trim().replace(/\s+/g, ' '),
          count: 0,
          lastTime: 0
        });
      }

      const bucket = buckets.get(key);
      bucket.count += 1;
      const time = entryStartTimestamp(e);
      if (Number.isFinite(time) && time > bucket.lastTime) bucket.lastTime = time;
    });

    return [...buckets.values()]
      .sort((a, b) => (b.count - a.count) || (b.lastTime - a.lastTime) || a.name.localeCompare(b.name));
  }

  function buildTagOptions(entries) {
    const buckets = new Map();

    entries.forEach(e => {
      getEntryTags(e).forEach(key => {
        if (!buckets.has(key)) {
          buckets.set(key, {
            key,
            name: tagLabel(key),
            count: 0,
            lastTime: 0
          });
        }

        const bucket = buckets.get(key);
        bucket.count += 1;
        const time = entryStartTimestamp(e);
        if (Number.isFinite(time) && time > bucket.lastTime) bucket.lastTime = time;
      });
    });

    return [...buckets.values()]
      .sort((a, b) => (b.count - a.count) || (b.lastTime - a.lastTime) || a.name.localeCompare(b.name));
  }

  function buildAnalysisOptions(entries, group = getAnalysisGroup()) {
    return group === 'tag' ? buildTagOptions(entries) : buildActivityOptions(entries);
  }

  function ensureAnalysisFilter(entries) {
    if (!state.advancedTags) state.analysisGroup = 'activity';
    const group = getAnalysisGroup();
    const options = buildAnalysisOptions(entries, group);
    const stillExists = state.analysisFilterKey === '__all__' || options.some(item => item.key === state.analysisFilterKey);
    if (!state.analysisFilterKey || !stillExists) state.analysisFilterKey = '__all__';
    return { group, options, filterKey: state.analysisFilterKey };
  }

  function applyAnalysisFilter(entries) {
    const { group, filterKey } = ensureAnalysisFilter(entries);
    return entries.filter(e => entryMatchesGroup(e, group, filterKey));
  }

  function renderAnalysisFilters(entries) {
    const { group, options, filterKey } = ensureAnalysisFilter(entries);
    const allLabel = group === 'tag' ? t('analysis-filter-all-tags') : t('analysis-filter-all-activities');
    const groupSelectHtml = state.advancedTags ? `
      <div>
        <label class="chart-filter-label" for="analysis-group-select">${t('analysis-group-label')}</label>
        <select class="chart-filter-select" id="analysis-group-select">
          <option value="activity" ${group === 'activity' ? 'selected' : ''}>${t('analysis-group-activity')}</option>
          <option value="tag" ${group === 'tag' ? 'selected' : ''}>${t('analysis-group-tag')}</option>
        </select>
      </div>` : '';
    return `
      <div class="analysis-filter-card">
        <div class="analysis-filter-title">${t('analysis-filter-title')}</div>
        <div class="analysis-filter-subtitle">${t(state.advancedTags ? 'analysis-filter-subtitle-tags-on' : 'analysis-filter-subtitle-tags-off')}</div>
        <div class="analysis-filter-grid">
          ${groupSelectHtml}
          <div>
            <label class="chart-filter-label" for="analysis-filter-select">${t(group === 'tag' ? 'analysis-filter-tag-label' : 'analysis-filter-activity-label')}</label>
            <select class="chart-filter-select" id="analysis-filter-select">
              <option value="__all__" ${filterKey === '__all__' ? 'selected' : ''}>${allLabel}</option>
              ${options.map(item => `
                <option value="${escapeHtml(item.key)}" ${item.key === filterKey ? 'selected' : ''}>
                  ${escapeHtml(item.name)} · ${t('dashboard-count', { n: item.count })}
                </option>`).join('')}
            </select>
          </div>
        </div>
        <div class="analysis-scope-note">${filterKey === '__all__' ? t(group === 'tag' ? 'analysis-scope-all-tags' : 'analysis-scope-all-activities') : t(group === 'tag' ? 'analysis-scope-one-tag' : 'analysis-scope-one-activity')}</div>
      </div>`;
  }

  function attachAnalysisFilterHandlers() {

  function averageMetricForGroup(entries, group, key, valuesFn) {
    let finalTotal = 0;
    let diffTotal = 0;
    let count = 0;

    entries.forEach(e => {
      if (!entryMatchesGroup(e, group, key)) return;
      const values = valuesFn(e);
      if (!values) return;

      const finalValue = scoreOrNull(values.final);
      const diffValue = scoreOrNull(values.diff);
      if (finalValue === null || diffValue === null) return;

      finalTotal += finalValue;
      diffTotal += diffValue;
      count += 1;
    });

    if (!count) return null;
    return {
      avgFinal: finalTotal / count,
      avgDiff: diffTotal / count,
      count
    };
  }

  function getDeepAnalysisStats(entries, group, key) {
    const scopedEntries = entries.filter(e => entryMatchesGroup(e, group, key));

    return {
      totalCount: scopedEntries.length,
      mood: averageMetricForGroup(entries, group, key, e => {
        const before = scoreOrNull(e.moodBefore);
        const after = scoreOrNull(e.moodAfter);
        return before !== null && after !== null ? { final: after, diff: after - before } : null;
      }),
      mastery: averageMetricForGroup(entries, group, key, e => {
        const predicted = scoreOrNull(e.predMastery);
        const actual = scoreOrNull(e.actMastery);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      }),
      pleasure: averageMetricForGroup(entries, group, key, e => {
        const predicted = scoreOrNull(e.predPleasure);
        const actual = scoreOrNull(e.actPleasure);
        return predicted !== null && actual !== null ? { final: actual, diff: actual - predicted } : null;
      })
    };
  }

  // Currently-rendered chart data + helpers for the hover handler.
  // Stored at module scope so resize/move handlers can reference it.
  let _chartData = null;

  function attachChartHover(chartData) {
    _chartData = chartData;
    if (!chartData) return;
    const svg = document.querySelector('.chart-container .chart-svg');
    if (!svg) return;

    // Move handler: find the nearest data point and show its values.
    const clientPointToSvgX = (clientX, clientY) => {
      // Use the browser's SVG transformation matrix instead of a simple
      // bounding-rectangle ratio. This stays accurate when the responsive SVG is
      // centered, letterboxed, max-height-limited, or scaled differently on wide
      // desktop screens. Without this, the last/rightmost dot can require the
      // mouse to be placed to the right of the visible graph before it selects.
      if (typeof svg.createSVGPoint === 'function' && typeof svg.getScreenCTM === 'function') {
        const matrix = svg.getScreenCTM();
        if (matrix) {
          const pt = svg.createSVGPoint();
          pt.x = clientX;
          pt.y = typeof clientY === 'number' ? clientY : svg.getBoundingClientRect().top;
          const svgPt = pt.matrixTransform(matrix.inverse());
          return Math.max(0, Math.min(chartData.W, svgPt.x));
        }
      }

      // Fallback for unusual embedded browsers that do not expose SVGPoint.
      const rect = svg.getBoundingClientRect();
      if (!rect.width) return 0;
      const ratio = chartData.W / rect.width;
      const rawSvgX = (clientX - rect.left) * ratio;
      return Math.max(0, Math.min(chartData.W, rawSvgX));
    };

    const indexFromClientPoint = (clientX, clientY) => {
      const svgX = clientPointToSvgX(clientX, clientY);
      let best = 0, bestDist = Infinity;
      for (let i = 0; i < chartData.points.length; i++) {
        const d = Math.abs(chartData.points[i].x - svgX);
        if (d < bestDist) { bestDist = d; best = i; }
      }
      return best;
    };

    const onMove = (clientX, clientY) => updateHoverDisplay(indexFromClientPoint(clientX, clientY));
    const onMouseMove = (ev) => onMove(ev.clientX, ev.clientY);
    const onTouchMove = (ev) => {
      if (ev.touches && ev.touches[0]) {
        onMove(ev.touches[0].clientX, ev.touches[0].clientY);
        ev.preventDefault();
      }
    };
    const onPointerMove = (ev) => {
      if (typeof ev.clientX === 'number') onMove(ev.clientX, ev.clientY);
    };
    const onLeave = () => clearHoverDisplay();

    // Mouse/touch/pointer coverage makes the final/rightmost point reliable
    // on desktop browsers, mobile browsers, and embedded webviews.
    svg.style.touchAction = 'none';
    svg.addEventListener('mousemove', onMouseMove);
    svg.addEventListener('pointermove', onPointerMove);
    svg.addEventListener('mouseleave', onLeave);
    svg.addEventListener('pointerleave', onLeave);
    svg.addEventListener('touchstart', onTouchMove, { passive: false });
    svg.addEventListener('touchmove',  onTouchMove, { passive: false });
    svg.addEventListener('touchend',   onLeave);

    svg.querySelectorAll('.hover-zone').forEach(zone => {
      const showZone = () => updateHoverDisplay(Number(zone.dataset.index || 0));
      zone.addEventListener('mouseenter', showZone);
      zone.addEventListener('mousemove', showZone);
      zone.addEventListener('pointerenter', showZone);
      zone.addEventListener('pointermove', showZone);
      zone.addEventListener('touchstart', (ev) => { showZone(); ev.preventDefault(); }, { passive: false });
      zone.addEventListener('touchmove',  (ev) => { showZone(); ev.preventDefault(); }, { passive: false });
    });
  }

  function updateHoverDisplay(index) {
    if (!_chartData) return;
    const point = _chartData.points[index];
    if (!point) return;
    const svg = document.querySelector('.chart-container .chart-svg');
    if (!svg) return;

    const { pad, W } = _chartData;
    const x = point.x;

    const cross = svg.querySelector('.crosshair');
    if (cross) {
      cross.setAttribute('x1', x);
      cross.setAttribute('x2', x);
    }

    const series = (_chartData.visibleKeys || visibleChartKeys(getChartFilter()))
      .map(key => {
        const meta = chartSeriesMeta(key);
        const value = scoreOrNull(meta.value(point.entry));
        return { key, meta, value, yPos: point.ys[key] };
      });

    // Hide anything that is not part of the current filter.
    ['predP','actP','predM','actM','moodB','moodA'].forEach(key => {
      if (series.some(s => s.key === key)) return;
      const dot = svg.querySelector(`.dot-${key}`);
      const tag = svg.querySelector(`.tag-${key}`);
      if (dot) dot.style.opacity = '0';
      if (tag) tag.style.opacity = '0';
    });

    const visible = series
      .filter(s => typeof s.value === 'number' && s.yPos != null)
      .sort((a, b) => a.yPos - b.yPos);

    // Compute non-overlapping label y-positions. Values that are close together
    // get gently stacked, then clamped inside the plot area.
    const TAG_H = 14;
    const GAP = 3;
    const minY = pad.top + 2;
    const maxY = pad.top + _chartData.plotH - TAG_H - 2;
    visible.forEach((s, i) => { s.tagY = Math.max(minY, Math.min(maxY, s.yPos - TAG_H / 2)); });
    for (let i = 1; i < visible.length; i++) {
      if (visible[i].tagY < visible[i - 1].tagY + TAG_H + GAP) {
        visible[i].tagY = visible[i - 1].tagY + TAG_H + GAP;
      }
    }
    const overflow = visible.length ? visible[visible.length - 1].tagY - maxY : 0;
    if (overflow > 0) {
      for (let i = 0; i < visible.length; i++) visible[i].tagY -= overflow;
      if (visible[0].tagY < minY) {
        const lift = minY - visible[0].tagY;
        for (let i = 0; i < visible.length; i++) visible[i].tagY += lift;
      }
    }

    visible.forEach(s => {
      const dot = svg.querySelector(`.dot-${s.key}`);
      const tag = svg.querySelector(`.tag-${s.key}`);
      if (!dot || !tag) return;
      dot.style.opacity = s.meta.dashed ? '0.85' : '1';
      dot.setAttribute('cx', x);
      dot.setAttribute('cy', s.yPos);

      const valuePrefix = s.meta.dashed ? 's' : 'f';
      const valueText = `${valuePrefix}${s.value}`;
      const TAG_W = Math.max(34, 12 + valueText.length * 7);
      const offset = 8;
      const preferLeft = x > W - 95;
      let tagX = preferLeft ? x - offset - TAG_W : x + offset;
      if (tagX + TAG_W > W - 2) tagX = x - offset - TAG_W;
      if (tagX < 2) tagX = x + offset;

      tag.style.opacity = '1';
      const rect = tag.querySelector('rect');
      const text = tag.querySelector('text');
      rect.setAttribute('x', tagX);
      rect.setAttribute('y', s.tagY);
      rect.setAttribute('width', TAG_W);
      rect.setAttribute('stroke', s.meta.color);
      text.setAttribute('x', tagX + TAG_W / 2);
      text.setAttribute('y', s.tagY + TAG_H / 2 + 0.5);
      text.setAttribute('fill', s.meta.color);
      text.textContent = valueText;
    });

    series
      .filter(s => !(typeof s.value === 'number' && s.yPos != null))
      .forEach(s => {
        const dot = svg.querySelector(`.dot-${s.key}`);
        const tag = svg.querySelector(`.tag-${s.key}`);
        if (dot) dot.style.opacity = '0';
        if (tag) tag.style.opacity = '0';
      });

    svg.classList.add('has-hover');

    // Update tooltip card below the chart
    const tt = document.getElementById('chart-tooltip');
    if (tt) {
      tt.classList.remove('empty');
      tt.innerHTML = renderTooltipCard(point.entry);
    }
  }

  function clearHoverDisplay() {
    const svg = document.querySelector('.chart-container .chart-svg');
    if (svg) svg.classList.remove('has-hover');
    const tt = document.getElementById('chart-tooltip');
    if (tt) {
      tt.classList.add('empty');
      tt.textContent = t('chart-hover-hint');
    }
  }

  function renderTooltipCard(entry) {
    const ts = entryStartTimestamp(entry);
    const d = new Date(ts);
    const dateLocale = currentLang === 'ka' ? 'ka-GE' : currentLang === 'ru' ? 'ru-RU' : 'en-US';
    const dateStr = d.toLocaleDateString(dateLocale, { month: 'short', day: 'numeric' });
    const h = d.getHours();
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);

    const cellNum = (val, cls) =>
      typeof val === 'number'
        ? `<span class="val ${cls}">${val}</span>`
        : `<span class="val empty">—</span>`;

    const tagsLine = state.advancedTags && getEntryTags(entry).length
      ? `<div class="entry-tags" style="margin: 0 0 10px;">${tagPillsHtml(getEntryTags(entry))}</div>`
      : '';

    return `
      <div class="chart-tooltip-header">
        <div class="chart-tooltip-activity">${escapeHtml(entry.activity)}${entry.company ? ` · ${escapeHtml(entry.company)}` : ''}</div>
        <div class="chart-tooltip-date">${dateStr} · ${h12} ${ampm}</div>
      </div>
      ${tagsLine}
      <div class="chart-tooltip-grid">
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-mastery')} (${t('chart-pred-short')})</span>
          ${cellNum(entry.predMastery, 'mastery')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-mastery')} (${t('chart-act-short')})</span>
          ${cellNum(entry.actMastery, 'mastery')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-pleasure')} (${t('chart-pred-short')})</span>
          ${cellNum(entry.predPleasure, 'pleasure')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('insight-pleasure')} (${t('chart-act-short')})</span>
          ${cellNum(entry.actPleasure, 'pleasure')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('label-mood-before')}</span>
          ${cellNum(entry.moodBefore, 'mood')}
        </div>
        <div class="chart-tooltip-row">
          <span class="label">${t('label-mood-after')}</span>
          ${cellNum(entry.moodAfter, 'mood')}
        </div>
      </div>`;
  }

  function attachDataActionHandlers() {
    const exp = document.getElementById('export-btn');
    const imp = document.getElementById('import-btn');
    if (exp) exp.addEventListener('click', exportData);
    if (imp) imp.addEventListener('click', triggerImport);
  }

  // ============ EXPORT / IMPORT ============
  function exportData() {
    const payload = {
      app: 'pleasure-predicting-sheet',
      version: 1,
      exportedAt: new Date().toISOString(),
      lang: currentLang,
      entries: state.entries,
      templates: state.templates,
      tagLibrary: state.tagLibrary,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    a.href = url;
    a.download = `pleasure-predicting-sheet-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(t('toast-exported'));
  }

  function triggerImport() {
    document.getElementById('import-file-input').click();
  }

  // Show the import choice modal: returns 'merge' | 'replace' | null (cancel)
  function showImportChoice(message) {
    return new Promise(resolve => {
      const overlay = document.getElementById('import-choice-overlay');
      document.getElementById('import-choice-message').textContent = message;
      overlay.classList.add('show');

      const cancelBtn  = document.getElementById('import-choice-cancel');
      const mergeBtn   = document.getElementById('import-choice-merge');
      const replaceBtn = document.getElementById('import-choice-replace');

      const cleanup = (result) => {
        overlay.classList.remove('show');
        cancelBtn.removeEventListener('click', onCancel);
        mergeBtn.removeEventListener('click', onMerge);
        replaceBtn.removeEventListener('click', onReplace);
        overlay.removeEventListener('click', onBackdrop);
        resolve(result);
      };
      const onCancel  = () => cleanup(null);
      const onMerge   = () => cleanup('merge');
      const onReplace = () => cleanup('replace');
      const onBackdrop = (e) => { if (e.target === overlay) cleanup(null); };

      cancelBtn.addEventListener('click', onCancel);
      mergeBtn.addEventListener('click', onMerge);
      replaceBtn.addEventListener('click', onReplace);
      overlay.addEventListener('click', onBackdrop);
    });
  }

  async function handleImportFile(file) {
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      let imported = [];
      let importedTemplates = [];
      let importedTagLibrary = [];

      // Accept either { entries: [...] } or a bare array
      if (Array.isArray(data)) {
        imported = data;
      } else if (data && Array.isArray(data.entries)) {
        imported = data.entries;
        if (Array.isArray(data.templates)) importedTemplates = data.templates;
        if (Array.isArray(data.tagLibrary)) importedTagLibrary = data.tagLibrary;
      } else {
        throw new Error('Invalid format');
      }

      // Validate minimum entry shape
      const valid = imported.filter(e =>
        e && typeof e === 'object' &&
        typeof e.activity === 'string' &&
        typeof e.predMastery === 'number' &&
        typeof e.predPleasure === 'number'
      );

      if (valid.length === 0) {
        showToast(t('toast-import-failed'));
        return;
      }

      // Ask the user: merge into existing, replace existing, or cancel
      const choice = await showImportChoice(t('import-choose-msg', { n: valid.length }));
      if (!choice) return;

      // If user chose "replace", require an extra confirmation since it's destructive
      if (choice === 'replace') {
        const confirmReplace = await showConfirm(t('replace-confirm'));
        if (!confirmReplace) return;
        await performImportReplace(valid, importedTemplates, importedTagLibrary);
      } else {
        await performImportMerge(valid, importedTemplates, importedTagLibrary);
      }
    } catch (err) {
      console.error('Import error:', err);
      showToast(t('toast-import-failed'));
    }
  }

  function normalizeImportedEntry(e, takeIdOnlyIfFree, existingIds) {
    // Generate a fresh id whenever the original would collide (or if asked to always re-id)
    const safeId =
      takeIdOnlyIfFree && e.id && !existingIds.has(e.id)
        ? e.id
        : ('e_imp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7));
    return {
      id: safeId,
      activity: e.activity,
      company: e.company || '',
      predMastery: e.predMastery,
      predPleasure: e.predPleasure,
      actMastery: typeof e.actMastery === 'number' ? e.actMastery : null,
      actPleasure: typeof e.actPleasure === 'number' ? e.actPleasure : null,
      moodBefore: typeof e.moodBefore === 'number' ? e.moodBefore : null,
      moodAfter: typeof e.moodAfter === 'number' ? e.moodAfter : null,
      tags: sanitizeTags(e.tags),
      createdAt: e.createdAt || Date.now(),
      scheduledAt: e.scheduledAt || e.createdAt || Date.now(),
      completedAt: e.completedAt || null,
    };
  }

  // Merge: keep existing entries and append imported ones (skip exact id collisions
  // by minting fresh ids for duplicates).
  async function performImportMerge(validEntries, importedTemplates, importedTagLibrary = []) {
    mergeTagLibrary(importedTagLibrary);
    const existingIds = new Set(state.entries.map(e => e.id));
    let addedCount = 0;
    for (const e of validEntries) {
      const normalized = normalizeImportedEntry(e, true, existingIds);
      state.entries.push(normalized);
      existingIds.add(normalized.id);
      if (useWindowStorage) {
        try { await window.storage.set('entry:' + normalized.id, JSON.stringify(normalized)); } catch(_) {}
      }
      addedCount++;
    }
    // Merge templates (deduplicated by addTemplate)
    for (const tpl of importedTemplates) {
      if (typeof tpl === 'string' && tpl.trim()) addTemplate(tpl);
    }
    sortEntries();
    saveToLocalStorage();
    renderInsights();
    showToast(t('toast-imported-merged', { n: addedCount }));
  }

  // Replace: delete all existing entries (from window.storage if present and
  // localStorage), then load only the imported ones. Templates are also replaced.
  async function performImportReplace(validEntries, importedTemplates, importedTagLibrary = []) {
    // Delete every existing entry from window.storage
    if (useWindowStorage) {
      for (const e of state.entries) {
        try { await window.storage.delete('entry:' + e.id); } catch(_) {}
      }
    }
    // Clear in-memory state
    state.entries = [];
    state.templates = [];
    state.tagLibrary = normalizeTagLibrary(importedTagLibrary);
    if (!state.tagLibrary.length) state.tagLibrary = defaultTagLibrary();
    saveTagLibrary();

    // Write the new entries
    const existingIds = new Set();
    for (const e of validEntries) {
      const normalized = normalizeImportedEntry(e, true, existingIds);
      state.entries.push(normalized);
      existingIds.add(normalized.id);
      if (useWindowStorage) {
        try { await window.storage.set('entry:' + normalized.id, JSON.stringify(normalized)); } catch(_) {}
      }
    }
    // Replace templates
    for (const tpl of importedTemplates) {
      if (typeof tpl === 'string' && tpl.trim()) addTemplate(tpl);
    }
    sortEntries();
    saveToLocalStorage();
    saveTemplates();
    renderInsights();
    showToast(t('toast-imported-replaced', { n: validEntries.length }));
  }

  // Wire up file input change
  document.getElementById('import-file-input').addEventListener('change', (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (file) handleImportFile(file);
    // Reset so the same file can be selected again
    ev.target.value = '';
  });

  function avg(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ============ TOAST ============
  let toastTimer;
  function showToast(msg) {
    const toastEl = document.getElementById('toast');
    if (!toastEl) return;
    toastEl.textContent = msg;
    // Force a reflow so reopening immediately re-triggers the animation
    toastEl.classList.remove('show');
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }

  // ============ INIT ============
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  document.querySelectorAll('input[name="scale-mode"]').forEach(radio => {
    radio.addEventListener('change', () => setScaleMode(radio.value));
  });

  document.querySelectorAll('input[name="theme-mode"]').forEach(radio => {
    radio.addEventListener('change', () => setThemeMode(radio.value));
  });

  document.querySelectorAll('input[name="advanced-tags"]').forEach(radio => {
    radio.addEventListener('change', () => setAdvancedTagsMode(radio.value));
  });

  const addTagBtn = document.getElementById('add-entry-tag-btn');
  if (addTagBtn) addTagBtn.addEventListener('click', addTagFromSettings);
  const newTagInput = document.getElementById('new-entry-tag-input');
  if (newTagInput) {
    newTagInput.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        addTagFromSettings();
      }
    });
  }

  applyThemeMode(state.themeMode);
  renderAllScaleWidgets({ preserve: false });
  renderScaleModeSettingsUI();
  renderThemeModeSettingsUI();
  renderAdvancedTagsSettingsUI();

  // Set up mood scale-pairs (handled by the standard scale init below)

  // Load and render templates
  loadTemplates();
  renderTemplates();
  updateSaveTemplateBtn();

  // Wire up language switcher buttons (event delegation so it works
  // even if buttons are re-rendered)
  document.addEventListener('click', (ev) => {
    const btn = ev.target.closest('.lang-btn');
    if (!btn) return;
    setLang(btn.dataset.lang);
  });

  // Footer reminder: jump to the About / privacy / disclaimer information.
  document.addEventListener('click', (ev) => {
    const aboutLink = ev.target.closest('[data-open-about]');
    if (!aboutLink) return;
    ev.preventDefault();
    switchView('about');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Apply translations on initial load (uses saved preference or default ka)
  applyTranslations();

  loadEntries().then(async () => {
    // First-launch onboarding: seed 5 sample entries if this is a fresh
    // install. seedSampleData() bails out automatically if the user has
    // any existing data or has been seeded before, so it's safe to call
    // every load.
    await seedSampleData();
    await ensureSampleEntryTags();
    // Re-render in case log/insights tab was active (it's not by default, but safe)
    applyTranslations();
  });
</script>
</body>
</html>
